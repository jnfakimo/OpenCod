<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('siteTheme')||'tech');</script>
<script src="theme.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>臺北農產公司 第一果菜市場 — 整合標記系統</title>
<style>
:root{--bg:#020b18;--panel:#041428;--border:#0a3a5a;--cyan:#00d4ff;--cyan2:#00a8cc;--text:#b0d8f0;--text2:#5a8ab0;
  --eq:#00d4ff;--sp:#00ff9d;--pt:#c77dff;--rp:#ff5470;--nt:#ffb300}
:root[data-theme="light"]{--bg:#f4f6fa;--panel:#ffffff;--border:#c3d4e3;--cyan:#0284c7;--cyan2:#0369a1;--text:#1e293b;--text2:#64748b;--eq:#0284c7;--sp:#059669;--pt:#9333ea;--rp:#dc2626;--nt:#b45309}
/* light mode overrides */
:root[data-theme="light"] #topbar{background:rgba(255,255,255,.97)}
:root[data-theme="light"] #osd{background:#f8fafc;color:#1e293b}
:root[data-theme="light"] #floors select{background:#f8fafc;border-color:#cbd5e1;color:#1e293b}
:root[data-theme="light"] #floors option{background:#ffffff;color:#1e293b}
:root[data-theme="light"] .tbtn{background:#f1f5f9;border-color:#e2e8f0;color:#1e293b}
:root[data-theme="light"] .tbtn:hover{background:#e2e8f0}
:root[data-theme="light"] #hud{background:rgba(255,255,255,.92);border-color:#e2e8f0;color:#1e293b}
:root[data-theme="light"] #panel{background:rgba(255,255,255,.97);border-color:#e2e8f0;color:#1e293b}
:root[data-theme="light"] #panelToggle{background:#f1f5f9;border-color:#e2e8f0;color:#1e293b}
:root[data-theme="light"] .mk-item{background:#f8fafc;border-color:#e2e8f0;color:#1e293b}
:root[data-theme="light"] #mouseHint{background:rgba(255,255,255,.92);border-color:#e2e8f0;color:#1e293b}
:root[data-theme="light"] .pin .plab{background:#000;border-color:rgba(255,255,255,.42);color:#fff}
:root[data-theme="light"] .modal-bg{background:rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans TC',sans-serif;overflow:hidden}

#topbar{position:fixed;top:0;left:0;right:0;height:50px;background:rgba(2,11,24,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:200;overflow-x:auto;overflow-y:hidden}
.tb-logo{font-size:13px;font-weight:700;color:var(--cyan);white-space:nowrap}
.tb-sep{width:1px;height:24px;background:var(--border)}
.tb-title{font-size:11px;color:var(--text2);white-space:nowrap;flex:0 0 auto}
.tb-space{flex:1 0 auto}
.tb-back{color:var(--text2);text-decoration:none;display:inline-flex;align-items:center;padding:4px 10px;border:1px solid var(--border);border-radius:3px;font-size:11px;transition:all .2s;white-space:nowrap;flex:0 0 auto}
.tb-back:hover{border-color:var(--cyan);color:var(--cyan)}

#osd{position:fixed;inset:50px 0 0 0;background:#04101f}

/* Left panel（可收合，預設隱藏，覆蓋在圖面上）*/
#panel{position:fixed;left:0;top:50px;bottom:0;width:300px;background:rgba(4,20,40,.97);border-right:1px solid var(--border);z-index:180;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .25s;box-shadow:0 0 30px rgba(0,0,0,.55)}
body.panel-open #panel{transform:translateX(0)}
/* 釘住：面板固定顯示，圖面右移不被遮住 */
body.panel-pinned #osd{left:300px}
#pinBtn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.12)}
#panelToggle{position:fixed;left:14px;top:60px;z-index:170;display:inline-flex;align-items:center;gap:6px;padding:8px 13px;background:rgba(4,20,40,.95);border:1px solid var(--border);border-radius:5px;color:var(--cyan);font-size:12px;font-weight:700;box-shadow:0 0 18px rgba(0,212,255,.12);cursor:pointer}
#panelToggle:hover{border-color:var(--cyan)}
body.panel-open #panelToggle{display:none}
.pn-head{padding:12px 14px;border-bottom:1px solid var(--border)}
.pn-title{font-size:14px;font-weight:700;color:var(--cyan)}
.pn-sub{font-size:10px;color:var(--text2);margin-top:2px}
.pn-tools{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.btn{padding:8px 12px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-size:12px;transition:all .15s;text-align:center}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-place{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08);font-weight:700}
.btn-place.on{background:var(--cyan);color:#022;box-shadow:0 0 14px rgba(0,212,255,.5)}
.pn-filter{display:flex;gap:6px}
.pn-filter select,.pn-filter input{flex:1;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:3px;font-size:12px;outline:none;min-width:0}
.pn-list{flex:1;overflow-y:auto;padding:8px 10px}
.pn-list::-webkit-scrollbar{width:5px}.pn-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.mk-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;cursor:pointer;transition:all .15s;background:rgba(2,11,24,.5)}
.mk-item:hover{border-color:var(--cyan);background:rgba(0,212,255,.06)}
.mk-item .cdot{width:9px;height:9px;border-radius:50%;flex:none}
.mk-item .mk-name{flex:1;font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mk-item .mk-kind{font-size:9.5px;color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:1px 6px;white-space:nowrap}
.pn-empty{text-align:center;color:var(--text2);font-size:12px;padding:40px 10px}
.pn-legend{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:8px 14px;font-size:11px;color:var(--text2)}
.pn-legend span{display:inline-flex;align-items:center;gap:5px}
.pn-legend i{width:11px;height:11px;border-radius:50%;display:inline-block;box-shadow:0 0 0 1px rgba(255,255,255,.6)}
.pn-count{padding:8px 14px;font-size:11px;color:var(--text2);border-top:1px solid var(--border)}

/* Floor switch */
/* Floor switch — 樓層下拉式選單 */
#floors{position:fixed;right:14px;top:62px;z-index:150}
#floors select{background:rgba(4,20,40,.98);color:var(--cyan);border:1px solid var(--border);border-radius:6px;padding:10px 30px 10px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;outline:none;min-width:150px;box-shadow:0 0 18px rgba(0,212,255,.12);
  appearance:none;-webkit-appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--cyan) 50%),linear-gradient(135deg,var(--cyan) 50%,transparent 50%);
  background-position:calc(100% - 16px) center,calc(100% - 11px) center;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
#floors select:hover,#floors select:focus{border-color:var(--cyan)}
#floors option{background:#04101f;color:var(--text)}

/* Tools */
#tools{position:fixed;right:14px;top:210px;display:flex;flex-direction:column;gap:6px;z-index:150}
.tbtn{width:40px;height:40px;background:rgba(4,20,40,.95);border:1px solid var(--border);color:var(--cyan2);border-radius:5px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none}
.tbtn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.1)}

/* Bottom-right row: mouse-control hint + HUD, side by side (hint on the left, HUD on the right) */
#bottomRightRow{position:fixed;right:14px;bottom:14px;z-index:150;display:flex;align-items:flex-end;gap:8px}
#hud{background:rgba(4,20,40,.92);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:11px;line-height:1.6}
#hud .h-t{color:var(--cyan);font-weight:700;margin-bottom:2px}
#hud span{color:var(--text)}
#mouseHint{background:rgba(4,20,40,.92);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:11px;line-height:1.6;color:var(--text);white-space:nowrap}

/* Navigator (mini-map) — bottom-left, enlarged 1.3x */
#osdNav{position:fixed!important;top:auto!important;right:auto!important;left:14px!important;bottom:14px!important;width:169px!important;height:130px!important;z-index:150}

#placehint{position:fixed;left:50%;top:60px;transform:translateX(-50%);background:rgba(0,212,255,.15);border:1px solid var(--cyan);color:var(--cyan);padding:6px 16px;border-radius:20px;font-size:12px;z-index:190;display:none}
#placehint.on{display:block}

/* Marker pins on the plan */
.pin{position:relative;cursor:pointer;transform:translate(-50%,-50%);pointer-events:auto}
/* 放大可點擊範圍（透明），視覺圓點仍維持小尺寸，方便點選 */
.pin::before{content:'';position:absolute;left:50%;top:50%;width:24px;height:24px;transform:translate(-50%,-50%);border-radius:50%}
.pin:hover .pdot{transform:rotate(-45deg) scale(1.25)}
.pin .pdot{width:9px;height:9px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:1px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.6);margin:0 auto;transition:transform .12s}
.pin .plab{position:absolute;left:50%;top:-3px;transform:translate(-50%,-100%);background:#000;border:1px solid rgba(255,255,255,.42);color:#fff;font-size:12px!important;font-weight:600;line-height:1.35;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 2px 7px rgba(0,0,0,.48)}
.pin:hover .plab,.pin.show-lab .plab{opacity:1}
.pin.sel .pdot{outline:3px solid rgba(255,255,255,.5);outline-offset:2px}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(1,6,14,.8);z-index:300;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--cyan);border-radius:6px;width:100%;max-width:400px;box-shadow:0 0 40px rgba(0,212,255,.2)}
.md-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.md-head .mt{font-size:14px;font-weight:700;color:var(--cyan)}
.md-head .x{margin-left:auto;cursor:pointer;color:var(--text2);font-size:18px}
.md-head .x:hover{color:var(--rp)}
.md-body{padding:16px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:3px;font-size:13px;outline:none;font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--cyan)}
.fld textarea{resize:vertical;min-height:52px}
.kind-row{display:flex;gap:6px}
.kind-row .kbtn{flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text2);cursor:pointer;font-size:11.5px;transition:all .15s}
.kind-row .kbtn.on{color:#022;font-weight:700}
.md-actions{display:flex;gap:8px;margin-top:6px}
.btn-primary{flex:1;background:rgba(0,212,255,.14);border:1px solid var(--cyan);color:var(--cyan);padding:10px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:700}
.btn-primary:hover{background:rgba(0,212,255,.24)}
.btn-danger{background:rgba(255,84,112,.12);border:1px solid var(--rp);color:var(--rp);padding:10px 14px;border-radius:4px;cursor:pointer;font-size:13px}
.btn-danger:hover{background:rgba(255,84,112,.22)}
.md-msg{font-size:12px;min-height:15px;color:var(--rp)}

/* Detail popup */
#detail{display:none;position:fixed;z-index:260;background:var(--panel);border:1px solid var(--cyan);border-radius:6px;width:250px;box-shadow:0 0 26px rgba(0,0,0,.6)}
#detail.show{display:block}
.dt-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.dt-head .cdot{width:10px;height:10px;border-radius:50%;flex:none}
.dt-head .dt-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.dt-head .x{cursor:pointer;color:var(--text2)}
.dt-body{padding:10px 12px;font-size:12px;line-height:1.7}
.dt-body .r{color:var(--text2)}.dt-body .r b{color:var(--text);font-weight:400}
.dt-acts{display:flex;gap:6px;padding:0 12px 12px}
.dt-acts .btn{flex:1;padding:6px}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400;gap:12px}
.ld-t{font-size:13px;color:var(--cyan);letter-spacing:.1em}
.ld-bar{width:200px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--cyan);width:0%;transition:width .25s}
.ld-m{font-size:11px;color:var(--text2)}

@media(max-width:720px){
  #panel{width:100%;bottom:auto;max-height:70%;border-right:none;border-bottom:1px solid var(--border)}
  #osd,body.panel-pinned #osd{left:0;inset:50px 0 0 0}
  .pn-list{max-height:38vh}
  #floors{top:auto;bottom:14px;left:14px;right:auto;flex-direction:row}
  #tools{top:auto;bottom:64px;left:14px;right:auto;flex-direction:row}
  #bottomRightRow{display:none}
  #osdNav{bottom:114px!important;width:130px!important;height:100px!important}
}

</style>

</head>
<body>

<div id="loading">
  <div class="ld-t">載入整合標記系統…</div>
  <div class="ld-bar"><div class="ld-fill" id="ldfill"></div></div>
  <div class="ld-m" id="ldmsg">初始化…</div>
</div>

<div id="topbar">
  <div class="tb-logo">臺北農產公司 第一果菜市場</div>
  <div class="tb-sep"></div>
  <div class="tb-title">整合標記系統</div>
  <div class="tb-space"></div>
  <a href="modeler.html" class="tb-back">3D建模系統</a>
  <a href="arealist.html" class="tb-back">區域位置表</a>
  <a href="b1_integrated_marker_system.html" class="tb-back">整合標記系統</a>
  <a href="admin.html#modelhub" class="tb-back">後台</a>
</div>

<button id="panelToggle" onclick="togglePanel(true)">☰ 標記選單</button>
<div id="panel">
  <div class="pn-head" style="display:flex;align-items:center;justify-content:space-between;gap:10px">
    <div>
      <div class="pn-title"><span class="ic ic-handover"></span> 整合標記</div>
      <div class="pn-sub" id="pnFloor">B1 地下一層</div>
    </div>
    <div style="display:flex;gap:6px;flex:none">
      <button class="btn" id="pinBtn" style="padding:4px 10px" onclick="togglePin()" title="釘住後點空白處不會自動收合">📌 釘住</button>
      <button class="btn" style="padding:4px 11px" onclick="togglePanel(false)">✕ 隱藏</button>
    </div>
  </div>
  <div class="pn-tools">
    <button class="btn btn-place" id="btnPlace" onclick="togglePlace()">＋ 放置標記模式</button>
    <div class="pn-filter">
      <select id="fltKind" onchange="renderList()">
        <option value="markers">本層標記</option>
        <option value="equipment">設備清單</option>
        <option value="space">空間清單（區域位置）</option>
        <option value="patrol">巡邏點標示</option>
        <option value="repair">報修案件</option>
      </select>
    </div>
    <div class="pn-filter">
      <select id="fltPlaceStatus" onchange="renderList()">
        <option value="">全部設置狀態</option>
        <option value="placed">已設置</option>
        <option value="unplaced">未設置</option>
      </select>
    </div>
  </div>
  <div class="pn-list" id="mkList"></div>
  <div class="pn-count" id="pnCount">—</div>
  <div class="pn-legend">
    <span><i style="background:var(--eq)"></i>設備</span>
    <span><i style="background:var(--sp)"></i>空間</span>
    <span><i style="background:var(--pt)"></i>巡邏點</span>
    <span><i style="background:var(--rp)"></i>報修點</span>
    <span><i style="background:var(--nt)"></i>一般</span>
  </div>
</div>

<div id="osd"></div>
<div id="osdNav"></div>

<div id="placehint">點選平面圖任一位置放置標記　·　再按一次退出放置模式</div>

<div id="floors">
  <select id="floorSel" onchange="showFloor(this.value)">
    <option value="3F">3F 三樓</option>
    <option value="2F">2F 二樓</option>
    <option value="1F">1F 一樓</option>
    <option value="B1" selected>B1 地下一層</option>
  </select>
</div>

<div id="tools">
  <div class="tbtn" id="t-zin"  title="放大">＋</div>
  <div class="tbtn" id="t-zout" title="縮小">－</div>
  <div class="tbtn" id="t-rl"   title="逆時針旋轉">↺</div>
  <div class="tbtn" id="t-rr"   title="順時針旋轉"><span class="ic ic-refresh"></span></div>
  <div class="tbtn" id="t-lab"  title="顯示/隱藏標籤">🏷</div>
  <div class="tbtn" id="t-home" title="重置視角">⊡</div>
  <div class="tbtn" id="t-fs"   title="全螢幕">⛶</div>
</div>

<div id="bottomRightRow">
  <div id="mouseHint">🖱 滾輪：縮放　拖曳：平移　雙擊：放大</div>
  <div id="hud">
    <div class="h-t" id="hudFloor"><span class="ic ic-3d"></span> B1 地下一層</div>
    <div>縮放：<span id="h-zoom">100%</span>　旋轉：<span id="h-rot">0°</span></div>
  </div>
</div>

<!-- Marker create/edit modal -->
<div class="modal-bg" id="m-mk">
  <div class="modal">
    <div class="md-head"><span class="mt" id="mkTitle">新增標記</span><span class="x" onclick="closeMk()">✕</span></div>
    <div class="md-body">
      <div class="fld">
        <label>類型</label>
        <div class="kind-row" id="kindRow">
          <button type="button" class="kbtn" data-k="equipment" style="--c:var(--eq)" onclick="pickKind('equipment')">設備</button>
          <button type="button" class="kbtn" data-k="space" style="--c:var(--sp)" onclick="pickKind('space')">空間</button>
          <button type="button" class="kbtn" data-k="patrol" style="--c:var(--pt)" onclick="pickKind('patrol')">巡邏點</button>
          <button type="button" class="kbtn" data-k="repair" style="--c:var(--rp)" onclick="pickKind('repair')">報修點</button>
          <button type="button" class="kbtn" data-k="note" style="--c:var(--nt)" onclick="pickKind('note')">一般</button>
        </div>
      </div>
      <div class="fld" id="fldEqp" style="display:none">
        <label>連結設備（選填，選後自動帶入名稱）</label>
        <select id="mkEqp" onchange="onLinkEqp()"><option value="">— 不連結 —</option></select>
      </div>
      <div class="fld" id="fldSpace" style="display:none">
        <label>連結空間（來自區域位置表，選後自動帶入名稱）</label>
        <select id="mkSpace" onchange="onLinkSpace()"><option value="">— 不連結 —</option></select>
      </div>
      <div class="fld" id="fldRepair" style="display:none">
        <label>連結報修案件（來自報修系統，選後自動帶入名稱）</label>
        <select id="mkRepair" onchange="onLinkRepair()"><option value="">— 不連結 —</option></select>
      </div>
      <div class="fld"><label>標記名稱</label><input id="mkLabel" placeholder="顯示於平面圖上的名稱"></div>
      <div class="fld"><label>備註（選填）</label><textarea id="mkNote" placeholder="說明 / 狀態…"></textarea></div>
      <div class="md-msg" id="mkMsg"></div>
      <div class="md-actions">
        <button class="btn-danger" id="mkDel" style="display:none" onclick="deleteMk()">停用</button>
        <button class="btn-primary" onclick="saveMk()">儲存標記</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail popup -->
<div id="detail">
  <div class="dt-head"><span class="cdot" id="dtDot"></span><span class="dt-name" id="dtName"></span><span class="x" onclick="hideDetail()">✕</span></div>
  <div class="dt-body" id="dtBody"></div>
  <div class="dt-acts">
    <button class="btn" onclick="editFromDetail()">編輯</button>
    <button class="btn" style="border-color:var(--rp);color:var(--rp)" onclick="delFromDetail()">停用</button>
  </div>

function canonicalFloor(f){
  const s=String(f||'').trim().toUpperCase().replace(/\s+/g,'').replace(/樓|F$/g,m=>m==='F'?'':'');
  const raw=String(f||'').trim().toUpperCase().replace(/\s+/g,'');
  const b=raw.match(/^B(\d+)F?$/);   if(b) return 'B'+b[1];      // B1 / B1F → B1
  if(raw==='RF'||raw==='R'||raw==='頂樓') return 'RF';
  const n=raw.match(/^(\d+)F?$/);    if(n) return n[1]+'F';       // 1 / 1F → 1F
  return raw;
}

const STAT_LABEL={pending:'待處理',dispatched:'已派工',processing:'處理中',accepted:'已受理',repairing:'維修中'};
// 依主資料清單整理各下拉選單（設備 / 空間 / 報修點），並與區域位置表同步
function fillLinkSelects(){
  // 設備：依所在位置整理
  const e=document.getElementById('mkEqp');
  const eqByLoc={};
  equip.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','zh-Hant'))
    .forEach(x=>{const g=x.location||'未分類';(eqByLoc[g]=eqByLoc[g]||[]).push(x);});
  e.innerHTML='<option value="">— 不連結 —</option>'+Object.keys(eqByLoc).sort((a,b)=>a.localeCompare(b,'zh-Hant'))
    .map(g=>`<optgroup label="${esc(g)}">`+eqByLoc[g].map(x=>`<option value="${x.equipment_id}">${esc(x.name)}</option>`).join('')+`</optgroup>`).join('');

  // 空間：來自「區域位置表」，依樓層分組；當前樓層優先置頂（樓層命名不一致亦可對應）

  const floors=Object.keys(byFloor).sort((a,b)=>{
    const ac=canonicalFloor(a)===cf?0:1, bc=canonicalFloor(b)===cf?0:1;
    return ac-bc || a.localeCompare(b,'zh-Hant');
  });
  s.innerHTML='<option value="">— 不連結 —</option>'+floors.map(f=>{
    const tag=canonicalFloor(f)===cf?'（本層）':'';
    const items=byFloor[f].sort((a,b)=>(a.space_name||'').localeCompare(b.space_name||'','zh-Hant'));
    return `<optgroup label="${esc(f)}${tag}">`+items.map(x=>`<option value="${x.space_id}">${esc(x.space_name)}</option>`).join('')+`</optgroup>`;
  }).join('');

  // 報修點：來自報修系統未結案案件，依狀態整理
  const r=document.getElementById('mkRepair');

    const byStat={};
    repairs.forEach(x=>{const g=STAT_LABEL[x.status]||x.status||'其他';(byStat[g]=byStat[g]||[]).push(x);});
    r.innerHTML='<option value="">— 不連結 —</option>'+Object.keys(byStat)
      .map(g=>`<optgroup label="${esc(g)}">`+byStat[g].map(x=>{
        const t=(x.req_no?x.req_no+' ':'')+(x.fault_type?'['+x.fault_type+'] ':'')+((x.fault_desc||'').replace(/\n/g,' ').slice(0,24));
        return `<option value="${x.request_id}">${esc(t)}</option>`;
      }).join('')+`</optgroup>`).join('');
  }
}

// ── List panel（可切換瀏覽：本層標記 / 設備清單 / 空間清單 / 報修案件）──
// 找出本層是否已針對某主資料放置標記
function findMarkerByLink(kind,id){
  return markers.find(m=>m.floor_id===curFloor && m.kind===kind &&
    (kind==='equipment'?m.equipment_id===id : kind==='space'?m.space_id===id : m.repair_id===id));
}
function renderList(){
  const src=document.getElementById('fltKind').value||'markers';
  const sEl=document.getElementById('fltSearch');
  const q=sEl?sEl.value.trim().toLowerCase():'';
  const placeStatus=document.getElementById('fltPlaceStatus')?.value||'';
  const box=document.getElementById('mkList');
  const cf=canonicalFloor(curFloor);
  if(src==='markers'){
    let list=markers.filter(m=>m.floor_id===curFloor);
    const total=list.length;
    if(q) list=list.filter(m=>(m.label||'').toLowerCase().includes(q)||(m.note||'').toLowerCase().includes(q));
    if(placeStatus==='unplaced') list=[];
    box.innerHTML=list.length?list.map(m=>{
      const col=m.color||KIND[m.kind]?.c||'#ffb300';
      return `<div class="mk-item" onclick="focusMarker('${m.marker_id}')">
        <span class="cdot" style="background:${col}"></span>
        <span class="mk-name">${esc(m.label)}</span>
        <span class="mk-kind">${KIND[m.kind]?.n||''}</span></div>`;
    }).join(''):'<div class="pn-empty">此樓層尚無標記。<br>可從「設備清單／空間清單」點選項目放置，或按「放置標記模式」自訂新增。</div>';
    document.getElementById('pnCount').textContent=`本層標記：${total} 個`+(list.length!==total?`（篩選後 ${list.length}）`:'');
    return;
  }
  if(src==='patrol'){
    let list=markers.filter(m=>m.floor_id===curFloor && m.kind==='patrol');
    const total=list.length;
    if(q) list=list.filter(m=>(m.label||'').toLowerCase().includes(q)||(m.note||'').toLowerCase().includes(q));
    if(placeStatus==='unplaced') list=[];
    box.innerHTML=list.length?list.map(m=>{
      const col=m.color||KIND[m.kind]?.c||'#ffb300';
      return `<div class="mk-item" onclick="focusMarker('${m.marker_id}')">
        <span class="cdot" style="background:${col}"></span>
        <span class="mk-name">${esc(m.label)}</span>
        <span class="mk-kind">${KIND[m.kind]?.n||''}</span></div>`;
    }).join(''):'<div class="pn-empty">此樓層尚無巡邏點。<br>可按「放置標記模式」新增。</div>';
    document.getElementById('pnCount').textContent=`巡邏點：${total} 個`+(list.length!==total?`（篩選後 ${list.length}）`:'');
    return;
  }
  // ── 主資料清單瀏覽 ──
  let items=[], kind=src;
  if(src==='equipment'){
    items=equip.slice().map(x=>({id:x.equipment_id,name:x.name,sub:x.location||'',match:(x.location||'').toUpperCase().includes(curFloor.toUpperCase())}));
  }else if(src==='space'){
    items=spaces.filter(x=>canonicalFloor(x.floor)===cf).map(x=>({id:x.space_id,name:x.space_name,sub:x.floor,match:true}));
  }else if(src==='repair'){
    items=repairs.map(x=>({id:x.request_id,name:(x.req_no?x.req_no+' ':'')+(x.fault_type||'報修'),sub:(x.fault_desc||'').replace(/\n/g,' ').slice(0,20),match:true}));
  }
  let list=items;
  if(q) list=list.filter(it=>(it.name||'').toLowerCase().includes(q)||(it.sub||'').toLowerCase().includes(q));
  let listed=list.map(it=>({...it,mk:findMarkerByLink(kind,it.id)}));
  const baseTotal=listed.length;
  const placedN=listed.filter(it=>it.mk).length;
  const unplacedN=baseTotal-placedN;
  if(placeStatus==='placed') listed=listed.filter(it=>it.mk);
  if(placeStatus==='unplaced') listed=listed.filter(it=>!it.mk);
  // 相對應樓層優先置頂
  listed.sort((a,b)=>(a.match===b.match?0:a.match?-1:1)||(a.name||'').localeCompare(b.name||'','zh-Hant'));
  const col=KIND[kind].c;
  const emptyText=baseTotal
    ? '查無符合目前篩選的項目。'
    : (src==='space'?'本層（區域位置表）尚無空間資料。<br>可於「區域位置表」新增或匯入，或切換樓層。':'目前清單無資料或查無符合項目。');
  box.innerHTML=listed.length?listed.map(it=>{
    const mk=it.mk;
    return `<div class="mk-item" onclick="pickListItem('${kind}','${it.id}')">
      <span class="cdot" style="background:${col};${mk?'':'opacity:.35'}"></span>
      <span class="mk-name">${esc(it.name)}${it.sub?` <small style="color:var(--text2)">· ${esc(it.sub)}</small>`:''}</span>
      <span class="mk-kind" style="${mk?'border-color:'+col+';color:'+col:''}">${mk?'已設置':'未設置'}</span></div>`;
  }).join(''):`<div class="pn-empty">${emptyText}</div>`;
  const nm={equipment:'設備',space:'空間',repair:'報修案件'}[kind];
  document.getElementById('pnCount').textContent=`${nm}清單：${baseTotal} 項（已設置 ${placedN}，未設置 ${unplacedN}`+(listed.length!==baseTotal?`，篩選後 ${listed.length}`:'')+'）';
}

// 點清單項目：已設置 → 定位該標記；未設置 → 進入放置模式（自動帶入連結與名稱）
function pickListItem(kind,id){
  const mk=findMarkerByLink(kind,id);
  if(mk){focusMarker(mk.marker_id);return;}
  let label='';
  if(kind==='equipment'){const x=equip.find(e=>e.equipment_id===id);label=x?x.name:'';}
  else if(kind==='space'){const x=spaces.find(e=>e.space_id===id);label=x?x.space_name:'';}
  else if(kind==='repair'){const x=repairs.find(e=>e.request_id===id);label=x?((x.req_no?x.req_no+' ':'')+(x.fault_type||'報修')):'';}
  startPlaceLinked(kind,id,label);
}
function startPlaceLinked(kind,id,label){
  pendingLink={kind,id,label};
  if(!placeMode) togglePlace();
  const h=document.getElementById('placehint');
  h.textContent=`點選平面圖放置：${label}（${KIND[kind].n}）　·　再按放置鍵取消`;
  h.classList.add('on');
}

function focusMarker(id){
  const m=markers.find(x=>x.marker_id===id); if(!m)return;
  if(m.floor_id!==curFloor) showFloor(m.floor_id);
  viewer.viewport.panTo(new OpenSeadragon.Point(m.x,m.y));
  viewer.viewport.zoomTo(Math.max(viewer.viewport.getZoom(),2));
  detailId=id; markLoadedSelection();
  let tries=0;
  const tryOpen=()=>{
    const el=document.querySelector('.pin[data-id="'+id+'"]');
    if(el){ openDetailByEl(m,el); return; }
    if(++tries<15) setTimeout(tryOpen,150);
  };
  setTimeout(tryOpen,350);
}

// ── Place mode ─────────────────────────────────────────────
function togglePlace(){
  placeMode=!placeMode;
  if(!placeMode) pendingLink=null;
  document.getElementById('btnPlace').classList.toggle('on',placeMode);
  const h=document.getElementById('placehint');
  h.classList.toggle('on',placeMode);
  if(placeMode&&!pendingLink) h.textContent='點選平面圖任一位置放置標記　·　再按一次退出放置模式';
  document.getElementById('btnPlace').textContent=placeMode?'✓ 放置中（點圖新增 / 再按退出）':'＋ 放置標記模式';
  viewer.setMouseNavEnabled(true);
}

function togglePanel(open){
  document.body.classList.toggle('panel-open',open);
  if(!open){ document.body.classList.remove('panel-pinned'); syncPinBtn(false); }
}
function togglePin(){
  const pinned=!document.body.classList.contains('panel-pinned');
  document.body.classList.toggle('panel-pinned',pinned);
  if(pinned) document.body.classList.add('panel-open');
  syncPinBtn(pinned);
}
function syncPinBtn(pinned){
  const b=document.getElementById('pinBtn'); if(!b)return;
  b.classList.toggle('on',pinned); b.textContent=pinned?'📌 已釘住':'📌 釘住';
}

viewer.addHandler('canvas-click',ev=>{
  if(ev.originalEvent.target.closest && ev.originalEvent.target.closest('.pin')) return; // 點標記交給標記自身
  if(placeMode){
    if(!ev.quick) return;                                 // 放置模式：忽略拖曳
    const vp=viewer.viewport.pointFromPixel(ev.position);
    const link=pendingLink; pendingLink=null;
    openMkCreate(vp.x,vp.y);
    if(link) applyPendingLink(link);
    return;
  }
  // 非放置模式：左鍵點圖面空白處 → 關閉彈窗；未釘住時才收合選單
  if(ev.quick){ hideDetail(); if(!document.body.classList.contains('panel-pinned')) togglePanel(false); }
});
// 從清單帶入的連結套用到新增標記表單
function applyPendingLink(link){
  pickKind(link.kind);
  if(link.kind==='equipment') document.getElementById('mkEqp').value=link.id||'';
  else if(link.kind==='space') document.getElementById('mkSpace').value=link.id||'';
  else if(link.kind==='repair') document.getElementById('mkRepair').value=link.id||'';
  if(link.label) document.getElementById('mkLabel').value=link.label;
  document.getElementById('placehint').textContent='點選平面圖任一位置放置標記　·　再按一次退出放置模式';
}

function pickKind(k){

  document.querySelectorAll('#kindRow .kbtn').forEach(b=>{
    const on=b.dataset.k===k; b.classList.toggle('on',on);
    b.style.background=on?(KIND[k].c):'none'; b.style.borderColor=on?KIND[k].c:'';
  });
  document.getElementById('fldEqp').style.display=(k==='equipment')?'block':'none';
  document.getElementById('fldSpace').style.display=(k==='space')?'block':'none';
  document.getElementById('fldRepair').style.display=(k==='repair')?'block':'none';
}
function onLinkEqp(){const o=document.getElementById('mkEqp');const t=o.options[o.selectedIndex]?.textContent||'';
  if(o.value&&!document.getElementById('mkLabel').value.trim())document.getElementById('mkLabel').value=t.replace(/\s*\(.*\)$/,'');}
function onLinkSpace(){const o=document.getElementById('mkSpace');
  if(o.value&&!document.getElementById('mkLabel').value.trim()){const s=spaces.find(x=>x.space_id===o.value);if(s)document.getElementById('mkLabel').value=s.space_name;}}
function onLinkRepair(){const o=document.getElementById('mkRepair');
  if(o.value&&!document.getElementById('mkLabel').value.trim()){const r=repairs.find(x=>x.request_id===o.value);
    if(r)document.getElementById('mkLabel').value=(r.req_no?r.req_no+' ':'')+(r.fault_type||'報修');}}

async function saveMk(){
  const label=document.getElementById('mkLabel').value.trim();
  const msg=document.getElementById('mkMsg');
  if(!label){msg.textContent='請輸入標記名稱';return;}
  const rec={floor_id:editId?markers.find(m=>m.marker_id===editId).floor_id:curFloor,
    x:pendX, y:pendY, kind:curKind, label,
    equipment_id:(curKind==='equipment'?(document.getElementById('mkEqp').value||null):null),
    space_id:(curKind==='space'?(document.getElementById('mkSpace').value||null):null),
    repair_id:(curKind==='repair'?(document.getElementById('mkRepair').value||null):null),
    note:document.getElementById('mkNote').value.trim()||null};
  let error;
  if(editId){({error}=await db.from('plan_markers').update(rec).eq('marker_id',editId));}
  else{({error}=await db.from('plan_markers').insert(rec));}
  if(error){msg.textContent='儲存失敗：'+translateError(error.message);return;}
  closeMk(); await loadData();
}
async function deleteMk(){
  if(!editId)return;
  if(!confirm('確定停用此標記？歷史資料會永久保留。'))return;
  const {error}=await db.from('plan_markers').update({status:'inactive'}).eq('marker_id',editId);
  if(error){document.getElementById('mkMsg').textContent='停用失敗：'+translateError(error.message);return;}
  closeMk(); detailId=null; await loadData();
}

// ── Detail popup ───────────────────────────────────────────
function openDetail(id,ev){const m=markers.find(x=>x.marker_id===id);if(!m)return;
  const el=ev.currentTarget||document.querySelector('.pin[data-id="'+id+'"]');openDetailByEl(m,el);}
function openDetailByEl(m,el){
  detailId=m.marker_id; markLoadedSelection();
  const col=m.color||KIND[m.kind]?.c||'#ffb300';
  document.getElementById('dtDot').style.background=col;
  document.getElementById('dtName').textContent=m.label;
  let extra='';
  if(m.equipment_id){const e=equip.find(x=>x.equipment_id===m.equipment_id);if(e)extra+=`<div class="r">設備：<b>${esc(e.name)}</b></div>`;}
  if(m.space_id){const s=spaces.find(x=>x.space_id===m.space_id);if(s)extra+=`<div class="r">空間：<b>${esc(s.floor)} · ${esc(s.space_name)}</b></div>`;}
  if(m.repair_id){const rp=repairs.find(x=>x.request_id===m.repair_id);if(rp)extra+=`<div class="r">報修：<b>${esc((rp.req_no||'')+' '+(rp.fault_type||''))}</b></div>`;}
  document.getElementById('dtBody').innerHTML=
    `<div class="r">類型：<b>${KIND[m.kind]?.n||m.kind}</b></div>`+
    `<div class="r">樓層：<b>${esc(m.floor_id)}</b></div>`+extra+
    (m.note?`<div class="r">備註：<b>${esc(m.note)}</b></div>`:'');
  const dt=document.getElementById('detail');dt.classList.add('show');
  const r=el.getBoundingClientRect();
  let left=r.right+10, top=r.top-10;
  if(left+250>window.innerWidth) left=r.left-260;
  if(top+160>window.innerHeight) top=window.innerHeight-170;
  const minLeft=document.body.classList.contains('panel-open')?306:14;
  if(left<minLeft) left=minLeft; if(top<56) top=56;
  dt.style.left=left+'px'; dt.style.top=top+'px';
}
function hideDetail(){document.getElementById('detail').classList.remove('show');detailId=null;markLoadedSelection();}
function editFromDetail(){if(detailId){const id=detailId;hideDetail();openMkEdit(id);}}
function delFromDetail(){if(detailId){editId=detailId;deleteMk();hideDetail();}}
// keep detail popup positioned while panning
viewer.addHandler('animation',()=>{ if(detailId){const el=document.querySelector('.pin[data-id="'+detailId+'"]');const m=markers.find(x=>x.marker_id===detailId);if(el&&m)openDetailByEl(m,el);} });

// ── Tools ──────────────────────────────────────────────────
function updHud(){
  if(!viewer.viewport) return;
  const z=Math.round(viewer.viewport.getZoom(true)/viewer.viewport.getHomeZoom()*100);
  document.getElementById('h-zoom').textContent=z+'%';
  document.getElementById('h-rot').textContent=(((rot%360)+360)%360)+'°';
}
function setRot(d){ rot=d; viewer.viewport.setRotation(((rot%360)+360)%360); updHud(); }
viewer.addHandler('zoom',updHud); viewer.addHandler('animation',updHud);
document.getElementById('t-zin').onclick =()=>{viewer.viewport.zoomBy(1.4);viewer.viewport.applyConstraints();};
document.getElementById('t-zout').onclick=()=>{viewer.viewport.zoomBy(0.71);viewer.viewport.applyConstraints();};
document.getElementById('t-rl').onclick  =()=>setRot(rot-15);
document.getElementById('t-rr').onclick  =()=>setRot(rot+15);
document.getElementById('t-lab').onclick =()=>{showLabels=!showLabels;document.querySelectorAll('.pin').forEach(p=>p.classList.toggle('show-lab',showLabels));};
document.getElementById('t-home').onclick=()=>{viewer.viewport.goHome();setRot(0);};
document.getElementById('t-fs').onclick   =()=>viewer.setFullScreen(!viewer.isFullPage());
document.getElementById('m-mk').addEventListener('click',e=>{if(e.target.id==='m-mk')closeMk();});
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='+'||e.key==='='){viewer.viewport.zoomBy(1.4);viewer.viewport.applyConstraints();}
  else if(e.key==='-'){viewer.viewport.zoomBy(0.71);viewer.viewport.applyConstraints();}
  else if(e.key==='['){setRot(rot-15);} else if(e.key===']'){setRot(rot+15);}
  else if(e.key==='0'){viewer.viewport.goHome();setRot(0);}
  else if(e.key==='1'){showFloor('1F');} else if(e.key==='2'){showFloor('2F');}
  else if(e.key==='3'){showFloor('3F');} else if(e.key==='b'||e.key==='B'){showFloor('B1');}
  else if(e.key==='Escape'){if(placeMode)togglePlace();hideDetail();closeMk();}
});

buildSources();
loadData();
setInterval(refreshPatrolStatus,60000);
</script>
</body>
