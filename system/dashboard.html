<style>
:root{--bg:#020b18;--surface:#04111f;--panel:#05101e;--border:#0c2840;--border-hi:#1a4a70;
  --cyan:#00d4ff;--blue:#1a7fff;--green:#00ff9d;--amber:#ffb300;--red:#ff3b3b;--purple:#b48aff;
  --text:#a8d8f0;--text-hi:#d4eeff;--text-dim:#3a6a8a;--font-head:'Rajdhani',sans-serif;--font-mono:'Share Tech Mono',monospace}
:root[data-theme="light"]{--bg:#f4f6fa;--surface:#ffffff;--panel:#ffffff;--border:#dbe4ee;--border-hi:#93b4d6;--cyan:#0284c7;--blue:#2563eb;--green:#059669;--amber:#b45309;--red:#dc2626;--purple:#7c3aed;--text:#1e293b;--text-hi:#0f172a;--text-dim:#64748b}
:root[data-theme="light"] body{background-image:none}
:root[data-theme="light"] .navbar{background:rgba(255,255,255,.97)}
:root[data-theme="light"] .nav-title{text-shadow:none}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:linear-gradient(rgba(0,212,255,.014) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.014) 1px,transparent 1px);background-size:40px 40px;padding-bottom:40px}
a{color:inherit;text-decoration:none}
.navbar{background:rgba(3,10,22,.97);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.nav-title{font-family:var(--font-head);font-size:1.15rem;font-weight:700;color:var(--cyan);letter-spacing:.06em;text-shadow:0 0 14px rgba(0,212,255,.5)}
.nav-sub{font-size:.7rem;color:var(--text-dim)}.nav-space{flex:1}
.nav-back{font-size:.7rem;color:var(--text-dim);border:1px solid var(--border);padding:5px 10px;border-radius:2px;cursor:pointer;background:none;transition:all .2s}
.nav-back:hover{border-color:var(--cyan);color:var(--cyan)}
.wrap{max-width:1480px;margin:0 auto;padding:20px 24px 40px}
.dashboard-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:16px}
.dashboard-eyebrow{font-family:var(--font-mono);font-size:.68rem;color:var(--cyan);letter-spacing:.14em;margin-bottom:5px}
.dashboard-head h1{font-family:var(--font-head);font-size:1.65rem;line-height:1.15;color:var(--text-hi);letter-spacing:.04em}
.dashboard-head p{margin-top:6px;color:var(--text-dim);font-size:.78rem}
.head-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding:8px 12px;border-left:2px solid var(--cyan);font-size:.72rem;color:var(--text-dim)}
.section-title{display:flex;align-items:center;gap:10px;margin:20px 0 10px;color:var(--text-hi);font-family:var(--font-head);font-size:.92rem;font-weight:700;letter-spacing:.08em}
.section-title::before{content:'';width:4px;height:16px;border-radius:2px;background:var(--cyan);box-shadow:0 0 10px rgba(0,212,255,.4)}
.section-title span{margin-left:auto;color:var(--text-dim);font-family:var(--font-mono);font-size:.62rem;font-weight:400;letter-spacing:.04em}

/* ── toolbar ── */
.toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;padding:12px 14px;background:var(--panel);border:1px solid var(--border);border-radius:6px}
.toolbar-group,.toolbar-range{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar-range{margin-left:auto}
.toolbar-label{color:var(--text-dim);font-size:.72rem;white-space:nowrap}
.toolbar input[type=date]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:.78rem;outline:none;min-height:36px}
.toolbar input:focus{border-color:var(--cyan)}
.qbtn{font-size:.74rem;color:var(--text-dim);border:1px solid var(--border);padding:8px 14px;border-radius:4px;cursor:pointer;background:var(--surface);transition:all .2s;min-height:36px}
.qbtn:hover,.qbtn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.06)}
.updated{font-size:.65rem;color:var(--text-dim);font-family:var(--font-mono)}
.empty{color:var(--text-dim);font-size:.78rem;text-align:center;padding:20px}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;color:var(--cyan);font-family:var(--font-head);letter-spacing:.1em}

/* ── alert bar ── */
.alert-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:14px}
.al{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:.78rem;min-height:54px}
.al .al-icon{width:8px;height:8px;border-radius:50%}
.al .al-n{font-family:var(--font-head);font-size:1.25rem;font-weight:700;margin-right:2px}
.al.danger{border-left:3px solid var(--red)}.al.danger .al-icon{background:var(--red);box-shadow:0 0 6px var(--red)}.al.danger .al-n{color:var(--red)}
.al.warn{border-left:3px solid var(--amber)}.al.warn .al-icon{background:var(--amber);box-shadow:0 0 6px var(--amber)}.al.warn .al-n{color:var(--amber)}
.al.info{border-left:3px solid var(--cyan)}.al.info .al-icon{background:var(--cyan)}.al.info .al-n{color:var(--cyan)}
.al .al-l{color:var(--text-dim)}
.al .al-s{font-size:.65rem;color:var(--text-dim);margin-left:4px;font-family:var(--font-mono)}

/* ── KPI strip (horizontal) ── */
.kpi-strip{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:12px;margin-bottom:16px}
.ks{position:relative;display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px;min-width:0;min-height:88px;overflow:hidden}
.ks::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ksc,var(--cyan))}
.ks .ks-icon{display:flex;align-items:center;justify-content:center;width:34px;height:34px;flex:0 0 34px;border-radius:8px;background:color-mix(in srgb,var(--ksc,var(--cyan)) 10%,transparent);font-size:1.05rem;opacity:.85}
.ks .ks-b{display:flex;flex-direction:column}
.ks .ks-n{font-family:var(--font-head);font-size:1.65rem;font-weight:700;color:var(--ksc,var(--cyan));line-height:1.05}
.ks .ks-u{font-size:.68rem;color:var(--text-dim);font-family:var(--font-mono)}
.ks .ks-l{font-size:.7rem;color:var(--text-dim);margin-top:4px;white-space:nowrap}

/* ── main two‑col layout ── */
.dash-main{display:grid;grid-template-columns:minmax(0,1.85fr) minmax(340px,1fr);gap:16px;margin-bottom:16px;align-items:stretch}

/* ── patrol ── */
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:18px;min-height:470px;display:flex;flex-direction:column}
.pcard h3{font-family:var(--font-head);font-size:1rem;color:var(--cyan);letter-spacing:.05em;margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.pcard h3 .tag{font-size:.6rem;color:var(--text-dim);font-family:var(--font-mono);border:1px solid var(--border);padding:1px 6px;border-radius:2px;margin-left:auto}
.ps{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.pc{background:rgba(12,40,64,.3);border:1px solid var(--border);border-radius:5px;padding:10px 12px;min-width:80px;text-align:center}
.pc .n{font-family:var(--font-head);font-size:1.55rem;font-weight:700;line-height:1.1}
.pc.ok .n{color:var(--green)}.pc.pending .n{color:var(--purple)}.pc.overdue .n{color:var(--red)}
.pc .l{font-size:.6rem;color:var(--text-dim);margin-top:1px}
#pi{font-size:.74rem;color:var(--text-dim);margin:2px 0 8px}
#pg{overflow:auto;height:336px;border-top:1px solid var(--border)}
.pt{border-collapse:collapse;width:100%;font-size:.74rem}
.pt th{text-align:center;color:var(--text-dim);font-size:.65rem;padding:7px 6px;border-bottom:1px solid var(--border);font-weight:400;white-space:nowrap;position:sticky;top:0;background:var(--panel);z-index:2}
.pt th.pl{text-align:left;position:sticky;top:0;background:var(--panel);z-index:2}
.pt td{text-align:center;padding:4px 6px;border-bottom:1px solid rgba(12,40,64,.35)}
.pt td.pl{text-align:left;white-space:nowrap}
.pt tr:hover td{background:rgba(0,212,255,.03)}
.pd{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:.65rem;font-weight:700;color:#022}
.pd.ok{background:var(--green)}
.pd.pending{background:var(--purple);color:#fff}
.pd.overdue{background:var(--red);color:#fff}

/* ── chart card (right column) ── */
.ccard{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:18px;min-height:470px;display:flex;flex-direction:column}
.ccard h3{font-family:var(--font-head);font-size:1rem;color:var(--cyan);letter-spacing:.05em;margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.ccard h3 .tag{font-size:.6rem;color:var(--text-dim);font-family:var(--font-mono);border:1px solid var(--border);padding:1px 6px;border-radius:2px;margin-left:auto}
.chart-box{position:relative;flex:1;min-height:380px}

/* ── rankings 2x2 ── */
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.rcard{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px 18px;min-height:190px}
.rcard h3{font-family:var(--font-head);font-size:.92rem;color:var(--cyan);letter-spacing:.05em;margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.rcard h3 .tag{font-size:.58rem;color:var(--text-dim);font-family:var(--font-mono);border:1px solid var(--border);padding:1px 5px;border-radius:2px;margin-left:auto}
.bars{display:flex;flex-direction:column;gap:7px}
.bar-row{display:grid;grid-template-columns:minmax(100px,140px) 1fr 36px;align-items:center;gap:8px;font-size:.76rem}
.bar-row .nm{color:var(--text-hi);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{background:rgba(12,40,64,.5);border-radius:3px;height:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--blue))}
.bar-row .vv{text-align:right;color:var(--cyan);font-family:var(--font-mono);font-size:.74rem}

/* ── trend full width ── */
.tcard{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:18px;margin-bottom:16px}
.tcard h3{font-family:var(--font-head);font-size:1rem;color:var(--cyan);letter-spacing:.05em;margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.tcard h3 .tag{font-size:.6rem;color:var(--text-dim);font-family:var(--font-mono);border:1px solid var(--border);padding:1px 6px;border-radius:2px;margin-left:auto}
.trend-box{position:relative;height:300px}

@media(max-width:1200px){
  .kpi-strip{grid-template-columns:repeat(4,minmax(0,1fr))}
  .dash-main{grid-template-columns:minmax(0,1.55fr) minmax(320px,1fr)}
}
@media(max-width:900px){
  .wrap{padding:16px}
  .dashboard-head{align-items:flex-start;flex-direction:column}.head-meta{align-items:flex-start}
  .toolbar-range{margin-left:0}
  .kpi-strip{grid-template-columns:repeat(3,minmax(0,1fr))}
  .dash-main{grid-template-columns:1fr}.pcard,.ccard{min-height:auto}.chart-box{height:320px;min-height:320px}
}
@media(max-width:640px){
  .wrap{padding:12px 10px 28px}.dashboard-head h1{font-size:1.35rem}.dashboard-head p{font-size:.72rem}
  .toolbar{align-items:stretch;padding:10px}.toolbar-group,.toolbar-range{width:100%}.toolbar-range input{flex:1;min-width:0}
  .qbtn{flex:1}.toolbar-label{width:100%}
  .kpi-strip{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.ks{min-height:78px;padding:11px}.ks .ks-icon{display:none}.ks .ks-n{font-size:1.45rem}
  .section-title{margin-top:16px}.dash-main,.rank-grid{gap:10px}.rank-grid{grid-template-columns:1fr}
  .pcard,.ccard,.rcard,.tcard{padding:13px}.ps{gap:6px}.pc{padding:8px 6px}.pc .n{font-size:1.35rem}
  #pg{height:360px}.chart-box{height:280px;min-height:280px}.trend-box{height:240px}
  .bar-row{grid-template-columns:90px 1fr 28px}
}

<div class="wrap">

    <div>

<script>
const SUPA_URL='https://qztffronusdhgxhjjubt.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dGZmcm9udXNkaGd4aGpqdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI1MzgsImV4cCI6MjA5NzI2ODUzOH0.FnUxot5YXI3yKCUCmJA5P4ysEJhmtaQQA6rM7MRy3oA';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
(async()=>{const {data:{session}}=await db.auth.getSession();if(!session){location.href='login.html';}})();

const OPEN_REQ=['pending','transferred','assigned','in_progress','waiting_parts','waiting_vendor','pending_review'];
const DONE_ORD=['completed','closed'];
let trendChart=null, statusChart=null;

function ymd(d){const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function ym(d){const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}`;}
function cssVar(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim();}
function quick(r){
  const now=new Date(); let f;
  if(r==='today') f=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  else if(r==='month') f=new Date(now.getFullYear(),now.getMonth(),1);
  else f=new Date(now.getFullYear(),0,1);
  document.getElementById('from').value=ymd(f);
  document.getElementById('to').value=ymd(now);
  document.querySelectorAll('.qbtn[data-range]').forEach(b=>b.classList.toggle('active',b.dataset.range===r));
  load();
}

async function fetchReqs(from,toEnd){
  let res=await db.from('repair_requests')
    .select('request_id,department,equipment_id,status,fault_type,created_at,desired_finish,hidden,equipment(name,category)')
    .gte('created_at',from).lte('created_at',toEnd).limit(5000);
  if(res.error){
    schemaHint();
    res=await db.from('repair_requests').select('request_id,department,equipment_id,status,created_at,equipment(name)')
      .gte('created_at',from).lte('created_at',toEnd).limit(5000);
    return (res.data||[]).map(r=>({...r,fault_type:null,desired_finish:null,hidden:false}));
  }
  return (res.data||[]).filter(r=>!r.hidden);
}
async function fetchOrds(){
  let res=await db.from('maintenance_orders')
    .select('order_id,assignee_id,status,start_time,finish_time,expected_finish,created_at,hidden,users:assignee_id(name)').limit(5000);
  if(res.error){
    res=await db.from('maintenance_orders').select('order_id,assignee_id,status,start_time,finish_time,created_at,users:assignee_id(name)').limit(5000);
    return (res.data||[]).map(o=>({...o,expected_finish:null,hidden:false}));
  }
  return (res.data||[]).filter(o=>!o.hidden);
}
function schemaHint(){
  if(document.getElementById('schemaHint')) return;
  const d=document.createElement('div'); d.id='schemaHint';
  d.style.cssText='background:rgba(255,179,0,.1);border:1px solid var(--amber);color:var(--amber);padding:8px 12px;border-radius:3px;font-size:.74rem;margin-bottom:12px';
  d.innerHTML='\u26a0 部分進階欄位尚未建立，目前顯示基本統計。請在 Supabase SQL Editor 執行 <b>system/sql/work_order_schema.sql</b> 以啟用完整 KPI（逾期/SLA 等）。';
  document.querySelector('.wrap').insertBefore(d,document.querySelector('.alert-bar'));
}

async function load(){
  const from=document.getElementById('from').value, to=document.getElementById('to').value;
  const toEnd=to+'T23:59:59';
  document.getElementById('rangeLbl').textContent=`\u5340\u9593\uff1a${from} ~ ${to}`;
  const [R,O]=await Promise.all([fetchReqs(from,toEnd),fetchOrds()]);
  render(R,O,from,to);
  document.getElementById('updatedLbl').textContent=`最後更新：${new Date().toLocaleTimeString('zh-TW',{hour12:false})}`;
  document.getElementById('loading').style.display='none';
}

function inRange(ts,from,to){ if(!ts) return false; const d=ts.slice(0,10); return d>=from && d<=to; }

function render(R,O,from,to){
  const today=ymd(new Date());
  const monthStart=today.slice(0,7);
  const todayNew=R.filter(r=>r.created_at?.slice(0,10)===today).length;
  const todayDone=O.filter(o=>DONE_ORD.includes(o.status)&&o.finish_time?.slice(0,10)===today).length;
  const inProg=O.filter(o=>['accepted','in_progress','waiting_parts','waiting_vendor','assigned'].includes(o.status)).length;
  const now=new Date();
  const overdue=O.filter(o=>!DONE_ORD.includes(o.status)&&o.expected_finish&&new Date(o.expected_finish)<now).length
              + R.filter(r=>OPEN_REQ.includes(r.status)&&r.desired_finish&&new Date(r.desired_finish)<now).length;
  const waitDispatch=R.filter(r=>r.status==='pending').length;
  const monthCnt=R.filter(r=>r.created_at?.slice(0,7)===monthStart).length;
  const doneO=O.filter(o=>DONE_ORD.includes(o.status)&&o.finish_time);
  const onTime=doneO.filter(o=>o.expected_finish? new Date(o.finish_time)<=new Date(o.expected_finish):true).length;
  const sla=doneO.length? Math.round(onTime/doneO.length*100):null;
  const mttrArr=doneO.filter(o=>o.start_time).map(o=>(new Date(o.finish_time)-new Date(o.start_time))/3600000);
  const mttr=mttrArr.length? (mttrArr.reduce((a,b)=>a+b,0)/mttrArr.length):null;
  const byEq={}; R.forEach(r=>{ if(!r.equipment_id)return; (byEq[r.equipment_id]||(byEq[r.equipment_id]=[])).push(new Date(r.created_at)); });
  let gaps=[]; Object.values(byEq).forEach(arr=>{ if(arr.length<2)return; arr.sort((a,b)=>a-b); for(let i=1;i<arr.length;i++) gaps.push((arr[i]-arr[i-1])/86400000); });
  const mtbf=gaps.length? (gaps.reduce((a,b)=>a+b,0)/gaps.length):null;

  // alert bar
  const alerts=[
    overdue>0 ? `<div class="al danger"><span class="al-icon"></span><span class="al-n">${overdue}</span><span class="al-l">已逾期</span></div>` : '',
    waitDispatch>0 ? `<div class="al warn"><span class="al-icon"></span><span class="al-n">${waitDispatch}</span><span class="al-l">待派工</span></div>` : '',
    `<div class="al info"><span class="al-icon"></span><span class="al-n">${R.length}</span><span class="al-l">區間報修</span><span class="al-s">|</span><span class="al-n">${doneO.length}</span><span class="al-l">已完成</span></div>`,
  ];
  document.getElementById('alertBar').innerHTML=alerts.filter(Boolean).join('');

  // KPI strip
  const kpis=[
    {n:todayNew,l:'新增',c:'var(--cyan)',ic:'\u2795'},
    {n:todayDone,l:'完成',c:'var(--green)',ic:'\u2714'},
    {n:inProg,l:'處理中',c:'var(--blue)',ic:'\u2699'},
    {n:sla==null?'—':sla+'%',l:'SLA',c:'var(--amber)',ic:'\u26a0'},
    {n:mttr==null?'—':mttr.toFixed(1),u:'h',l:'MTTR',c:'var(--cyan)',ic:'\u23f1'},
    {n:mtbf==null?'—':mtbf.toFixed(1),u:'d',l:'MTBF',c:'var(--purple)',ic:'\u26a1'},
    {n:monthCnt,l:'本月',c:'var(--green)',ic:'\ud83d\udcc5'},
  ];
  document.getElementById('kpiStrip').innerHTML=kpis.map(k=>
    `<div class="ks" style="--ksc:${k.c}"><div class="ks-icon">${k.ic}</div><div class="ks-b"><div class="ks-n">${k.n}${k.u?`<span class="ks-u"> ${k.u}</span>`:''}</div><div class="ks-l">${k.l}</div></div></div>`).join('');

  // rankings
  rankBars('rkDept', countBy(R,r=>r.department||'\u672a\u586b'));
  rankBars('rkEqp',  countBy(R,r=>r.equipment?.name||'\u672a\u77e5\u8a2d\u5099'));
  rankBars('rkFault',countBy(R,r=>r.fault_type||'\u672a\u5206\u985e'));
  rankBars('rkTech', countBy(O,o=>o.users?.name||'\u672a\u6307\u6d3e'));

  // status distribution
  const stMap={pending:'\u5f85\u6d3e\u5de5',transferred:'\u5df2\u8f49\u6d3e',assigned:'\u5df2\u6d3e\u5de5',accepted:'\u5df2\u63a5\u55ae',in_progress:'\u7dad\u4fee\u4e2d',waiting_parts:'\u7b49\u5f85\u6599\u4ef6',waiting_vendor:'\u7b49\u5f85\u5ee0\u5546',pending_review:'\u5f85\u9a57\u6536',completed:'\u5df2\u5b8c\u6210',closed:'\u5df2\u7d50\u6848',returned:'\u5df2\u9000\u56de',rejected:'\u5df2\u62d2\u7d55',cancelled:'\u5df2\u53d6\u6d88',overdue:'\u5df2\u903e\u671f'};
  const stc=countBy(R,r=>stMap[r.status]||'\u672a\u77e5\u72c0\u614b');
  drawDoughnut('statusChart',stc);

  drawTrend();
}

function countBy(arr,fn){const m={};arr.forEach(x=>{const k=fn(x);m[k]=(m[k]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);}
function rankBars(id,entries){
  const box=document.getElementById(id);
  if(!entries.length){box.innerHTML='<div class="empty">\u7121\u8cc7\u6599</div>';return;}
  const max=entries[0][1];
  box.innerHTML=entries.slice(0,8).map(([k,v])=>
    `<div class="bar-row"><div class="nm" title="${k}">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,v/max*100)}%"></div></div><div class="vv">${v}</div></div>`).join('');
}
function drawDoughnut(id,entries){
  const ctx=document.getElementById(id);
  if(statusChart) statusChart.destroy();
  if(!entries.length){return;}
  const cols=['#00d4ff','#1a7fff','#00ff9d','#ffb300','#b48aff','#ff3b3b','#5a8ab0','#00a8cc','#cc7700','#1aaa66','#cc1199','#888'];
  statusChart=new Chart(ctx,{type:'doughnut',data:{labels:entries.map(e=>e[0]),datasets:[{data:entries.map(e=>e[1]),backgroundColor:cols,borderColor:cssVar('--panel'),borderWidth:3,hoverOffset:7}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:innerWidth<640?'bottom':'right',labels:{color:cssVar('--text'),font:{size:12},boxWidth:12,padding:14,usePointStyle:true}},tooltip:{padding:10}},cutout:'62%',layout:{padding:8}}});
}
async function drawTrend(){
  const now=new Date(); const labels=[],keys=[];
  for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);labels.push((d.getMonth()+1)+'\u6708');keys.push(ym(d));}
  const start=keys[0]+'-01';
  const {data}=await db.from('repair_requests').select('created_at,hidden').gte('created_at',start).limit(20000);
  const cnt={}; (data||[]).filter(r=>!r.hidden).forEach(r=>{const k=r.created_at?.slice(0,7);cnt[k]=(cnt[k]||0)+1;});
  const vals=keys.map(k=>cnt[k]||0);
  const ctx=document.getElementById('trendChart');
  if(trendChart) trendChart.destroy();
  trendChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'\u5831\u4fee\u4ef6\u6578',data:vals,borderColor:cssVar('--cyan'),backgroundColor:'rgba(0,212,255,.12)',fill:true,tension:.35,pointRadius:4,pointHoverRadius:6,pointBackgroundColor:cssVar('--cyan'),borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},plugins:{legend:{labels:{color:cssVar('--text'),boxWidth:14,usePointStyle:true}},tooltip:{padding:10}},scales:{x:{ticks:{color:cssVar('--text-dim')},grid:{color:cssVar('--border')}},y:{ticks:{color:cssVar('--text-dim'),precision:0},grid:{color:cssVar('--border')},beginAtZero:true}}}});
}

// init
quick('month');
</script>
<script>
const P_MS=12000;let _pt;
function fh(t){return String(t||'').slice(0,5);}
async function ld(){
  if(typeof PatrolStatus==='undefined'){document.getElementById('pg').innerHTML='<div class="empty">\u8f09\u5165\u4e2d</div>';return;}
  try{
    const d=PatrolStatus.dateStrOf(new Date());
    const r=await PatrolStatus.computeMatrix(db,d);
    const {shifts,markers,matrix}=r;
    let a=0,b=0,c=0;
    matrix.forEach(v=>{if(v==='ok')a++;else if(v==='pending')b++;else c++;});
    document.getElementById('p1').textContent=a;
    document.getElementById('p2').textContent=b;
    document.getElementById('p3').textContent=c;
    const n=new Date();
    const s=shifts.find(x=>n>=x.range.start&&n<=x.range.end);
    if(s) document.getElementById('pi').innerHTML='\u73ed\u5225\uff1a<b style="color:var(--cyan)">'+s.name+'</b> ('+fh(s.start_time)+'-'+fh(s.end_time)+')';
    else if(shifts.length) document.getElementById('pi').innerHTML='<span style="color:var(--text-dim)">\u76ee\u524d\u7121\u9032\u884c\u4e2d\u73ed\u5225</span>';
    else document.getElementById('pi').innerHTML='<span style="color:var(--text-dim)">\u5c1a\u672a\u8a2d\u5b9a\u73ed\u5225\u6392\u7a0b</span>';
    const g=document.getElementById('pg');
    if(!shifts.length||!markers.length){g.innerHTML='<div class="empty">'+(!shifts.length?'\u5c1a\u672a\u8a2d\u5b9a\u73ed\u5225\u6392\u7a0b':'\u5c1a\u7121\u5de1\u908f\u9ede')+'</div>';return;}
    const ic={ok:'\u2713',pending:'\u2026',overdue:'\u2715'};
    g.innerHTML='<table class="pt"><tr><th class="pl">\u5de1\u6aa2\u9ede</th>'+shifts.map(x=>'<th>'+x.name+'<br>'+fh(x.start_time)+'-'+fh(x.end_time)+'</th>').join('')+'</tr>'
      +markers.map(m=>'<tr><td class="pl">'+(m.floor_id||'')+' '+(m.label||'')+'</td>'
        +shifts.map(x=>{const st=matrix.get(x.shift_id+'|'+m.marker_id)||'pending';return '<td><span class="pd '+st+'">'+ic[st]+'</span></td>';}).join('')+'</tr>').join('')+'</table>';
  }catch(e){document.getElementById('pg').innerHTML='<div class="empty">\u8f09\u5165\u5931\u6557</div>';}
}
function sr(){ld();if(_pt)clearInterval(_pt);_pt=setInterval(ld,P_MS);}
sr();
</script>
