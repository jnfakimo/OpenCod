<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>維修完工回報 — 第一果菜市場</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & THEME ===== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020b18;--surface:#04111f;--panel:#05101e;
  --border:#0c2840;--border-hi:#1a4a70;
  --cyan:#00d4ff;--cyan-dim:rgba(0,212,255,0.12);--cyan-glow:0 0 14px rgba(0,212,255,0.5);
  --blue:#1a7fff;--green:#00ff9d;--amber:#ffb300;--red:#ff3b3b;--purple:#b48aff;
  --text:#a8d8f0;--text-hi:#d4eeff;--text-dim:#3a6a8a;
  --font-mono:'Share Tech Mono',monospace;--font-head:'Rajdhani',sans-serif;
}
:root[data-theme="light"]{
  --bg:#f4f7fb;--surface:#ffffff;--panel:#ffffff;
  --border:#d7e1ec;--border-hi:#8bb0cf;
  --cyan:#007bb8;--cyan-dim:rgba(0,123,184,.10);--cyan-glow:0 0 0 transparent;
  --blue:#0969da;--green:#007d58;--amber:#ae6500;--red:#c62828;--purple:#7446d8;
  --text:#344e68;--text-hi:#102a43;--text-dim:#657a90;
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);
  background-image:linear-gradient(rgba(0,212,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.018) 1px,transparent 1px);
  background-size:48px 48px;color:var(--text);min-height:100vh;padding-bottom:60px}
a{color:inherit;text-decoration:none}

/* ===== GENERAL (WHITE) THEME ===== */
:root[data-theme="light"] body{background-image:linear-gradient(rgba(9,105,218,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(9,105,218,.035) 1px,transparent 1px)}
:root[data-theme="light"] .navbar{background:rgba(255,255,255,.97);box-shadow:0 1px 8px rgba(22,52,82,.08)}
:root[data-theme="light"] .nav-user{background:#eef8fd}
:root[data-theme="light"] .wo-card{box-shadow:0 2px 8px rgba(22,52,82,.045)}
:root[data-theme="light"] .wo-card:hover{box-shadow:0 8px 24px rgba(22,52,82,.13),0 0 0 1px rgba(0,123,184,.08) inset}
:root[data-theme="light"] .d-info,
:root[data-theme="light"] .cost-toggle-row{background:#f8fbfe}
:root[data-theme="light"] .field input,
:root[data-theme="light"] .field select,
:root[data-theme="light"] .field textarea{background:#fff}
:root[data-theme="light"] .tab.on{background:#edf8fd}
:root[data-theme="light"] .btn-report{background:#edf8fd}
:root[data-theme="light"] .btn-submit{background:linear-gradient(135deg,#086ea8,#075ea8);color:#fff;text-shadow:none}
:root[data-theme="light"] .btn-submit:hover{background:linear-gradient(135deg,#075e91,#064d88)}
:root[data-theme="light"] .repair-log-box,
:root[data-theme="light"] .close-case-box{background:#f3fcf8}

/* ===== NAVBAR ===== */
.navbar{background:rgba(2,8,20,0.97);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:50;flex-wrap:wrap}
.nav-title{font-family:var(--font-head);font-size:1.1rem;font-weight:700;
  color:var(--cyan);letter-spacing:.06em;text-shadow:var(--cyan-glow)}
.nav-sub{font-size:.7rem;color:var(--text-dim)}
.nav-space{flex:1}
.nav-back{font-size:.7rem;color:var(--text-dim);border:1px solid var(--border);
  padding:5px 10px;border-radius:2px;cursor:pointer;background:none;transition:all .2s}
.nav-back:hover{border-color:var(--cyan);color:var(--cyan)}
.nav-user{font-family:var(--font-mono);font-size:.72rem;color:var(--cyan);
  padding:4px 10px;border:1px solid rgba(0,212,255,.3);border-radius:2px;
  background:rgba(0,212,255,.06)}

/* ===== TOPBAR CLOCK ===== */
.topbar-clock{font-family:var(--font-mono);font-size:.72rem;color:var(--cyan);letter-spacing:.1em}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  display:inline-block;margin-right:4px;box-shadow:0 0 8px var(--green);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ===== LAYOUT ===== */
.wrap{max-width:1180px;margin:0 auto;padding:20px 16px}
.page-header{margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);position:relative}
.page-header::after{content:'';position:absolute;bottom:-1px;left:0;width:100px;height:1px;
  background:var(--cyan);box-shadow:var(--cyan-glow)}
.page-header h1{font-family:var(--font-head);font-size:1.55rem;font-weight:700;
  color:var(--cyan);letter-spacing:.06em;text-shadow:var(--cyan-glow)}
.page-header p{font-size:.73rem;color:var(--text-dim);margin-top:4px;font-family:var(--font-mono)}

/* ===== TABS ===== */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{font-family:var(--font-head);font-size:.82rem;padding:10px 20px;cursor:pointer;
  color:var(--text-dim);border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.04em}
.tab:hover{color:var(--text)}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(0,212,255,.04)}
.tab b{margin-left:5px;font-size:.78rem;color:var(--text-hi)}

/* ===== SEARCH / FILTER ===== */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.toolbar input,.toolbar select{background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:7px 10px;border-radius:2px;font-size:.78rem;outline:none;font-family:inherit}
.toolbar input:focus,.toolbar select:focus{border-color:var(--cyan)}
.tspace{flex:1}

/* ===== CARDS ===== */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.wo-card{background:var(--panel);border:1px solid var(--border);border-radius:3px;
  padding:18px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.wo-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue) 50%,transparent);opacity:.6}
.wo-card:hover{border-color:var(--border-hi);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.4),0 0 0 1px rgba(0,212,255,.1) inset}
.wo-card.urgent::before{background:linear-gradient(90deg,var(--red),#ff6b6b 50%,transparent)}
.wo-card.urgent{border-color:rgba(255,59,59,.3)}
.wo-no{font-family:var(--font-mono);font-size:.72rem;color:var(--cyan);margin-bottom:8px;letter-spacing:.04em}
.wo-title{font-size:.95rem;font-weight:700;color:var(--text-hi);margin-bottom:6px}
.wo-meta{font-size:.76rem;color:var(--text-dim);display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:10px}
.wo-meta span{display:flex;align-items:center;gap:4px}
.wo-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;
  padding-top:10px;border-top:1px solid rgba(12,40,64,.6)}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.66rem;font-weight:700;white-space:nowrap}
.urg-tag{font-size:.64rem;padding:2px 8px;border-radius:8px;font-weight:700}
.urg-urgent{background:rgba(255,59,59,.15);color:var(--red);border:1px solid rgba(255,59,59,.4)}
.urg-high{background:rgba(255,179,0,.12);color:var(--amber);border:1px solid rgba(255,179,0,.35)}
.urg-normal{background:rgba(58,106,138,.12);color:var(--text-dim);border:1px solid rgba(58,106,138,.3)}
.btn-report{background:rgba(0,212,255,.12);border:1px solid var(--cyan);color:var(--cyan);
  padding:6px 14px;border-radius:2px;cursor:pointer;font-size:.76rem;font-family:var(--font-head);
  letter-spacing:.04em;transition:all .2s;white-space:nowrap}
.btn-report:hover{background:rgba(0,212,255,.25);box-shadow:var(--cyan-glow)}
.btn-done-tag{background:rgba(0,255,157,.08);border:1px solid rgba(0,255,157,.3);color:var(--green);
  padding:6px 14px;border-radius:2px;font-size:.74rem;font-family:var(--font-head);letter-spacing:.04em}

/* ===== EMPTY ===== */
.empty{text-align:center;color:var(--text-dim);padding:60px 20px;font-size:.85rem}
.empty-icon{font-size:3rem;margin-bottom:14px;display:block;opacity:.4}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(6px);
  z-index:200;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow:auto}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border-hi);border-radius:4px;
  padding:0;width:100%;max-width:660px;position:relative;margin:auto}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:4px 4px 0 0}
.modal-h{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-h .t{font-family:var(--font-head);font-size:1.05rem;color:var(--cyan);font-weight:700;letter-spacing:.04em}
.modal-h .x{margin-left:auto;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem;transition:color .15s}
.modal-h .x:hover{color:var(--red)}
.modal-b{padding:20px}

/* ===== DETAIL INFO ===== */
.d-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:.78rem;margin-bottom:16px;
  background:rgba(2,8,20,.6);border:1px solid var(--border);border-radius:3px;padding:14px}
.d-info .k{color:var(--text-dim);margin-bottom:2px;font-size:.7rem}
.d-info .v{color:var(--text-hi);font-weight:600}
.d-info .full{grid-column:1/3}
.sect{font-family:var(--font-head);font-size:.82rem;color:var(--cyan);letter-spacing:.06em;
  margin:16px 0 10px;border-bottom:1px solid var(--border);padding-bottom:5px;
  display:flex;align-items:center;gap:6px}
.sect::before{content:'◈';font-size:.6rem}

/* ===== FORM FIELDS ===== */
.field{margin-bottom:14px}
.field label{display:block;font-size:.7rem;color:var(--text-dim);margin-bottom:6px;
  font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-head)}
.field input,.field select,.field textarea{width:100%;background:rgba(2,8,20,.8);
  border:1px solid var(--border);border-radius:2px;color:var(--text-hi);font-size:.88rem;
  padding:9px 12px;outline:none;transition:all .2s;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);
  box-shadow:0 0 0 1px rgba(0,212,255,.2)}
.field textarea{min-height:80px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ===== COST TOGGLE ===== */
.cost-toggle-row{display:flex;align-items:center;gap:14px;padding:12px;
  background:rgba(2,8,20,.6);border:1px solid var(--border);border-radius:3px;margin-bottom:14px}
.cost-toggle-label{font-size:.86rem;color:var(--text-hi);font-weight:600;flex:1}
.toggle{position:relative;display:inline-block;width:50px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:rgba(0,212,255,.08);
  border:1px solid var(--border);border-radius:26px;transition:.25s}
.toggle input:checked+.toggle-slider{background:rgba(0,212,255,.25);border-color:var(--cyan)}
.toggle-slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;
  background:var(--text-dim);border-radius:50%;transition:.25s}
.toggle input:checked+.toggle-slider:before{transform:translateX(24px);background:var(--cyan)}
.cost-amount-row{display:none;margin-bottom:14px}
.cost-amount-row.show{display:block}

/* ===== PHOTO UPLOAD ===== */
.photo-upload-area{border:2px dashed rgba(0,212,255,.25);border-radius:3px;
  padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.photo-upload-area:hover{border-color:rgba(0,212,255,.5);background:rgba(0,212,255,.03)}
.photo-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:2rem;display:block;margin-bottom:8px;opacity:.5}
.upload-text{font-size:.8rem;color:var(--text-dim);line-height:1.6}
.upload-text strong{color:var(--cyan)}
.photo-previews{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.photo-preview-item{position:relative;width:90px;height:90px;border-radius:3px;
  border:1px solid var(--border);overflow:hidden}
.photo-preview-item img{width:100%;height:100%;object-fit:cover}
.photo-preview-item .rm{position:absolute;top:3px;right:3px;background:rgba(255,59,59,.8);
  color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.65rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.photo-preview-item .rm:hover{background:var(--red)}

/* ===== SUBMIT BUTTON ===== */
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#093060,#0055a8);
  border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-head);font-weight:700;
  font-size:.92rem;letter-spacing:.1em;border-radius:2px;cursor:pointer;transition:all .25s;
  text-shadow:0 0 8px rgba(0,212,255,.5);margin-top:6px}
.btn-submit:hover{background:linear-gradient(135deg,#0d4080,#006fcf);box-shadow:var(--cyan-glow)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}

/* ===== PROGRESS / MSG ===== */
.msg{font-size:.78rem;text-align:center;padding:8px;min-height:1.4em;white-space:pre-wrap;
  line-height:1.6;border-radius:2px;margin-top:8px}
.msg.ok{color:var(--green);background:rgba(0,255,157,.06);border:1px solid rgba(0,255,157,.2)}
.msg.err{color:var(--red);background:rgba(255,59,59,.06);border:1px solid rgba(255,59,59,.2)}

/* ===== EXISTING REPAIR LOG ===== */
.repair-log-box{background:rgba(0,255,157,.04);border:1px solid rgba(0,255,157,.2);
  border-radius:3px;padding:14px;margin-bottom:14px}
.repair-log-header{font-family:var(--font-head);font-size:.82rem;color:var(--green);
  letter-spacing:.06em;margin-bottom:10px}
.repair-log-row{display:flex;gap:10px;margin-bottom:6px;font-size:.8rem}
.repair-log-k{color:var(--text-dim);min-width:80px;flex-shrink:0}
.repair-log-v{color:var(--text-hi)}
.repair-log-photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.repair-log-photo{width:80px;height:80px;border-radius:3px;border:1px solid rgba(0,255,157,.25);
  overflow:hidden;cursor:pointer}
.repair-log-photo img{width:100%;height:100%;object-fit:cover}

/* ===== TIMELINE ===== */
.tl{list-style:none;padding:0;margin:0}
.tl li{position:relative;padding:0 0 12px 20px;border-left:1px solid var(--border)}
.tl li:last-child{border-left-color:transparent}
.tl li::before{content:'';position:absolute;left:-5px;top:3px;width:9px;height:9px;
  border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.tl .ts{font-size:.66rem;color:var(--text-dim);font-family:var(--font-mono)}
.tl .st{font-size:.8rem;color:var(--text-hi);font-weight:600;margin:2px 0}
.tl .nt{font-size:.74rem;color:var(--text)}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 22px;border-radius:3px;
  font-size:.82rem;font-family:var(--font-mono);font-weight:700;letter-spacing:.05em;
  z-index:500;opacity:0;transition:all .3s;pointer-events:none;
  background:rgba(0,255,157,.1);color:var(--green);border:1px solid rgba(0,255,157,.35);
  text-shadow:0 0 8px rgba(0,255,157,.5);box-shadow:0 0 20px rgba(0,255,157,.15)}
.toast.show{opacity:1}
.toast.err{background:rgba(255,59,59,.1);color:var(--red);border-color:rgba(255,59,59,.35);
  text-shadow:0 0 8px rgba(255,59,59,.5);box-shadow:0 0 20px rgba(255,59,59,.15)}

/* Keep notices clear of the shared bottom-right theme switch. */
.toast{bottom:76px}

/* ===== SUCCESS OVERLAY ===== */
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center}
.success-overlay.show{display:flex}
.success-icon{font-size:4rem;animation:pop .4s cubic-bezier(.175,.885,.32,1.275) both}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.success-title{font-family:var(--font-head);font-size:1.8rem;color:var(--green);font-weight:700;letter-spacing:.1em}
.success-sub{font-size:.86rem;color:var(--text-dim)}
.success-btn{margin-top:10px;padding:10px 28px;background:rgba(0,255,157,.12);border:1px solid var(--green);
  color:var(--green);font-family:var(--font-head);font-weight:700;font-size:.88rem;letter-spacing:.08em;
  border-radius:2px;cursor:pointer;transition:all .2s}
.success-btn:hover{background:rgba(0,255,157,.25)}

/* ===== LIGHTBOX ===== */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:700;
  display:none;align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:4px;border:1px solid var(--border-hi)}
.lightbox-close{position:absolute;top:20px;right:24px;background:none;border:none;
  color:var(--text-dim);font-size:2rem;cursor:pointer;transition:color .15s}
.lightbox-close:hover{color:var(--red)}

/* ===== PAGER ===== */
.pager{display:flex;align-items:center;justify-content:flex-end;gap:7px;margin-top:14px;
  flex-wrap:wrap;color:var(--text-dim);font-size:.72rem}
.page-btn{min-width:32px;height:30px;border:1px solid var(--border);background:var(--surface);
  color:var(--text);border-radius:2px;cursor:pointer;font-family:var(--font-head);font-weight:700;transition:all .15s}
.page-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.page-btn.on{background:rgba(0,212,255,.16);border-color:var(--cyan);color:var(--cyan)}
.page-btn:disabled{opacity:.35;cursor:not-allowed}
.page-info{margin-right:auto}

/* ===== CLOSE CASE (主管結案) ===== */
.close-case-box{background:rgba(0,255,157,.04);border:1px solid rgba(0,255,157,.25);
  border-radius:3px;padding:14px;margin-top:14px}
.close-case-header{font-family:var(--font-head);font-size:.84rem;color:var(--green);
  letter-spacing:.06em;margin-bottom:10px}
.btn-close-case{padding:10px 20px;background:rgba(0,255,157,.12);border:1px solid var(--green);
  color:var(--green);font-family:var(--font-head);font-weight:700;font-size:.82rem;
  letter-spacing:.08em;border-radius:2px;cursor:pointer;transition:all .2s}
.btn-close-case:hover{background:rgba(0,255,157,.25);box-shadow:0 0 14px rgba(0,255,157,.3)}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .cards-grid{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr}
  .d-info{grid-template-columns:1fr}
  .d-info .full{grid-column:1}
  .navbar{gap:6px}
  .toast{right:16px;bottom:76px;max-width:calc(100vw - 32px)}
}
</style>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('siteTheme')||'tech');}catch(_){document.documentElement.setAttribute('data-theme','tech');}</script>

<!-- NAVBAR -->
<nav class="navbar">
  <div>
    <div class="nav-title">🔧 維修完工回報</div>
    <div class="nav-sub">維修中 → 填寫完工記錄 → 待主管結案</div>
  </div>
  <div class="nav-space"></div>
  <span class="online-dot"></span>
  <span class="topbar-clock" id="topClock"></span>
  <span class="nav-user" id="navUser">載入中…</span>
  <a href="dashboard.html"><button class="nav-back">◫ 戰情</button></a>
  <a href="workorder.html"><button class="nav-back">⚒ 報修</button></a>
  <a href="dispatch.html"><button class="nav-back">◪ 派工</button></a>

</nav>

<!-- MAIN -->
<div class="wrap">
  <div class="page-header">
    <h1>🔧 維修完工回報</h1>
    <p>查看指派工單 → 填寫完工記錄 → 上傳照片 → 送交主管結案</p>
  </div>

/* ===== LOGIN CACHE ===== */
function readLoginCache(){
  let legacy=null;
  try{legacy=JSON.parse(localStorage.getItem('loginUser')||sessionStorage.getItem('loginUser')||'null');}catch{}
  const current={
    user_id:sessionStorage.getItem('user_id')||null,
    username:sessionStorage.getItem('user_username')||null,
    name:sessionStorage.getItem('user_name')||null,
    department:sessionStorage.getItem('user_department')||null,
    role:sessionStorage.getItem('user_role')||null,
    rbac_role:sessionStorage.getItem('user_rbac_role')||null,
    permissions:{}
  };
  const merged={...(legacy||{})};
  Object.entries(current).forEach(([key,value])=>{if(value!==null&&value!=='')merged[key]=value;});
  merged.permissions=legacy?.permissions||merged.permissions||{};
  return merged.user_id||merged.username||merged.name?merged:null;
}
function cacheLoginUser(user){
  if(!user)return;
  if(user.user_id)sessionStorage.setItem('user_id',user.user_id);
  if(user.username)sessionStorage.setItem('user_username',user.username);
  if(user.name)sessionStorage.setItem('user_name',user.name);
  if(user.department)sessionStorage.setItem('user_department',user.department);
  if(user.role)sessionStorage.setItem('user_role',user.role);
  if(user.rbac_role)sessionStorage.setItem('user_rbac_role',user.rbac_role);
}
function validUuid(value){return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(value||''));}
async function hydrateLoginUser(){

    if(!session)return;
    const {data}=await db.from('users').select('user_id,username,name,department,role,rbac_role,permissions').eq('auth_id',session.user.id).maybeSingle();
    if(data){me_={...(me_||{}),...data};cacheLoginUser(me_);}

}

/* ===== FILTER ===== */
function getFiltered(){
  const q=(document.getElementById('fQ').value||'').toLowerCase().trim();
  const urg=document.getElementById('fUrgency').value;
  const role=normalizeRoleId(me_);
  const myName=(me_?.name||me_?.username||'').toLowerCase();
  const myId=String(me_?.user_id||'').toLowerCase();

  let list=allOrders;

  // Tab filter
  if(currentTab==='mine'){
    list=list.filter(o=>{
      const nm=(o.assigned_to_name||'').toLowerCase();
      const id=String(o.assigned_to||'').toLowerCase();
      return (!!myName&&nm.includes(myName))||id===myId;
    }).filter(o=>['in_progress','accepted','waiting_parts','waiting_vendor','pending_review'].includes(o.status));
  } else if(currentTab==='pending_review'){
    list=list.filter(o=>o.status==='pending_review');
  } else if(currentTab==='closed'){
    list=list.filter(o=>o.status==='closed');
  }

  // Search
  if(q){list=list.filter(o=>
    (o.req_no||'').toLowerCase().includes(q)||
    (o.fault_type||'').toLowerCase().includes(q)||
    (o.location||o.location_desc||'').toLowerCase().includes(q)||
    (o.description||o.fault_desc||'').toLowerCase().includes(q)||
    (o.reporter_name||'').toLowerCase().includes(q)
  );}

  // Urgency
  if(urg){list=list.filter(o=>(o.urgency||'normal')===urg);}

  return list;
}

/* ===== PAGER ===== */
function renderPager(total,shown){
  const pager=document.getElementById('pager');
  const totalPages=Math.ceil(total/PAGE_SIZE);
  if(totalPages<=1){pager.innerHTML='';return;}
  let html=`<span class="page-info">共 ${total} 筆，第 ${currentPage}/${totalPages} 頁</span>`;
  html+=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>`;
  for(let i=1;i<=totalPages;i++){
    if(i===1||i===totalPages||Math.abs(i-currentPage)<=1){
      html+=`<button class="page-btn ${i===currentPage?'on':''}" onclick="goPage(${i})">${i}</button>`;
    } else if(Math.abs(i-currentPage)===2){html+='<span style="color:var(--text-dim)">…</span>';}
  }
  html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>`;
  pager.innerHTML=html;
}
function goPage(p){currentPage=p;renderCards();window.scrollTo(0,0);}

function attachmentUrl(filePath){
  if(!filePath)return '';
  if(/^https?:\/\//i.test(filePath))return filePath;
  return db.storage.from('repair-files').getPublicUrl(filePath).data?.publicUrl||'';
}
async function openDetail(id){
  currentOrder=allOrders.find(o=>o.id===id)||null;
  if(!currentOrder)return;
  document.getElementById('d-title').textContent='工單詳情 ― '+(currentOrder.req_no||'');
  document.getElementById('d-badge').innerHTML=badge(currentOrder.status);

  const [attRes,timelineRes,costRes]=await Promise.all([
    db.from('repair_attachments').select('*').eq('order_id',id).order('uploaded_at',{ascending:true}),
    db.from('case_status_log').select('*').eq('order_id',id).order('created_at',{ascending:true}),
    db.from('cost_records').select('*').eq('order_id',id).order('cost_date',{ascending:false})
  ]);
  if(attRes.error)console.warn('repair_attachments',attRes.error);
  if(timelineRes.error)console.warn('case_status_log',timelineRes.error);
  if(costRes.error)console.warn('cost_records',costRes.error);
  const photoUrls=(attRes.data||[]).filter(x=>x.kind==='photo').map(x=>attachmentUrl(x.file_path)).filter(Boolean);
  const totalCost=(costRes.data||[]).reduce((sum,x)=>sum+Number(x.amount||0),0);
  const hasCompletion=!!(currentOrder.finish_time||currentOrder.result_desc||currentOrder.handle_method||photoUrls.length);
  const repairLog=hasCompletion?{
    technician_name:currentOrder.assigned_to_name||me_?.name||'—',

    repair_desc:currentOrder.result_desc||currentOrder.handle_method||'—',
    has_cost:totalCost>0,
    cost_amount:totalCost,
    photo_urls:photoUrls
  }:null;

  document.getElementById('d-body').innerHTML=buildDetailBody(currentOrder,repairLog,timelineRes.data||[]);
  document.getElementById('m-detail').classList.add('show');
}

      <div><div class="k">故障類型</div><div class="v">${ft}</div></div>
      <div><div class="k">緊急程度</div><div class="v">${urgLabel(urg)}</div></div>
      <div class="full"><div class="k">故障位置</div><div class="v">📍 ${loc}</div></div>
      <div class="full"><div class="k">故障描述</div><div class="v">${desc}</div></div>
      <div><div class="k">報修人</div><div class="v">${reporter}</div></div>
      <div><div class="k">聯絡電話</div><div class="v">${phone}</div></div>
      <div><div class="k">所屬單位</div><div class="v">${dept}</div></div>
      <div><div class="k">指派技師</div><div class="v">🔧 ${assignee}</div></div>
      <div><div class="k">報修時間</div><div class="v">${created}</div></div>
    </div>

    ${repairLogHTML}
    ${closeHTML}

    ${canReport?`<div class="sect">填寫完工回報</div>${reportFormHTML}`:''}

    ${tlHTML}
  `;
}

/* ===== BUILD REPORT FORM ===== */
function buildReportForm(){
  return `
    <div class="field">
      <label>維修說明 *</label>
      <textarea id="r-desc" placeholder="請詳細說明本次維修內容、更換零件、處理方式…" rows="4"></textarea>
    </div>

    <div class="cost-toggle-row">
      <span class="cost-toggle-label">💰 此次維修是否產生費用？</span>
      <label class="toggle">
        <input type="checkbox" id="r-has-cost" onchange="toggleCost()">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="cost-amount-row" id="costAmountRow">
      <div class="field">
        <label>費用金額（新台幣）*</label>
        <input type="number" id="r-cost" min="0" step="1" placeholder="請輸入費用金額（元）">
      </div>
      <div class="field">
        <label>費用說明（材料/廠商名稱等）</label>
        <input type="text" id="r-cost-note" placeholder="例：更換軸承一顆 NT$800、外包廠商維修費…">
      </div>
    </div>

    <div class="field">
      <label>📷 上傳完工照片（最多 3 張，必填）</label>
      <div class="photo-upload-area" id="photoArea">
        <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotoSelect(this)">
        <span class="upload-icon">📷</span>
        <div class="upload-text">點擊或拖曳上傳照片<br><strong>支援 JPG / PNG / HEIC</strong>，最多 3 張，每張限 10MB</div>
      </div>
      <div class="photo-previews" id="photoPreviews"></div>
    </div>

    <div id="r-msg" class="msg"></div>
    <button class="btn-submit" id="btnSubmit" onclick="submitRepairLog()">📤 送出完工回報</button>
  `;
}

/* ===== OPEN REPORT (from card button) ===== */
async function openReport(id){
  await openDetail(id);
  // Scroll form into view
  setTimeout(()=>{
    const form=document.getElementById('r-desc');
    if(form)form.scrollIntoView({behavior:'smooth',block:'center'});
  },300);
}

/* ===== TOGGLE COST ===== */
function toggleCost(){
  const hasCost=document.getElementById('r-has-cost')?.checked;
  document.getElementById('costAmountRow')?.classList.toggle('show',hasCost);
}

/* ===== PHOTO HANDLING ===== */
function handlePhotoSelect(input){
  const files=Array.from(input.files);
  const remaining=3-uploadedFiles.filter(f=>!f.removed).length;
  if(!files.length)return;
  if(remaining<=0){toast('最多只能上傳 3 張照片',true);return;}

  const toAdd=files.slice(0,remaining);
  toAdd.forEach(file=>{
    if(file.size>10*1024*1024){toast('檔案超過 10MB 限制：'+file.name,true);return;}
    const reader=new FileReader();
    reader.onload=e=>{
      uploadedFiles.push({file,dataUrl:e.target.result,removed:false});
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function renderPreviews(){
  const container=document.getElementById('photoPreviews');
  if(!container)return;
  const active=uploadedFiles.filter(f=>!f.removed);
  container.innerHTML=active.map((f,i)=>`
    <div class="photo-preview-item">
      <img src="${f.dataUrl}" alt="預覽">
      <button class="rm" onclick="removePhoto(${uploadedFiles.indexOf(f)})">✕</button>
    </div>
  `).join('');
  // Update area hint
  const area=document.getElementById('photoArea');
  if(area){
    area.querySelector('.upload-text').innerHTML=
      active.length>=3?'已達上傳上限（3 張）':
      `點擊或拖曳上傳照片<br><strong>已選 ${active.length}/3 張</strong>`;
  }
}

function removePhoto(idx){
  if(uploadedFiles[idx])uploadedFiles[idx].removed=true;
  renderPreviews();
}

/* ===== UPLOAD PHOTO TO SUPABASE STORAGE ===== */
async function uploadPhoto(file,orderId,index){
  const ext=(file.name.split('.').pop()||'jpg').replace(/[^a-z0-9]/gi,'').toLowerCase()||'jpg';
  const path=`completion/${orderId}/${Date.now()}_${index}.${ext}`;
  const {error}=await db.storage.from('repair-files').upload(path,file,{upsert:false,contentType:file.type||'application/octet-stream'});
  if(error)throw new Error('照片上傳失敗：'+error.message);
  const {data:pub}=db.storage.from('repair-files').getPublicUrl(path);
  return {path,fileName:file.name,publicUrl:pub?.publicUrl||''};
}

/* ===== SUBMIT REPAIR LOG ===== */
async function submitRepairLog(){
  const desc=(document.getElementById('r-desc')?.value||'').trim();
  const hasCost=document.getElementById('r-has-cost')?.checked||false;
  const costAmt=hasCost?parseFloat(document.getElementById('r-cost')?.value||0):0;
  const costNote=(document.getElementById('r-cost-note')?.value||'').trim();
  const msgEl=document.getElementById('r-msg');
  const btn=document.getElementById('btnSubmit');

  const activePhotos=uploadedFiles.filter(f=>!f.removed);

  // Validation
  if(!desc){setMsg(msgEl,'請填寫維修說明','err');return;}
  if(hasCost&&(!costAmt||costAmt<=0)){setMsg(msgEl,'請填寫費用金額','err');return;}
  if(activePhotos.length===0){setMsg(msgEl,'請上傳至少 1 張完工照片','err');return;}

  btn.disabled=true;btn.textContent='上傳中…';
  setMsg(msgEl,'');

  try{
    const order=currentOrder;
    if(!order)throw new Error('找不到目前工單，請重新整理後再試');
    const now=new Date().toISOString();
    const myName=me_?.name||me_?.username||'維修人員';
    const myId=validUuid(me_?.user_id)?me_.user_id:null;
    const reqNo=order.req_no||order.wo_no||'';

    // 1. Upload photos to the existing repair-files bucket.
    const uploads=[];
    for(let i=0;i<activePhotos.length;i++){
      setMsg(msgEl,`上傳照片 ${i+1}/${activePhotos.length}…`);
      uploads.push(await uploadPhoto(activePhotos[i].file,order.order_id,i));
    }

    // 2. Register uploaded files in the shared attachment table.
    const attachmentRows=uploads.map(x=>({
      request_id:order.request_id,
      order_id:order.order_id,
      kind:'photo',
      file_path:x.path,
      file_name:x.fileName,
      uploaded_by:myId
    }));
    const {error:attachmentErr}=await db.from('repair_attachments').insert(attachmentRows);
    if(attachmentErr)throw attachmentErr;

    // 3. Store completion details in the existing maintenance order.
    const costSummary=hasCost?`維修費用 NT$ ${Number(costAmt).toLocaleString('zh-TW')}${costNote?'｜'+costNote:''}`:'本次無維修費用';
    const completionNote=[order.note,`[完工回報] ${costSummary}`].filter(Boolean).join('\n');
    const {error:statusErr}=await db.from('maintenance_orders').update({
      status:'pending_review',
      finish_time:now,
      result_desc:desc,
      handle_method:desc,
      note:completionNote
    }).eq('order_id',order.order_id);
    if(statusErr)throw statusErr;

    const {error:reqErr}=await db.from('repair_requests').update({status:'pending_review',updated_at:now}).eq('request_id',order.request_id);
    if(reqErr)throw reqErr;

    // 4. Record cost when an equipment link is available; note remains authoritative otherwise.
    if(hasCost&&order.equipment_id){
      const costPayload={equipment_id:order.equipment_id,order_id:order.order_id,cost_type:'other',amount:costAmt,cost_date:now.slice(0,10),note:costNote||'維修完工費用'};
      if(myId)costPayload.created_by=myId;
      const {error:costErr}=await db.from('cost_records').insert(costPayload);
      if(costErr)throw costErr;
    }

    // 5. Append an auditable status event.
    const logPayload={
      request_id:order.request_id,
      order_id:order.order_id,
      from_status:order.status,
      to_status:'pending_review',
      operator_name:myName,
      note:`維修說明：${desc}｜${costSummary}`
    };
    if(myId)logPayload.operator_id=myId;
    const {error:logErr}=await db.from('case_status_log').insert(logPayload);
    if(logErr)throw logErr;

    // 6. Show success.
    closeModal();
    document.getElementById('successSub').textContent=
      `工單 ${reqNo} 已更新為「待驗收」，請等待主管結案。`;
    document.getElementById('successOverlay').classList.add('show');

    // Reload
    await loadOrders();
    renderCards();

  }catch(e){
    console.error('submitRepairLog error',e);
    setMsg(msgEl,'送出失敗：'+e.message,'err');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='📤 送出完工回報';}
  }
}

/* ===== CLOSE CASE (主管結案) ===== */
async function doCloseCase(orderId){
  if(!canClose()){toast('您沒有結案權限',true);return;}
  const remark=(document.getElementById('close-remark')?.value||'').trim();
  if(!confirm('確認結案？此操作無法復原。'))return;

  try{
    const order=allOrders.find(x=>x.order_id===orderId)||currentOrder;
    if(!order)throw new Error('找不到工單資料');
    const myName=me_?.name||me_?.username||'主管';
    const myId=validUuid(me_?.user_id)?me_.user_id:null;
    const now=new Date().toISOString();
    const {error:orderErr}=await db.from('maintenance_orders').update({status:'closed'}).eq('order_id',orderId);
    if(orderErr)throw orderErr;
    const {error:reqErr}=await db.from('repair_requests').update({status:'closed',updated_at:now}).eq('request_id',order.request_id);
    if(reqErr)throw reqErr;
    const closeLog={
      request_id:order.request_id,
      order_id:orderId,
      from_status:order.status,
      to_status:'closed',
      operator_name:myName,
      note:remark||'主管確認結案'
    };
    if(myId)closeLog.operator_id=myId;
    const {error:logErr}=await db.from('case_status_log').insert(closeLog);
    if(logErr)throw logErr;

    toast('✅ 已成功結案！');
    closeModal();
    await loadOrders();
    renderCards();
  }catch(e){
    toast('結案失敗：'+e.message,true);
  }
}

/* ===== HELPERS ===== */
function setMsg(el,msg,type=''){
  if(!el)return;
  el.textContent=msg;
  el.className='msg'+(type?' '+type:'');
}

function closeModal(){
  document.getElementById('m-detail').classList.remove('show');
  uploadedFiles=[];
  currentOrder=null;
}

function closeSuccess(){
  document.getElementById('successOverlay').classList.remove('show');
  switchTab('mine');
}

function openLightbox(url){
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show');}

/* ===== KEYBOARD CLOSE ===== */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeModal();
    closeLightbox();
    document.getElementById('successOverlay').classList.remove('show');
  }
});

/* ===== START ===== */
init();
</script>
