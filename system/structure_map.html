<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>動態互動組織樹 - 專案關聯地圖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('siteTheme') || 'tech');</script>
  <script src="theme.js?v=20260715-6"></script>
  
  <!-- Vis.js Network CDN -->
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #020b18;
      --surface: rgba(4, 17, 31, 0.75);
      --panel: #05101e;
      --border: #0c2840;
      --border-hi: #1a4a70;
      --cyan: #00d4ff;
      --blue: #1a7fff;
      --green: #00ff9d;
      --amber: #ffb300;
      --red: #ff3b3b;
      --purple: #b48aff;
      --text: #a8d8f0;
      --text-hi: #d4eeff;
      --text-dim: #3a6a8a;
      --font-head: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --glass-bg: rgba(4, 17, 31, 0.6);
      --glass-border: rgba(0, 212, 255, 0.15);
    }
    
    :root[data-theme="light"] {
      --bg: #f4f6fa;
      --surface: rgba(255, 255, 255, 0.85);
      --panel: #ffffff;
      --border: #dbe4ee;
      --border-hi: #93b4d6;
      --cyan: #0284c7;
      --blue: #2563eb;
      --green: #059669;
      --amber: #b45309;
      --red: #dc2626;
      --purple: #7c3aed;
      --text: #1e293b;
      --text-hi: #0f172a;
      --text-dim: #64748b;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(2, 132, 199, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-image: linear-gradient(rgba(0,212,255,.01) 1px,transparent 1px), linear-gradient(90deg,rgba(0,212,255,.01) 1px,transparent 1px);
      background-size: 30px 30px;
    }

    /* Navbar */
    .navbar {
      background: rgba(3, 10, 22, 0.95);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }
    :root[data-theme="light"] .navbar {
      background: rgba(255, 255, 255, 0.95);
    }
    .nav-title {
      font-family: var(--font-head);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: .06em;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-back {
      font-size: 0.8rem;
      color: var(--text-hi);
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid var(--cyan);
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .btn-back:hover {
      background: var(--cyan);
      color: #020b18;
      box-shadow: 0 0 12px var(--cyan);
    }

    /* Layout Wrapper */
    .app-container {
      flex: 1;
      display: flex;
      position: relative;
      height: calc(100vh - 60px);
    }

    /* Network Canvas Container */
    #network-canvas {
      flex: 1;
      height: 100%;
      outline: none;
      cursor: grab;
    }
    #network-canvas:active {
      cursor: grabbing;
    }

    /* HUD Sidebar - Glassmorphism */
    .hud-panel {
      width: 380px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      z-index: 10;
      box-shadow: -10px 0 30px rgba(0, 0, 0, 0.25);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
    }

    .hud-title {
      font-family: var(--font-head);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--cyan);
      border-bottom: 2px solid var(--cyan);
      padding-bottom: 8px;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hud-subtitle {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    .info-card {
      background: rgba(12, 40, 64, 0.25);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .info-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 500;
    }
    .info-val {
      font-size: 0.9rem;
      color: var(--text-hi);
      font-family: var(--font-mono);
      word-break: break-all;
    }

    /* Floating Legend */
    .legend-box {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      z-index: 5;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
    }
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* Floating Control Panel */
    .control-hud {
      position: absolute;
      top: 20px;
      left: 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      border-radius: 6px;
      padding: 12px;
      display: flex;
      gap: 8px;
      z-index: 5;
    }
    .ctrl-btn {
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .ctrl-btn:hover {
      border-color: var(--cyan);
      background: rgba(0, 212, 255, 0.15);
      color: var(--cyan);
    }
    .ctrl-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0, 255, 157, 0.08);
    }

    /* Tooltip styling override */
    div.vis-tooltip {
      background-color: var(--panel) !important;
      border: 1px solid var(--cyan) !important;
      color: var(--text-hi) !important;
      font-family: 'Noto Sans TC', sans-serif !important;
      font-size: 12px !important;
      padding: 8px 12px !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5) !important;
    }
    
    /* Interactive Editor Panel elements */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-input {
      background: rgba(2, 11, 24, 0.6);
      border: 1px solid var(--border);
      color: var(--text-hi);
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 0.85rem;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--cyan);
    }
    .form-select {
      background: rgba(2, 11, 24, 0.6);
      border: 1px solid var(--border);
      color: var(--text-hi);
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 0.85rem;
      outline: none;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-title">
      <span style="font-size: 1.5rem;">❖</span> 專案核心樹狀關係圖 (DRAG & DROP MAP)
    </div>
    <a href="admin.html" class="btn-back">返回後台</a>
  </nav>

  <!-- App Container -->
  <div class="app-container">
    
    <!-- Floating controls -->
    <div class="control-hud">
      <button class="ctrl-btn active" id="btn-physics" onclick="togglePhysics()">彈性物理模擬: ON</button>
      <button class="ctrl-btn" onclick="fitView()">適中檢視</button>
      <button class="ctrl-btn" onclick="resetRelationships()">重設關聯</button>
    </div>

    <!-- Network map canvas -->
    <div id="network-canvas"></div>

    <!-- Floating legend -->
    <div class="legend-box">
      <div class="legend-item"><div class="legend-color" style="background: #1e293b;"></div><span>專案根目錄 (Folder)</span></div>
      <div class="legend-item"><div class="legend-color" style="background: #0284c7;"></div><span>子系統資料夾 (Subfolder)</span></div>
      <div class="legend-item"><div class="legend-color" style="background: #059669;"></div><span>業務子系統 (HTML)</span></div>
      <div class="legend-item"><div class="legend-color" style="background: #d97706;"></div><span>後台錨點模組 (#Anchor)</span></div>
      <div class="legend-item"><div class="legend-color" style="background: #dc2626;"></div><span>外部資料儲存 (Supabase)</span></div>
    </div>

    <!-- HUD Control/Details Panel -->
    <div class="hud-panel">
      <div>
        <div class="hud-title">
          <span>節點資訊面版</span>
          <span class="hud-subtitle">NODE CONTROLLER</span>
        </div>
      </div>

      <!-- Node detail card -->
      <div class="info-card" id="detail-card">
        <p style="color: var(--text-dim); font-size: 0.85rem; text-align: center; padding: 20px 0;">點擊圖中任何節點以查看關聯與搬移設定</p>
      </div>

      <!-- Drag-and-drop Reassociation Manager -->
      <div class="info-card" id="reassociate-panel" style="display: none;">
        <h4 style="color: var(--cyan); font-size: 0.9rem; margin-bottom: 8px;">🔗 調整階層/關聯</h4>
        <div class="form-group">
          <label class="info-label" for="parent-select">選取新的父級節點：</label>
          <select id="parent-select" class="form-select"></select>
        </div>
        <button class="ctrl-btn" style="margin-top: 12px; width: 100%; border-color: var(--cyan); color: var(--cyan);" onclick="executeReassociation()">套用搬移關聯</button>
      </div>
      
    </div>
  </div>

  <script>
    let network = null;
    let nodesDataset = null;
    let edgesDataset = null;
    let selectedNodeId = null;
    let isPhysicsOn = true;

    // Define original raw nodes data representing our site structure
    const initialNodes = [
      { id: "root", label: "OpenCod\n(專案根目錄)", group: "root", dir: "H:/我的雲端硬碟/AI/OpenCod", desc: "專案全域根目錄，包含首頁入口與設定。" },
      { id: "root_index", label: "index.html\n(首頁入口)", group: "entry", dir: "H:/我的雲端硬碟/AI/OpenCod/index.html", desc: "系統全域的起始點入口卡片頁面。" },
      { id: "assets", label: "assets/\n(首頁大卡片資源)", group: "folder", dir: "H:/我的雲端硬碟/AI/OpenCod/assets", desc: "存放首頁卡片入口所使用的圖示等資源。" },
      { id: "system_icons", label: "system-icons/\n(首頁大卡片圖示)", group: "folder", dir: "H:/我的雲端硬碟/AI/OpenCod/assets/system-icons", desc: "包括已還原的電子交接簿 (handover-icon.png) 等原始大圖示。" },
      { id: "system", label: "system/\n(核心網頁目錄)", group: "folder", dir: "H:/我的雲端硬碟/AI/OpenCod/system", desc: "核心程式碼目錄，包含5大子系統與後台模組網頁。" },
      { id: "sys_index", label: "index.html\n(子入口選單)", group: "entry", dir: "H:/我的雲端硬碟/AI/OpenCod/system/index.html", desc: "5大子系統在登入後的子選單導引頁。" },
      { id: "login", label: "login.html\n(登入面頁)", group: "entry", dir: "H:/我的雲端硬碟/AI/OpenCod/system/login.html", desc: "統一登入驗證介面，包含 Supabase 帳號查尋認證。" },
      { id: "dashboard", label: "dashboard.html\n(戰情儀表板)", group: "system", dir: "H:/我的雲端硬碟/AI/OpenCod/system/dashboard.html", desc: "營運戰情總覽，動態計算與顯示巡檢簽到打卡、報修及派工統計。" },
      { id: "equipment", label: "equipment.html\n(設備建置系統)", group: "system", dir: "H:/我的雲端硬碟/AI/OpenCod/system/equipment.html", desc: "設備資產生命週期紀錄與 QR Code 平面圖定位對接。" },
      { id: "guardpatrol", label: "guardpatrol.html\n(駐衛警巡檢系統)", group: "system", dir: "H:/我的雲端硬碟/AI/OpenCod/system/guardpatrol.html", desc: "巡檢打卡點列表設定與班別排程管理。" },
      { id: "handover", label: "handover.html\n(電子交接簿)", group: "system", dir: "H:/我的雲端硬碟/AI/OpenCod/system/handover.html", desc: "交接班人員事件紀錄簿，具備與後台連動的交接功能。" },
      { id: "admin", label: "admin.html\n(後台總理系統)", group: "system", dir: "H:/我的雲端硬碟/AI/OpenCod/system/admin.html", desc: "核心後台管理頁，包含設定、帳號、工單派送等多功能錨點模組。" },
      { id: "settings", label: "#settings\n(系統設定)", group: "anchor", dir: "admin.html#settings", desc: "設定市場及部門等全域變數設定模組。" },
      { id: "users", label: "#users\n(帳號管理)", group: "anchor", dir: "admin.html#users", desc: "帳號新增、密碼修改與角色權限設定 (RBAC) 模組。" },
      { id: "repairs", label: "#repairs\n(維修派工完工)", group: "anchor", dir: "admin.html#repairs", desc: "指派與完成報修工單，直接管理與指派維修人員的後台模組。" },
      { id: "costs", label: "#costs\n(費用統計)", group: "anchor", dir: "admin.html#costs", desc: "耗材與設備故障維護費用成本統計報告。" },
      { id: "audit", label: "#audit\n(系統審計日誌)", group: "anchor", dir: "admin.html#audit", desc: "保留使用者敏感操作之內部安全日誌。" },
      { id: "database", label: "Supabase DB\n(雲端資料庫)", group: "database", dir: "https://qztffronusdhgxhjjubt.supabase.co", desc: "儲存簽到、報修、交接紀錄與帳號資訊之線上資料庫服務。" }
    ];

    // Define original raw edges data (connections)
    const initialEdges = [
      { from: "root", to: "root_index", label: "包含" },
      { from: "root", to: "assets", label: "包含" },
      { from: "root", to: "system", label: "包含" },
      { from: "assets", to: "system_icons", label: "包含" },
      { from: "system", to: "sys_index", label: "包含" },
      { from: "system", to: "login", label: "包含" },
      { from: "system", to: "dashboard", label: "包含" },
      { from: "system", to: "equipment", label: "包含" },
      { from: "system", to: "guardpatrol", label: "包含" },
      { from: "system", to: "handover", label: "包含" },
      { from: "system", to: "admin", label: "包含" },
      { from: "admin", to: "settings", label: "模組" },
      { from: "admin", to: "users", label: "模組" },
      { from: "admin", to: "repairs", label: "模組" },
      { from: "admin", to: "costs", label: "模組" },
      { from: "admin", to: "audit", label: "模組" },
      
      // Correlations
      { from: "dashboard", to: "guardpatrol", label: "顯示巡檢數據", style: "dashed", color: {color: "var(--cyan)"} },
      { from: "dashboard", to: "repairs", label: "統計維修進度", style: "dashed", color: {color: "var(--cyan)"} },
      { from: "equipment", to: "repairs", label: "關聯故障申報", style: "dashed", color: {color: "var(--cyan)"} },
      { from: "handover", to: "repairs", label: "交接指派單", style: "dashed", color: {color: "var(--cyan)"} },
      { from: "equipment", to: "database", label: "API 存取", color: {color: "var(--red)"} },
      { from: "guardpatrol", to: "database", label: "API 存取", color: {color: "var(--red)"} },
      { from: "handover", to: "database", label: "API 存取", color: {color: "var(--red)"} },
      { from: "admin", to: "database", label: "API 存取", color: {color: "var(--red)"} }
    ];

    // Node Visual Configurations based on groups
    const groupStyles = {
      root: { color: { background: "#1e293b", border: "#0f172a", highlight: { background: "#334155", border: "#1e293b" } }, shape: "box", font: { color: "#fff", size: 14, bold: true }, shadow: true },
      folder: { color: { background: "#0c4a6e", border: "#0369a1", highlight: { background: "#0284c7", border: "#0369a1" } }, shape: "box", font: { color: "#fff", size: 13 }, shadow: true },
      entry: { color: { background: "#115e59", border: "#0f766e", highlight: { background: "#0d9488", border: "#0f766e" } }, shape: "box", font: { color: "#fff", size: 13 }, shadow: true },
      system: { color: { background: "#065f46", border: "#047857", highlight: { background: "#059669", border: "#047857" } }, shape: "box", font: { color: "#fff", size: 14, bold: true }, borderWidth: 2, shadow: true },
      anchor: { color: { background: "#9a3412", border: "#c2410c", highlight: { background: "#d97706", border: "#c2410c" } }, shape: "ellipse", font: { color: "#fff", size: 12 }, shadow: false },
      database: { color: { background: "#991b1b", border: "#b91c1c", highlight: { background: "#dc2626", border: "#b91c1c" } }, shape: "database", font: { color: "#fff", size: 13, bold: true }, shadow: true }
    };

    function initNetwork() {
      // 1. Prepare node datasets with custom styles
      const formattedNodes = initialNodes.map(node => {
        const style = groupStyles[node.group] || {};
        return {
          ...node,
          ...style,
          title: `路徑: ${node.dir}<br>${node.desc}`
        };
      });

      nodesDataset = new vis.DataSet(formattedNodes);
      edgesDataset = new vis.DataSet(initialEdges);

      const container = document.getElementById("network-canvas");
      const data = {
        nodes: nodesDataset,
        edges: edgesDataset
      };

      // Configuration options for interactive canvas
      const options = {
        nodes: {
          margin: 12,
          borderWidth: 1,
          font: {
            face: "Noto Sans TC, sans-serif"
          }
        },
        edges: {
          width: 2,
          arrows: {
            to: { enabled: true, scaleFactor: 0.8 }
          },
          font: {
            size: 10,
            color: "var(--text-dim)",
            face: "Noto Sans TC, sans-serif",
            strokeWidth: 0
          },
          color: {
            color: "var(--border)",
            highlight: "var(--cyan)",
            hover: "var(--cyan)"
          },
          smooth: {
            type: "cubicBezier",
            forceDirection: "none",
            roundness: 0.5
          }
        },
        physics: {
          enabled: true,
          barnesHut: {
            gravitationalConstant: -2800,
            centralGravity: 0.35,
            springLength: 120,
            springConstant: 0.04,
            damping: 0.85
          },
          stabilization: {
            iterations: 150
          }
        },
        interaction: {
          hover: true,
          navigationButtons: false,
          keyboard: false
        }
      };

      network = new vis.Network(container, data, options);

      // Event listener for node click selection
      network.on("selectNode", function(params) {
        if (params.nodes.length > 0) {
          selectedNodeId = params.nodes[0];
          updateHUDPanel(selectedNodeId);
        }
      });

      // Clear selection HUD panel when clicking empty canvas areas
      network.on("deselectNode", function() {
        selectedNodeId = null;
        resetHUDPanel();
      });
    }

    // Update HUD panel with the selected node information
    function updateHUDPanel(nodeId) {
      const node = nodesDataset.get(nodeId);
      const detailCard = document.getElementById("detail-card");
      
      const typeLabels = {
        root: "專案根目錄 (Root)",
        folder: "靜態資料夾 (Folder)",
        entry: "首頁入口 (Entry Page)",
        system: "業務子系統 (HTML)",
        anchor: "後台子模組 (#Anchor)",
        database: "外部儲存資料庫 (Supabase)"
      };

      detailCard.innerHTML = `
        <div class="info-row">
          <span class="info-label">節點名稱</span>
          <span class="info-val" style="color: var(--cyan); font-weight: bold; font-size: 1.05rem;">${node.label.replace('\n', ' ')}</span>
        </div>
        <div class="info-row">
          <span class="info-label">物件類型</span>
          <span class="info-val">${typeLabels[node.group] || "未知"}</span>
        </div>
        <div class="info-row">
          <span class="info-label">磁碟絕對路徑</span>
          <span class="info-val" style="font-size: 0.8rem; word-break: break-all;">${node.dir}</span>
        </div>
        <div class="info-row">
          <span class="info-label">功能說明</span>
          <span class="info-val" style="font-family: inherit; font-size: 0.85rem; line-height: 1.4;">${node.desc}</span>
        </div>
      `;

      // Show reassociate panel (excluding root and database node from parent assignment)
      const reassociatePanel = document.getElementById("reassociate-panel");
      if (nodeId !== "root" && nodeId !== "database") {
        reassociatePanel.style.display = "block";
        populateParentSelect(nodeId);
      } else {
        reassociatePanel.style.display = "none";
      }
    }

    // Reset details HUD to default empty notice state
    function resetHUDPanel() {
      document.getElementById("detail-card").innerHTML = `
        <p style="color: var(--text-dim); font-size: 0.85rem; text-align: center; padding: 20px 0;">點擊圖中任何節點以查看關聯與搬移設定</p>
      `;
      document.getElementById("reassociate-panel").style.display = "none";
    }

    // Populate dropdown with potential new parent folders
    function populateParentSelect(currentNodeId) {
      const select = document.getElementById("parent-select");
      select.innerHTML = "";

      // Only root and folders can be logical parents
      const eligibleParents = nodesDataset.get({
        filter: function(item) {
          return (item.group === "root" || item.group === "folder" || item.group === "system") && item.id !== currentNodeId;
        }
      });

      // Find current hierarchical parent
      const currentParentEdge = edgesDataset.get({
        filter: function(edge) {
          return edge.to === currentNodeId && edge.label === "包含";
        }
      });
      const currentParentId = currentParentEdge.length > 0 ? currentParentEdge[0].from : null;

      eligibleParents.forEach(parent => {
        const option = document.createElement("option");
        option.value = parent.id;
        option.textContent = parent.label.replace('\n', ' ');
        if (parent.id === currentParentId) {
          option.selected = true;
        }
        select.appendChild(option);
      });
    }

    // Execute node drag and drop parent migration
    function executeReassociation() {
      if (!selectedNodeId) return;
      const newParentId = document.getElementById("parent-select").value;
      
      // Find existing hierarchical edges for this node
      const existingEdges = edgesDataset.get({
        filter: function(edge) {
          return edge.to === selectedNodeId && edge.label === "包含";
        }
      });

      // Remove existing hierarchical edges
      if (existingEdges.length > 0) {
        edgesDataset.remove(existingEdges.map(e => e.id));
      }

      // Add new hierarchical edge
      edgesDataset.add({
        from: newParentId,
        to: selectedNodeId,
        label: "包含"
      });

      // Update absolute path visually for display demonstration
      const node = nodesDataset.get(selectedNodeId);
      const parentNode = nodesDataset.get(newParentId);
      
      // Calculate fake display directory
      let newDir = parentNode.dir + "/" + selectedNodeId;
      if (node.group === "anchor") {
        newDir = parentNode.id + ".html" + node.dir.substring(node.dir.indexOf("#"));
      }
      
      nodesDataset.update({
        id: selectedNodeId,
        dir: newDir
      });

      // Refresh HUD Panel Info
      updateHUDPanel(selectedNodeId);

      // Brief flash animation to notify user
      network.flash = true;
      setTimeout(() => {
        alert(`已動態將節點 [${node.label.replace('\n', ' ')}] 搬移移屬到 [${parentNode.label.replace('\n', ' ')}] 下！`);
      }, 50);
    }

    // Reset edges and positions back to default
    function resetRelationships() {
      if (confirm("是否要重置回初始的預設系統組織架構與關聯關係？")) {
        edgesDataset.clear();
        edgesDataset.add(initialEdges);
        
        initialNodes.forEach(node => {
          nodesDataset.update({
            id: node.id,
            dir: node.dir
          });
        });
        
        resetHUDPanel();
        network.stabilize();
      }
    }

    // Toggle physics spring force simulation
    function togglePhysics() {
      isPhysicsOn = !isPhysicsOn;
      network.setOptions({
        physics: { enabled: isPhysicsOn }
      });
      const btn = document.getElementById("btn-physics");
      if (isPhysicsOn) {
        btn.textContent = "彈性物理模擬: ON";
        btn.classList.add("active");
      } else {
        btn.textContent = "彈性物理模擬: OFF";
        btn.classList.remove("active");
      }
    }

    // Automatically fit view to show all nodes
    function fitView() {
      network.fit({
        animation: {
          duration: 1000,
          easingFunction: "easeInOutQuad"
        }
      });
    }

    // Start everything on load
    window.onload = function() {
      initNetwork();
      setTimeout(fitView, 500);
    };
  </script>
</body>
</html>
