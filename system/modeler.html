<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<title>3D建模系統 — 臺北農產巡檢系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.js"
        onerror="var s=document.createElement('script');s.src='https://unpkg.com/dxf-parser@1.1.2/dist/dxf-parser.js';document.head.appendChild(s);"></script>
<style>
:root{--bg:#020b18;--surface:#04111f;--panel:#05101e;--border:#0c2840;--border-hi:#1a4a70;
  --cyan:#00d4ff;--pink:#ff5ea0;--green:#00ff9d;--amber:#ffb300;--red:#ff3b3b;
  --text:#a8d8f0;--text-hi:#d4eeff;--text-dim:#3a6a8a;--font-head:'Rajdhani',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.navbar{background:rgba(3,10,22,.97);border-bottom:1px solid var(--border);padding:10px 16px;
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;overflow-x:auto;overflow-y:hidden}
.nav-title{font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:var(--pink);letter-spacing:.06em;text-shadow:0 0 14px rgba(255,94,160,.5)}
.nav-sub{font-size:.7rem;color:var(--text-dim)}.nav-space{flex:1 0 auto}.navbar a{flex:0 0 auto}
.nav-back{font-size:.7rem;color:var(--text-dim);border:1px solid var(--border);padding:5px 10px;border-radius:2px;cursor:pointer;background:none;transition:all .2s;white-space:nowrap}
.nav-back:hover{border-color:var(--cyan);color:var(--cyan)}
.wrap{max-width:1100px;margin:0 auto;padding:18px 16px;display:grid;grid-template-columns:320px 1fr;gap:18px}
@media(max-width:780px){.wrap{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:16px}
.card h3{font-family:var(--font-head);font-size:.95rem;color:var(--cyan);letter-spacing:.05em;margin-bottom:12px;font-weight:700}
label{display:block;font-size:.7rem;color:var(--text-dim);margin-bottom:5px;letter-spacing:.04em}
select,input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:2px;font-size:.82rem;outline:none;margin-bottom:12px}
select:focus,input:focus{border-color:var(--cyan)}
.drop{border:1.5px dashed var(--border-hi);border-radius:4px;padding:24px 12px;text-align:center;color:var(--text-dim);font-size:.8rem;cursor:pointer;transition:all .2s;margin-bottom:12px}
.drop:hover,.drop.over{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.04)}
.btn{width:100%;padding:10px;border-radius:2px;cursor:pointer;font-size:.82rem;font-family:var(--font-head);letter-spacing:.05em;text-transform:uppercase;transition:all .2s;border:1px solid;margin-top:6px}
.btn-primary{background:rgba(255,94,160,.12);border-color:var(--pink);color:var(--pink)}
.btn-primary:hover{background:rgba(255,94,160,.22)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:none;border-color:var(--border);color:var(--text-dim)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.stat{font-size:.72rem;color:var(--text-dim);line-height:1.8}
.stat b{color:var(--text-hi)}
.preview-wrap{background:#04101f;border:1px solid var(--border);border-radius:4px;overflow:hidden;position:relative;min-height:420px;display:flex;align-items:center;justify-content:center}
#cv{max-width:100%;max-height:70vh;display:block}
.ph{color:var(--text-dim);font-size:.82rem;text-align:center;padding:40px}
.msg{font-size:.74rem;text-align:center;padding:6px;margin-top:8px;min-height:1.4em}
.msg.ok{color:var(--green)}.msg.err{color:var(--red)}.msg.work{color:var(--amber)}
.saved-list{margin-top:10px}
.saved-item{display:flex;align-items:center;gap:8px;font-size:.72rem;padding:6px 8px;border:1px solid var(--border);border-radius:2px;margin-bottom:5px}
.saved-item .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.saved-item .fl{color:var(--text-hi);font-weight:600;min-width:34px}
.saved-item .dt{color:var(--text-dim);margin-left:auto}
.links{margin-top:12px;display:flex;gap:8px}
.links a{flex:1;text-align:center;font-size:.72rem;color:var(--cyan);border:1px solid var(--border);padding:7px;border-radius:2px;text-decoration:none;transition:all .2s}
.links a:hover{border-color:var(--cyan);background:rgba(0,212,255,.06)}
.hintbox{font-size:.68rem;color:var(--text-dim);line-height:1.7;margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
</style>
</head>
<body>
<nav class="navbar">
  <div>
    <div class="nav-title">⬢ 3D建模系統</div>
    <div class="nav-sub">上傳 DXF → 更新樓層平面圖 + 3D 立體模型</div>
  </div>
  <div class="nav-space"></div>
  <a href="modeler.html"><button class="nav-back">3D建模系統</button></a>
  <a href="b1plan.html"><button class="nav-back">開啟平面圖</button></a>
  <a href="floor3d.html"><button class="nav-back">開啟3D模型</button></a>
  <a href="arealist.html"><button class="nav-back">區域位置表</button></a>
  <a href="b1_integrated_marker_system.html"><button class="nav-back">整合標記系統</button></a>
  <a href="admin.html#modelhub"><button class="nav-back">後台</button></a>
</nav>

<div class="wrap">
  <!-- 控制面板 -->
  <div class="card">
    <h3>◈ 上傳設定</h3>
    <label>選擇樓層</label>
    <select id="floorSel">
      <option value="B1">B1 地下一層</option>
      <option value="1F" selected>1F 一樓</option>
      <option value="2F">2F 二樓</option>
      <option value="3F">3F 三樓</option>
      <option value="4F">4F 四樓</option>
      <option value="5F">5F 五樓</option>
      <option value="__custom">＋ 自訂樓層代號…</option>
    </select>
    <input type="text" id="floorCustom" placeholder="自訂樓層代號（如 R1 / B2）" style="display:none">

    <label>DXF 檔案（單位 mm）</label>
    <div class="drop" id="drop">
      點此選擇或拖曳 DXF 檔<br><span style="font-size:.7rem">.dxf</span>
      <input type="file" id="file" accept=".dxf" style="display:none">
    </div>

    <div class="stat" id="stat" style="display:none"></div>
    <button class="btn btn-primary" id="saveBtn" disabled onclick="saveModel()">▲ 更新模型</button>
    <div class="msg" id="msg"></div>

    <h3 style="margin-top:18px">◉ 已建立的樓層模型</h3>
    <div class="saved-list" id="savedList"><div class="stat">載入中…</div></div>

    <div class="links">
      <a href="floor3d.html">⬡ 開啟 3D 立體模型</a>
      <a href="b1plan.html">▣ 開啟平面圖</a>
    </div>
    <div class="hintbox">
      ※ DXF 在瀏覽器即時解析渲染，更新後 3D 模型與平面圖會自動載入新版本。<br>
      ※ 建議各樓層使用<b>相同座標系</b>的 DXF，立體疊合才會對齊。
    </div>
  </div>

  <!-- 預覽 -->
  <div class="card" style="padding:12px">
    <div class="preview-wrap">
      <div class="ph" id="ph">選擇樓層並上傳 DXF<br>即可在此預覽霓虹平面圖</div>
      <canvas id="cv" style="display:none"></canvas>
    </div>
  </div>
</div>

<script>
const SUPA_URL='https://qztffronusdhgxhjjubt.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dGZmcm9udXNkaGd4aGpqdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI1MzgsImV4cCI6MjA5NzI2ODUzOH0.FnUxot5YXI3yKCUCmJA5P4ysEJhmtaQQA6rM7MRy3oA';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
function getParser(){ return window.DxfParser?.default || window.DxfParser || null; }

let lastBlob=null, lastBBox=null;
const TEX=2400; // texture long-side px

// ─── floor select custom ───
document.getElementById('floorSel').onchange=e=>{
  document.getElementById('floorCustom').style.display = e.target.value==='__custom' ? 'block':'none';
};
function currentFloor(){
  const v=document.getElementById('floorSel').value;
  return v==='__custom' ? (document.getElementById('floorCustom').value.trim().toUpperCase()||'NEW') : v;
}

// ─── file input / drop ───
const drop=document.getElementById('drop'), fileInp=document.getElementById('file');
drop.onclick=()=>fileInp.click();
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over');};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};
fileInp.onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);};

function setMsg(t,cls){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+(cls||'');}

async function handleFile(f){
  if(!/\.dxf$/i.test(f.name)){setMsg('請選擇 .dxf 檔','err');return;}
  const ParserCls=getParser();
  if(!ParserCls){ setMsg('DXF 解析元件尚未載入完成，請等 2~3 秒後重試（或檢查網路）','err'); return; }
  setMsg('解析 DXF…','work');
  try{
    const text=await f.text();
    const dxf=new ParserCls().parseSync(text);
    const polylines=[];
    collect(dxf.entities||[], dxf.blocks||{}, p=>p, polylines, 0);
    if(!polylines.length){setMsg('找不到可繪製的幾何（線/弧/聚合線）','err');return;}
    const bbox=computeBBox(polylines);
    renderNeon(polylines,bbox);
    lastBBox=bbox;
    const npts=polylines.reduce((s,p)=>s+p.length,0);
    document.getElementById('stat').style.display='block';
    document.getElementById('stat').innerHTML=
      `檔名：<b>${f.name}</b><br>線段群組：<b>${polylines.length}</b>　頂點：<b>${npts}</b><br>`+
      `範圍：<b>${Math.round(bbox.w)}</b> × <b>${Math.round(bbox.h)}</b> mm`;
    document.getElementById('cv').toBlob(b=>{lastBlob=b;document.getElementById('saveBtn').disabled=false;setMsg('解析完成，可按「更新模型」','ok');},'image/png');
  }catch(err){ setMsg('解析失敗：'+err.message,'err'); }
}

// ─── recursive entity collection (expands INSERT/blocks) ───
function collect(entities, blocks, tf, out, depth){
  if(depth>6) return;
  for(const e of entities){
    if(e.type==='INSERT' && blocks[e.name]){
      const blk=blocks[e.name];
      const it=insertTf(e);
      const bx=blk.position?.x||0, by=blk.position?.y||0;
      const tf2=p=>tf(it([p[0]-bx,p[1]-by]));
      collect(blk.entities||[], blocks, tf2, out, depth+1);
    }else{
      entToPolylines(e).forEach(pl=>{ if(pl.length>1) out.push(pl.map(tf)); });
    }
  }
}
function insertTf(e){
  const ox=e.position?.x||0, oy=e.position?.y||0, sx=e.xScale||1, sy=e.yScale||1, rot=(e.rotation||0)*Math.PI/180;
  const c=Math.cos(rot), s=Math.sin(rot);
  return ([x,y])=>{const X=x*sx,Y=y*sy;return [ox+X*c-Y*s, oy+X*s+Y*c];};
}
function entToPolylines(e){
  const T=e.type;
  if(T==='LINE'&&e.vertices?.length>=2) return [[[e.vertices[0].x,e.vertices[0].y],[e.vertices[1].x,e.vertices[1].y]]];
  if((T==='LWPOLYLINE'||T==='POLYLINE')&&e.vertices?.length){
    const pts=e.vertices.map(v=>[v.x,v.y]);
    if(e.shape||e.closed) pts.push(pts[0]);
    return [pts];
  }
  if(T==='CIRCLE'&&e.center) return [sampleArc(e.center.x,e.center.y,e.radius,0,Math.PI*2)];
  if(T==='ARC'&&e.center){
    let a0=e.startAngle, a1=e.endAngle;
    if(Math.abs(a0)>Math.PI*2.01||Math.abs(a1)>Math.PI*2.01){a0*=Math.PI/180;a1*=Math.PI/180;}
    if(a1<a0) a1+=Math.PI*2;
    return [sampleArc(e.center.x,e.center.y,e.radius,a0,a1)];
  }
  if(T==='ELLIPSE'&&e.center){
    const cx=e.center.x, cy=e.center.y, mx=e.majorAxisEndPoint?.x||0, my=e.majorAxisEndPoint?.y||0;
    const major=Math.hypot(mx,my), ratio=e.axisRatio||1, ang=Math.atan2(my,mx);
    const out=[]; const a0=e.startAngle||0, a1=(e.endAngle!=null?e.endAngle:Math.PI*2);
    const N=64; for(let i=0;i<=N;i++){const t=a0+(a1-a0)*i/N; const x=major*Math.cos(t), y=major*ratio*Math.sin(t);
      out.push([cx+x*Math.cos(ang)-y*Math.sin(ang), cy+x*Math.sin(ang)+y*Math.cos(ang)]);}
    return [out];
  }
  return [];
}
function sampleArc(cx,cy,r,a0,a1){const out=[];const N=Math.max(8,Math.ceil((a1-a0)/(Math.PI/24)));for(let i=0;i<=N;i++){const a=a0+(a1-a0)*i/N;out.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}return out;}

function computeBBox(pls){
  let mnx=1e18,mny=1e18,mxx=-1e18,mxy=-1e18;
  pls.forEach(p=>p.forEach(([x,y])=>{if(x<mnx)mnx=x;if(y<mny)mny=y;if(x>mxx)mxx=x;if(y>mxy)mxy=y;}));
  return {mnx,mny,mxx,mxy,w:mxx-mnx,h:mxy-mny};
}

function renderNeon(pls,bbox){
  const cv=document.getElementById('cv');
  const pad=40, ar=bbox.w/bbox.h;
  let W,H; if(ar>=1){W=TEX;H=Math.round(TEX/ar);}else{H=TEX;W=Math.round(TEX*ar);}
  cv.width=W+pad*2; cv.height=H+pad*2;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height); // transparent bg (for 3D overlay)
  const sc=Math.min(W/bbox.w,H/bbox.h);
  const X=x=>pad+(x-bbox.mnx)*sc, Y=y=>pad+(bbox.mxy-y)*sc; // flip Y
  // glow pass + crisp pass
  ctx.lineJoin='round';ctx.lineCap='round';
  for(const pass of [{w:3.0,blur:8,a:.5},{w:1.4,blur:3,a:.85},{w:1.0,blur:0,a:1}]){
    ctx.strokeStyle=`rgba(94,234,255,${pass.a})`; ctx.lineWidth=pass.w;
    ctx.shadowColor='#5eeaff'; ctx.shadowBlur=pass.blur;
    pls.forEach(p=>{ctx.beginPath();p.forEach(([x,y],i)=>i?ctx.lineTo(X(x),Y(y)):ctx.moveTo(X(x),Y(y)));ctx.stroke();});
  }
  ctx.shadowBlur=0;
  cv.style.display='block'; document.getElementById('ph').style.display='none';
}

// ─── save to Supabase Storage + floor_models ───
async function saveModel(){
  if(!lastBlob){setMsg('請先上傳 DXF','err');return;}
  const floor=currentFloor();
  if(!floor){setMsg('請選擇樓層','err');return;}
  setMsg('上傳中…','work');
  document.getElementById('saveBtn').disabled=true;
  try{
    const path=`${floor}.png`;
    const up=await db.storage.from('floorplans').upload(path,lastBlob,{upsert:true,contentType:'image/png'});
    if(up.error) throw up.error;
    const sel=document.getElementById('floorSel');
    const label = sel.value==='__custom' ? floor : sel.selectedOptions[0].textContent.trim();
    const rec={floor_id:floor, name:label, image_path:path, bbox:lastBBox, updated_at:new Date().toISOString()};
    const ins=await db.from('floor_models').upsert(rec,{onConflict:'floor_id'});
    if(ins.error) throw ins.error;
    setMsg('✓ 已更新 '+floor+' 模型，平面圖與 3D 已同步','ok');
    loadSaved();
  }catch(err){
    setMsg('儲存失敗：'+(err.message||err)+'（請確認已建立 floor_models 表與 floorplans 儲存桶）','err');
  }finally{ document.getElementById('saveBtn').disabled=false; }
}

async function loadSaved(){
  const box=document.getElementById('savedList');
  const {data,error}=await db.from('floor_models').select('*').order('floor_id');
  if(error){box.innerHTML=`<div class="stat" style="color:var(--amber)">尚未建立 floor_models 表<br><small>請先執行 system/sql/floor_models.sql</small></div>`;return;}
  if(!data?.length){box.innerHTML='<div class="stat">尚無樓層模型</div>';return;}
  box.innerHTML=data.map(d=>{
    const dt=new Date(d.updated_at).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    return `<div class="saved-item"><span class="dot"></span><span class="fl">${d.floor_id}</span><span>${d.name||''}</span><span class="dt">${dt}</span></div>`;
  }).join('');
}

loadSaved();

// warn if the DXF parser library failed to load from CDN
setTimeout(()=>{
  if(!getParser()){
    const d=document.getElementById('drop');
    d.style.borderColor='var(--red)'; d.style.color='var(--red)';
    d.innerHTML='⚠ DXF 解析元件載入失敗<br><span style="font-size:.7rem">請檢查網路或稍後重新整理頁面</span>';
  }
},2800);
</script>
</body>
