<main class="content">
  <section class="hero">
    <div><h1>設備生命週期管理</h1><p>設備主檔是巡檢、保養、報修派工、材料成本與中央監控的共同資料核心。</p></div>
    <div class="sync-state"><span class="dot"></span><span id="syncText">讀取資料中…</span></div>
  </section>
  <div class="setup-banner" id="setupBanner"></div>

  <section class="kpis">
    <div class="kpi" style="--k:var(--cyan)"><div class="n" id="kTotal">0</div><div class="l">設備總數</div></div>
    <div class="kpi" style="--k:var(--green)"><div class="n" id="kActive">0</div><div class="l">運轉中</div></div>
    <div class="kpi" style="--k:var(--red)"><div class="n" id="kDue">0</div><div class="l">保養逾期</div></div>
    <div class="kpi" style="--k:var(--amber)"><div class="n" id="kWarranty">0</div><div class="l">90 天內保固到期</div></div>
    <div class="kpi" style="--k:var(--purple)"><div class="n" id="kMonitor">0</div><div class="l">中央監控已對照</div></div>
  </section>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="assets" onclick="setTab('assets')">設備總表 <span class="cnt" id="cnt-assets">0</span></button>
    <button class="tab" data-tab="plans" onclick="setTab('plans')">保養排程 <span class="cnt" id="cnt-plans">0</span></button>
    <button class="tab" data-tab="records" onclick="setTab('records')">維修履歷 <span class="cnt" id="cnt-records">0</span></button>
    <button class="tab" data-tab="contracts" onclick="setTab('contracts')">保養合約 <span class="cnt" id="cnt-contracts">0</span></button>
    <button class="tab" data-tab="documents" onclick="setTab('documents')">文件管理 <span class="cnt" id="cnt-documents">0</span></button>
    <button class="tab mobile-hide" data-tab="costs" onclick="setTab('costs')">年度成本 <span class="cnt" id="cnt-costs">0</span></button>
    <button class="tab mobile-hide" data-tab="integration" onclick="setTab('integration')">中央監控介接 <span class="cnt" id="cnt-integration">0</span></button>
  </div>

  <div class="toolbar">
    <input id="search" class="grow" placeholder="搜尋設備編號、名稱、樓層、廠牌或型號…" oninput="page=1;renderCurrent()">
    <select id="floorFilter" onchange="page=1;renderCurrent()"><option value="">全部樓層</option></select>
    <select id="categoryFilter" onchange="page=1;renderCurrent()"><option value="">全部類別</option></select>
    <button class="btn btn-primary" id="addBtn" onclick="addForCurrentTab()">＋ 新增設備</button>
    <button class="btn mobile-hide" onclick="document.getElementById('importFile').click()">⭳ 匯入 XLSX</button>
    <button class="btn btn-green mobile-hide" onclick="showExportDialog()">⭱ 匯出 XLSX</button>
    <button class="btn mobile-hide" onclick="downloadTemplate()">▤ 下載範本</button>
    <button class="btn btn-amber mobile-hide" onclick="printAllEquipmentQR()">▦ 列印全部 QR</button>

function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDate(v){if(!v)return '—';const s=String(v);if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);const d=new Date(v);return isNaN(d)?s:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function money(v){return Number(v||0).toLocaleString('zh-TW',{maximumFractionDigits:0});}
function eq(id){return state.assets.find(x=>x.equipment_id===id)||{};}
function eqText(id){const e=eq(id);return e.asset_code?`${e.asset_code}｜${e.name}`:(e.name||'—');}
function toast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2600);}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function openModal(id){document.getElementById(id).classList.add('show');}
function schemaError(error){return error&&(error.code==='42P01'||error.code==='42703'||/does not exist|schema cache|column .* could not be found/i.test(error.message||''));}
function floorRank(v){const s=String(v||'').toUpperCase();const b=s.match(/^B(\d+)F?$/);if(b)return 100-Number(b[1]);const n=s.match(/^(\d+)F?$/);if(n)return 100+Number(n[1]);if(s==='RF')return 999;return 500;}
function canonicalFloor(v){const s=String(v||'').trim().toUpperCase();if(/^B\d+$/.test(s))return s;if(/^B\d+F$/.test(s))return s.slice(0,-1);if(/^\d+$/.test(s))return s+'F';return s;}
function dueClass(v){if(!v)return '';const days=(new Date(v+'T00:00:00')-new Date(todayISO()+'T00:00:00'))/86400000;return days<0?'bad':days<=30?'warn':'ok';}
function statusPill(s){const c=s==='active'?'ok':s==='retired'||s==='expired'?'bad':'warn';return `<span class="pill ${c}">${esc(STATUS[s]||s||'—')}</span>`;}

async function safeLoad(key){
  const {data,error}=await db.from(TABLES[key]).select('*').limit(5000);
  if(error){if(schemaError(error))missingTables.push(TABLES[key]);else console.warn(TABLES[key],error);return [];}return data||[];
}
async function safeCoreLoad(table){const {data,error}=await db.from(table).select('*').limit(5000);if(error){console.warn(table,error);return [];}return data||[];}
async function loadAll(){
  document.getElementById('syncText').textContent='讀取資料中…';missingTables=[];

function renderSetup(){const b=document.getElementById('setupBanner');if(!missingTables.length){b.className='setup-banner';return;}b.className='setup-banner show';b.innerHTML=`設備主檔可讀取，但生命週期資料表尚未建立：${esc([...new Set(missingTables)].join('、'))}。請由管理員先在 Supabase SQL Editor 執行 <code>system/sql/equipment_lifecycle.sql</code>，再重新整理本頁。`;}
function updateFilters(){
  const floors=[...new Set(state.assets.map(x=>canonicalFloor(x.floor||x.location)).filter(Boolean))].sort((a,b)=>floorRank(a)-floorRank(b));
  const cats=[...new Set(state.assets.map(x=>x.category).filter(Boolean))].sort();
  document.getElementById('floorFilter').innerHTML='<option value="">全部樓層</option>'+floors.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
  document.getElementById('categoryFilter').innerHTML='<option value="">全部類別</option>'+cats.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
}
function updateKpis(){
  const now=new Date(todayISO()+'T00:00:00'),d90=new Date(now.getTime()+90*86400000);
  const dueIds=new Set(state.plans.filter(x=>x.status==='active'&&x.next_due_on&&new Date(x.next_due_on)<now).map(x=>x.equipment_id));
  state.assets.filter(x=>x.next_maintenance_on&&new Date(x.next_maintenance_on)<now).forEach(x=>dueIds.add(x.equipment_id));
  document.getElementById('kTotal').textContent=state.assets.length;
  document.getElementById('kActive').textContent=state.assets.filter(x=>x.status==='active').length;
  document.getElementById('kDue').textContent=dueIds.size;
  document.getElementById('kWarranty').textContent=state.assets.filter(x=>x.warranty_until&&new Date(x.warranty_until)>=now&&new Date(x.warranty_until)<=d90).length;
  document.getElementById('kMonitor').textContent=new Set(state.links.filter(x=>x.status==='active').map(x=>x.equipment_id)).size;
}
function updateCounts(){

  document.getElementById('cnt-integration').textContent=state.links.length+state.points.length;
}

function paginate(arr){const pages=Math.max(1,Math.ceil(arr.length/PER));page=Math.min(page,pages);return {rows:arr.slice((page-1)*PER,page*PER),pages,total:arr.length};}

function markerForEquipment(equipmentId){return state.markers.filter(m=>m.equipment_id===equipmentId&&m.status!=='inactive').sort((a,b)=>new Date(b.updated_at||b.created_at||0)-new Date(a.updated_at||a.created_at||0))[0]||null;}
function equipment3DUrl(equipmentId){const u=new URL('floor3d.html',location.href);u.searchParams.set('equipment',equipmentId);return u.href;}
function markerCoordinate(marker){if(!marker)return '尚未設定 3D 點位';const x=Number(marker.x),y=Number(marker.y);return `${canonicalFloor(marker.floor_id)||marker.floor_id}｜X ${Number.isFinite(x)?x.toFixed(4):'—'}｜Y ${Number.isFinite(y)?y.toFixed(4):'—'}`;}
function renderQrInto(el,text,size=190){el.innerHTML='';if(typeof QRCode!=='function'){el.textContent='QR 元件載入失敗，請重新整理頁面。';return null;}new QRCode(el,{text,width:size,height:size,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});return el.querySelector('canvas,img');}
function openEquipmentQr(id){const e=eq(id);if(!e.equipment_id)return;const marker=markerForEquipment(id),url=equipment3DUrl(id);document.getElementById('qrModalTitle').textContent=`設備 3D 定位 QR｜${e.asset_code||e.qr_code||e.name}`;document.getElementById('qrModalBody').innerHTML=`<div class="qr-preview-box"><div id="equipmentQrCanvas"></div></div><div class="qr-meta"><div class="k">設備</div><div class="v"><strong>${esc(e.name)}</strong></div><div class="k">設備編號</div><div class="v code">${esc(e.asset_code||e.qr_code||'—')}</div><div class="k">3D 點位</div><div class="v qr-coordinate">${esc(markerCoordinate(marker))}</div><div class="k">掃描結果</div><div class="v">${marker?'開啟 3D 雲台並聚焦此設備':'開啟 3D 雲台；待設定點位後會自動定位'}</div></div>`;document.getElementById('qrModalMsg').textContent=marker?'':'此設備尚未在平面標記系統綁定 3D 點位。';document.getElementById('qr3dLink').href=url;document.getElementById('qrPrintOneBtn').onclick=()=>printEquipmentQR(id);openModal('qrModal');requestAnimationFrame(()=>renderQrInto(document.getElementById('equipmentQrCanvas'),url,190));}
async function qrDataUrl(text,size=300){const holder=document.createElement('div');holder.style.cssText='position:fixed;left:-9999px;top:-9999px;background:#fff;padding:4px';document.body.appendChild(holder);renderQrInto(holder,text,size);await new Promise(r=>setTimeout(r,40));const canvas=holder.querySelector('canvas'),img=holder.querySelector('img');const src=canvas?canvas.toDataURL('image/png'):(img?.src||'');holder.remove();return src;}
async function printEquipmentCards(assets,title){
  if(!assets.length){toast('沒有可列印的設備 QR。',true);return;}
  if(typeof QRCode!=='function'){toast('QR 元件載入失敗，請重新整理頁面後再試。',true);return;}
  const w=window.open('','equipment-qr-print');
  if(!w){toast('瀏覽器已封鎖列印視窗，請允許彈出式視窗。',true);return;}
  w.document.write('<!doctype html><meta charset="utf-8"><title>準備設備 QR</title><p style="font-family:sans-serif;padding:24px">正在產生設備 QR，請稍候…</p>');
  const cards=[];
  for(const e of assets){
    const marker=markerForEquipment(e.equipment_id),src=await qrDataUrl(equipment3DUrl(e.equipment_id),260);
    cards.push(`<article><img src="${src}" alt="QR"><h2>${esc(e.asset_code||e.qr_code||'—')}</h2><h3>${esc(e.name||'')}</h3><p>${esc(canonicalFloor(e.floor||e.location)||'—')}｜${esc(e.location||'')}</p><p class="coord ${marker?'':'warn'}">${esc(markerCoordinate(marker))}</p></article>`);
  }
  const mapped=assets.filter(e=>markerForEquipment(e.equipment_id)).length;
  const printScript='<scr'+'ipt>addEventListener("load",()=>setTimeout(()=>print(),300));</scr'+'ipt>';
  w.document.open();
  w.document.write(`<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><title>${esc(title)}</title><style>@page{size:A4;margin:9mm}*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans TC",Arial,sans-serif;color:#111}.head{display:flex;justify-content:space-between;align-items:end;border-bottom:2px solid #111;padding-bottom:5mm;margin-bottom:5mm}.head h1{font-size:18pt;margin:0}.head p{font-size:9pt;margin:0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4mm}article{border:1px solid #444;border-radius:3mm;padding:4mm;text-align:center;break-inside:avoid;min-height:86mm}article img{width:42mm;height:42mm;image-rendering:crisp-edges}h2{font:700 13pt Consolas,monospace;margin:2mm 0 1mm}h3{font-size:11pt;margin:0 0 1mm;min-height:8mm}p{font-size:8.5pt;margin:1mm 0;overflow-wrap:anywhere}.coord{font-family:Consolas,monospace;color:#005b80}.coord.warn{color:#a54d00;font-family:inherit}</style></head><body><header class="head"><div><h1>${esc(title)}</h1><p>掃描後開啟設備對應的 3D 雲台座標</p></div><p>設備 ${assets.length}｜已設定座標 ${mapped}｜未設定 ${assets.length-mapped}</p></header><main class="grid">${cards.join('')}</main>${printScript}</body></html>`);
  w.document.close();
  toast(`已產生 ${assets.length} 張設備 QR（${mapped} 張已綁定 3D 點位）`);
}

function validateExportData(ids){
  const issues=[];
  const eqs=state.assets.filter(x=>ids.has(x.equipment_id));
  if(!eqs.length)return['無設備資料可匯出'];
  if(eqs.length!==ids.size)issues.push(`設備筆數不一致：篩選 ${ids.size} 筆，實際 ${eqs.length} 筆`);
  const codes=eqs.map(x=>x.asset_code||x.qr_code||'');
  const blanks=codes.filter(x=>!x);
  if(blanks.length)issues.push(`${blanks.length} 筆設備缺少編號`);
  const dups=codes.filter((x,i,a)=>x&&a.indexOf(x)!==i);
  if(dups.length)issues.push(`設備編號重複：${[...new Set(dups)].join('、')}`);
  const missing=[];
  if(eqs.some(x=>!x.brand))missing.push('廠牌');
  if(eqs.some(x=>!x.model))missing.push('型號');
  if(eqs.some(x=>!x.location))missing.push('位置');
  if(eqs.some(x=>!x.responsible_name))missing.push('負責人');
  if(eqs.some(x=>!x.next_maintenance_on&&!state.plans.some(p=>p.equipment_id===x.equipment_id&&p.status==='active'&&p.next_due_on)))missing.push('保養日期');
  if(missing.length)issues.push(`資料完整度：部分設備缺少 ${missing.join('、')}`);
  const orphanPlan=state.plans.filter(x=>ids.has(x.equipment_id)&&!ids.has(x.equipment_id));
  return issues;
}

function xlDate(v){const d=excelDate(v);return d||null;}
function xlNum(v){const n=Number(v??'');return Number.isFinite(n)?n:null;}
function emptyIfNull(v){return v==null?'':v;}
function xlHyperlink(url,label){return url?{text:label||url,hyperlink:url,tooltip:url}:label||'';}

async function buildExcelDataSheet(wb,name,rows,headers,urlFields,statusField,amountFields){
  const ws=wb.addWorksheet(name,{views:[{state:'frozen',ySplit:1}]});
  const hRow=ws.addRow(headers);
  hRow.eachCell(c=>{c.font={bold:true,color:{argb:'FFFFFFFF'},name:'Microsoft JhengHei',size:10};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF003E6B'}};c.alignment={horizontal:'center',vertical:'middle',wrapText:true};c.border={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};});
  ws.addRows(rows);
  ws.spliceRows(ws.rowCount-rows.length+1,0,ws.getRow(ws.rowCount-rows.length+1));
  
  // Style data rows
  rows.forEach((r,i)=>{
    const rn=ws.getRow(i+2);
    rn.eachCell((c,j)=>{
      c.alignment={vertical:'middle',wrapText:c.value&&String(c.value).length>30};
      c.border={top:{style:'thin',color:{argb:'FFD0D0D0'}},
                 bottom:{style:'thin',color:{argb:'FFD0D0D0'}},
                 left:{style:'thin',color:{argb:'FFD0D0D0'}},
                 right:{style:'thin',color:{argb:'FFD0D0D0'}}};
      if(i%2===1)c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF0F4F8'}};
      c.font={name:'Microsoft JhengHei',size:9};
    });
    // Status column styling
    if(statusField){
      const si=headers.indexOf(statusField);
      if(si>=0){
        const val=String(r[si]||'');
        const cell=rn.getCell(si+1);
        if(val.includes('啟用')||val==='已對照')cell.font={color:{argb:'FF059669'},name:'Microsoft JhengHei',size:9};
        else if(val.includes('停用')||val.includes('退役')||val==='未介接')cell.font={color:{argb:'FFDC2626'},name:'Microsoft JhengHei',size:9};
        else cell.font={color:{argb:'FFB45309'},name:'Microsoft JhengHei',size:9};
      }
    }
    // Amount formatting
    (amountFields||[]).forEach(f=>{
      const ai=headers.indexOf(f);
      if(ai>=0){const v=Number(rn.getCell(ai+1).value);if(Number.isFinite(v)){rn.getCell(ai+1).value=v;rn.getCell(ai+1).numFmt='#,##0';rn.getCell(ai+1).alignment={horizontal:'right',vertical:'middle'};}}
    });
    // URL hyperlinks
    (urlFields||[]).forEach(f=>{
      const ui=headers.indexOf(f);
      if(ui>=0){const v=String(rn.getCell(ui+1).value||'');if(/^https?:\/\//.test(v)){rn.getCell(ui+1).value={text:v,hyperlink:v,tooltip:v};rn.getCell(ui+1).font={color:{argb:'FF056CF0'},underline:true,name:'Microsoft JhengHei',size:9};}}
    });
  });
  
  // Column widths
  ws.getColumn(1).width=3;
  headers.forEach((h,i)=>{
    let maxW=h.length*2.2;
    rows.forEach(r=>{const l=String(r[i]||'').length;if(l*1.2>maxW)maxW=l*1.2;});
    ws.getColumn(i+1).width=Math.min(Math.max(10,maxW+2),42);
  });
  
  // Auto filter
  if(rows.length)ws.autoFilter={from:{row:1,column:1},to:{row:rows.length+1,column:headers.length}};
  
  // Page setup
  ws.pageSetup.orientation='landscape';ws.pageSetup.fitToPage=true;ws.pageSetup.fitToWidth=1;ws.pageSetup.paperSize=9;
  ws.pageSetup.margins={left:0.5,right:0.5,top:0.5,bottom:0.5,header:0.2,footer:0.2};
  ws.pageSetup.printTitlesRow='1:1';
}

async function buildExportWorkbook(ids){
  const scope=document.getElementById('exportScope').value;

  // Validate
  const issues=validateExportData(ids);
  const eqs=state.assets.filter(x=>ids.has(x.equipment_id));
  const eqMap=new Map(eqs.map(x=>[x.equipment_id,x]));
  
  // Build data rows per sheet
  const assetRows=eqs.map(e=>{
    const vm=buildEquipmentViewModel(e);
    return XLSX_HEADERS['設備總表'].map(h=>{
      const v=vm[h];
      if(/網址|URL|手冊|圖|程式/.test(h)&&v&&String(v).startsWith('http'))return xlHyperlink(v,v);
      if(/座標/.test(h)&&v!=='')return String(v);
      return v==null?'':String(v);
    });
  });
  
  const planRows=state.plans.filter(x=>ids.has(x.equipment_id)).map(x=>[
    eqText(x.equipment_id),eqMap.get(x.equipment_id)?.name||'',x.item_name||'',x.cycle_text||'',x.responsible_name||'',
    xlDate(x.last_performed_on),xlDate(x.next_due_on),xlDate(x.last_completed_on),x.last_result||'',x.status||'',x.note||''
  ]);
  
  const recordRows=state.records.filter(x=>ids.has(x.equipment_id)).map(x=>[
    xlDate(x.performed_on),eqText(x.equipment_id),eqMap.get(x.equipment_id)?.name||'',
    x.fault_description||'',x.fault_cause||'',x.action_taken||'',x.replacement_parts||'',
    xlNum(x.downtime_hours),x.technician||'',xlNum(x.maintenance_cost),xlNum(x.parts_cost),x.note||''

  const contractRows=state.contracts.filter(x=>ids.has(x.equipment_id)).map(x=>[
    eqText(x.equipment_id),eqMap.get(x.equipment_id)?.name||'',x.vendor||'',x.contact_name||'',x.contact_phone||'',
    xlDate(x.starts_on),xlDate(x.ends_on),x.service_scope||'',xlNum(x.contract_amount),xlNum(x.sla_hours),x.status||'',x.note||''
  ]);
  
  const docRows=state.documents.filter(x=>ids.has(x.equipment_id)).map(x=>[
    eqText(x.equipment_id),eqMap.get(x.equipment_id)?.name||'',x.document_type||'',x.title||'',x.version||'',
    xlDate(x.effective_on),xlHyperlink(x.file_url),x.note||''
  ]);
  
  const costRows=state.costs.filter(x=>ids.has(x.equipment_id)).map(x=>{
    const total=xlNum(Number(x.repair_cost||0)+Number(x.maintenance_cost||0)+Number(x.parts_cost||0)+Number(x.downtime_loss||0));
    return [x.fiscal_year,eqText(x.equipment_id),eqMap.get(x.equipment_id)?.name||'',
      xlNum(x.repair_cost),xlNum(x.maintenance_cost),xlNum(x.parts_cost),xlNum(x.downtime_loss),total,x.note||''];
  });
  
  // Central monitoring: left-join from external_links
  const integrationRows=state.links.filter(x=>ids.has(x.equipment_id)).flatMap(l=>{
    const pts=state.points.filter(p=>p.link_id===l.link_id);
    if(pts.length)return pts.map(p=>[
      eqText(l.equipment_id),eqMap.get(l.equipment_id)?.name||'',l.external_system,l.external_equipment_key,
      l.protocol||'',l.sync_mode||'',l.source_of_truth||'',l.endpoint_alias||'',
      p.point_code,p.point_name,p.point_address||'',p.data_type||'',p.unit||'',p.access_mode||'',
      xlNum(p.sampling_seconds),xlNum(p.normal_min),xlNum(p.normal_max),xlNum(p.alarm_low),xlNum(p.alarm_high),
      l.status||'',p.status||''
    ]);
    return [[eqText(l.equipment_id),eqMap.get(l.equipment_id)?.name||'',l.external_system,l.external_equipment_key,
      l.protocol||'',l.sync_mode||'',l.source_of_truth||'',l.endpoint_alias||'',
      '','','','','','','','','','','',l.status||'','']];
  });
  
  const wb=new ExcelJS.Workbook();

  // Summary sheet
  buildExcelSummarySheet(wb,ids,scopeLabel,eqs.length,{

  },issues);
  
  // Data sheets
  buildExcelDataSheet(wb,'設備總表',assetRows,XLSX_HEADERS['設備總表'],
    ['QR定位網址','操作手冊','維修手冊','電路圖','PLC程式','設備照片'],'設備狀態',['功率']);
  
  buildExcelDataSheet(wb,'保養排程',planRows,XLSX_HEADERS['保養排程'],
    [],[],[],[]);
  
  const recAmts=['維修費用','零件費'];

    [],'維修人員',recAmts);
  
  buildExcelDataSheet(wb,'保養合約',contractRows,XLSX_HEADERS['保養合約'],
    [],'狀態',['合約金額']);
  
  buildExcelDataSheet(wb,'文件管理',docRows,XLSX_HEADERS['文件管理'],
    ['連結'],[],[]);
  
  buildExcelDataSheet(wb,'年度成本',costRows,XLSX_HEADERS['年度成本'],
    [],'',['維修費','保養費','零件費','停機損失','合計']);
  
  const monUrl=['協定'];
  buildExcelDataSheet(wb,'中央監控介接',integrationRows,XLSX_HEADERS['中央監控介接'],
    [],'對照狀態',['取樣秒數','正常下限','正常上限','告警下限','告警上限']);
  
  const now=new Date();
  const ts=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  const buf=await wb.xlsx.writeBuffer();
  saveAs(new Blob([buf]),`設備生命週期_${ts}.xlsx`);
  toast(`匯出完成：${eqs.length} 台設備，共 ${assetRows.length+planRows.length+recordRows.length+contractRows.length+docRows.length+costRows.length+integrationRows.length} 筆資料`);
}

function showExportDialog(){
  const ids=getFilteredEquipmentIds();
  const total=state.assets.length;
  const filtered=ids.size;
  document.getElementById('exportPreview').innerHTML=`<div class="import-summary">${['全部',total,`目前篩選 ${filtered}`].map((l,i)=>`<div class="import-card"><b>${i===0?total:filtered}</b><span>${l}</span></div>`).join('')}</div>`;
  // Validate
  const issues=validateExportData(ids);
  const el=document.getElementById('exportValidation');
  if(issues.length)el.innerHTML='<div class="warn-list">'+issues.slice(0,10).map(x=>'⚠ '+esc(x)).join('<br>')+'</div>';else el.innerHTML='<span style="color:var(--green)">✓ 資料檢核通過</span>';
  document.getElementById('exportMsg').textContent='';

async function doExport(){
  const btn=document.getElementById('exportConfirmBtn'),msg=document.getElementById('exportMsg');
  btn.disabled=true;msg.textContent='正在產生報表…';
  const scope=document.getElementById('exportScope').value;
  const ids=scope==='all'?new Set(state.assets.map(x=>x.equipment_id)):getFilteredEquipmentIds();
  try{
    if(typeof ExcelJS==='undefined'){msg.textContent='ExcelJS 元件載入失敗，請重新整理頁面。';btn.disabled=false;return;}
    if(!ids.size){msg.textContent='無可匯出的資料。';btn.disabled=false;return;}
    await buildExportWorkbook(ids);
    closeModal('exportModal');
  }catch(e){msg.textContent='匯出失敗：'+e.message;btn.disabled=false;console.error(e);}
}

async function prepareImport(ev){const file=ev.target.files[0];ev.target.value='';if(!file)return;try{const wb=XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:true});const sheets={};Object.keys(XLSX_HEADERS).forEach(n=>sheets[n]=sheetRows(wb,n));const incoming=new Set(sheets['設備總表'].map(r=>String(r['設備編號']||'').trim().toUpperCase()).filter(Boolean));const known=new Set([...state.assets.map(e=>String(e.asset_code||e.qr_code||'').toUpperCase()),...incoming]);const refs=[];Object.keys(sheets).filter(n=>n!=='設備總表').forEach(n=>sheets[n].forEach(r=>{const c=String(r['設備編號']||'').trim().toUpperCase();if(c&&!known.has(c))refs.push(`${n}：${c}`);}));pendingImport={fileName:file.name,sheets,refs:[...new Set(refs)]};document.getElementById('importPreview').innerHTML=`<p class="hint">檔案：${esc(file.name)}。系統會以設備編號比對，空白欄位保留原值。</p><div class="import-summary">${Object.entries(sheets).map(([n,r])=>`<div class="import-card"><b>${r.length}</b><span>${n}</span></div>`).join('')}</div>${refs.length?`<div class="warn-list"><strong>無法對應的設備編號（將跳過）</strong><br>${refs.slice(0,50).map(esc).join('<br>')}</div>`:'<div class="hint" style="color:var(--green)">✓ 所有關聯資料皆可對應設備編號。</div>'}`;document.getElementById('importMsg').textContent='';document.getElementById('importConfirmBtn').disabled=false;openModal('importModal');}catch(e){toast('無法讀取 XLSX：'+e.message,true);}}
async function upsertChunks(table,rows,onConflict){for(let i=0;i<rows.length;i+=100){const q=db.from(table).upsert(rows.slice(i,i+100),onConflict?{onConflict}:undefined);const {error}=await q;if(error)throw error;}}

// Non-destructive: only patch fields that have actual values in XLSX
function patchFields(xlsxRow,fieldMap,existing){
  const out={};
  let hasValue=false;
  for(const [xlsxKey,dbKey,transform] of fieldMap){
    const raw=xlsxRow[xlsxKey];
    const hasVal=raw!==undefined&&raw!==null&&String(raw).trim()!=='';
    if(hasVal){
      const val=transform?transform(raw):String(raw).trim();
      // Only set if different from existing
      if(val!==(existing?.[dbKey])&&val!==null&&val!==''){
        out[dbKey]=val;
        hasValue=true;
      }
    }
  }
  return hasValue?out:null;
}

async function confirmImport(){
  if(!pendingImport)return;
  const btn=document.getElementById('importConfirmBtn'),msg=document.getElementById('importMsg');
  btn.disabled=true;msg.textContent='分析匯入資料…';document.getElementById('importPreview').insertAdjacentHTML('beforeend','<p class="hint" style="margin-top:8px;color:var(--amber)">正在以非破壞性 patch 模式匯入，空白欄位不會覆蓋既有資料。</p>');
  try{
    const master=pendingImport.sheets['設備總表'];
    const existing=new Map(state.assets.map(e=>[String(e.asset_code||e.qr_code||'').toUpperCase(),e]));
    
    // Map: [XLSX header, DB field, transformFn]
    const assetMap=[
      ['設備名稱','name'],['設備類別','category'],['設備照片','photo_url'],['使用部門','department'],
      ['廠牌','brand'],['型號','model'],['序號','serial_no'],['製造年份','manufactured_year',v=>num(v)||null],
      ['安裝日期','installed_on',excelDate],['驗收日期','accepted_on',excelDate],
      ['設備壽命','service_life_y',v=>num(v)||null],
      ['電壓','voltage'],['功率','power_kw',v=>num(v)||null],
      ['原廠名稱','original_manufacturer'],['原廠聯絡人','original_contact'],['原廠電話','original_phone'],
      ['代理商','distributor'],['代理商聯絡人','distributor_contact'],['代理商電話','distributor_phone'],
      ['保固開始','warranty_from',excelDate],['保固到期','warranty_until',excelDate],
      ['是否有保養合約','has_maintenance_contract',v=>yes(v)],
      ['保養廠商','maintenance_vendor'],['保養週期','maintenance_cycle'],
      ['上次保養','last_maintenance_on',excelDate],['下次保養','next_maintenance_on',excelDate],
      ['設備負責人','responsible_name'],['24小時維修電話','emergency_phone'],
      ['操作手冊','operation_manual_url'],['維修手冊','maintenance_manual_url'],
      ['電路圖','circuit_diagram_url'],['PLC程式','plc_program_url'],
      ['關鍵程度','criticality'],['外部主資料鍵','external_master_key'],
      ['備註','remarks']
    ];
    // Separate floor/location maps
    const floorMap=[['安裝樓層','floor',v=>canonicalFloor(v)],['位置說明','location']];
    
    let newCount=0,updCount=0,skipCount=0,errCount=0;
    const assetUpdates=[];
    
    for(const r of master){

      if(!old){
        // New equipment - use all available fields
        const nr={asset_code:code,qr_code:code,name:String(r['設備名稱']||code),status:'active'};
        assetMap.forEach(([xh,db,fn])=>{const v=r[xh];if(v!==undefined&&v!==null&&String(v).trim()!=='')nr[db]=fn?fn(v):String(v).trim();});
        floorMap.forEach(([xh,db,fn])=>{const v=r[xh];if(v!==undefined&&v!==null&&String(v).trim()!=='')nr[db]=fn?fn(v):String(v).trim();});
        assetUpdates.push(nr);
        newCount++;
      }else{
        // Patch existing - only non-blank fields
        const p1=patchFields(r,assetMap.map(([xh,db,fn])=>[xh,db,fn||(v=>String(v).trim())]),old);
        const p2=patchFields(r,floorMap.map(([xh,db,fn])=>[xh,db,fn||(v=>String(v).trim())]),old);
        const patch={...(p1||{}),...(p2||{})};
        if(Object.keys(patch).length){
          patch.equipment_id=old.equipment_id;
          assetUpdates.push(patch);
          updCount++;
        }else{skipCount++;}
      }
    }
    
    msg.textContent=`準備匯入：新增 ${newCount} 筆、更新 ${updCount} 筆、略過 ${skipCount} 筆${errCount?`、錯誤 ${errCount} 筆`:''}`;
    if(!assetUpdates.length&&!errCount){toast('無需更新的資料。');btn.disabled=false;closeModal('importModal');pendingImport=null;return;}
    
    // Apply patches
    if(newCount||updCount){
      msg.textContent='正在匯入設備主檔…';
      for(const row of assetUpdates){
        const {error}=row.asset_code
          ? await db.from('equipment').upsert(row,{onConflict:'asset_code'}).select('equipment_id').single()
          : await db.from('equipment').update(row).eq('equipment_id',row.equipment_id).select('equipment_id').single();
        if(error)throw error;
      }
    }
    
    // Reload to get fresh IDs
    const {data:all,error:eqErr}=await db.from('equipment').select('equipment_id,asset_code,qr_code,name').limit(5000);
    if(eqErr)throw eqErr;
    const idMap=new Map((all||[]).map(e=>[String(e.asset_code||e.qr_code||'').toUpperCase(),e]));
    const eid=r=>idMap.get(String(r['設備編號']||'').trim().toUpperCase())?.equipment_id;
    
    let totalRelated=0;
    
    // Plans
    const planUpdates=pendingImport.sheets['保養排程'].filter(r=>eid(r)).map(r=>{
      const p={equipment_id:eid(r)};
      ['保養項目','item_name',v=>v||'定期保養'],['保養週期','cycle_text'],['負責人','responsible_name'],
      ['上次保養','last_performed_on',excelDate],['下次保養','next_due_on',excelDate],
      ['完成日期','last_completed_on',excelDate],['結果','last_result'],['備註','note']
      ].forEach(([xh,db,fn])=>{const v=r[xh];if(v!==undefined&&v!==null&&String(v).trim()!=='')p[db]=fn?fn(v):String(v).trim();});
      if(!p.item_name)p.item_name='定期保養';
      if(Object.keys(p).length>1)return p;
      return null;
    }).filter(Boolean);
    if(planUpdates.length){await upsertChunks('equipment_maintenance_plans',planUpdates,'equipment_id,item_name');totalRelated+=planUpdates.length;}
    
    // Records
    const recordUpdates=pendingImport.sheets['維修履歷'].filter(r=>eid(r)).map(r=>{
      const p={equipment_id:eid(r),record_type:'repair',import_key:'xlsx:'+hash(JSON.stringify([r['設備編號'],r['日期'],r['故障內容'],r['處理方式'],r['維修費用']]))};
      ['日期','performed_on',excelDate],['故障內容','fault_description'],['故障原因','fault_cause'],['處理方式','action_taken'],
      ['更換零件','replacement_parts'],['停機時間(hr)','downtime_hours',v=>num(v)],['維修人員','technician'],
      ['維修費用','maintenance_cost',v=>num(v)],['零件費','parts_cost',v=>num(v)],['備註','note']
      ].forEach(([xh,db,fn])=>{const v=r[xh];if(v!==undefined&&v!==null&&String(v).trim()!=='')p[db]=fn?fn(v):String(v).trim();});
      if(!p.performed_on)p.performed_on=todayISO();
      return p;
    }).filter(Boolean);
    if(recordUpdates.length){await upsertChunks('equipment_maintenance_records',recordUpdates,'import_key');totalRelated+=recordUpdates.length;}
    
    // Contracts
    const contractUpdates=pendingImport.sheets['保養合約'].filter(r=>eid(r)).map(r=>{
      const key=hash(JSON.stringify([r['設備編號'],r['廠商'],r['合約開始'],r['合約到期']]));
      const p={equipment_id:eid(r),vendor:r['廠商']||'未填廠商',import_key:'xlsx:'+key,status:'active'};
      ['聯絡人','contact_name'],['電話','contact_phone'],['合約開始','starts_on',excelDate],['合約到期','ends_on',excelDate],
      ['服務內容','service_scope'],['合約金額','contract_amount',v=>num(v)],['SLA回應小時','sla_hours',v=>num(v)],['備註','note']
      ].forEach(([xh,db,fn])=>{const v=r[xh];if(v!==undefined&&v!==null&&String(v).trim()!=='')p[db]=fn?fn(v):String(v).trim();});
      return p;
    }).filter(Boolean);
    if(contractUpdates.length){await upsertChunks('equipment_contracts',contractUpdates,'import_key');totalRelated+=contractUpdates.length;}
    
    // Documents
    const docUpdates=[];
    pendingImport.sheets['文件管理'].forEach(r=>{
      const id=eid(r);if(!id)return;
      ['文件類型','文件類型'],['文件名稱','title'],['版本','version'],['有效日期','effective_on',excelDate],
      ['連結','file_url'],['備註','note']
    ].forEach(([xh,db,fn])=>{const v=r[xh];if(v&&v!==undefined&&v!==null&&String(v).trim()!==''){}});
    });
    
    // Costs
    const costUpdates=pendingImport.sheets['年度成本'].filter(r=>eid(r)).map(r=>{
      const p={equipment_id:eid(r),fiscal_year:num(r['年度'])||new Date().getFullYear(),source:'import'};
      ['維修費','repair_cost',v=>num(v)],['保養費','maintenance_cost',v=>num(v)],['零件費','parts_cost',v=>num(v)],
      ['停機損失','downtime_loss',v=>num(v)],['備註','note']
      ].forEach(([xh,db,fn])=>{const v=r[xh];if(v!==undefined&&v!==null&&String(v).trim()!=='')p[db]=fn?fn(v):String(v).trim();});
      return p;
    }).filter(Boolean);
    if(costUpdates.length){await upsertChunks('equipment_annual_costs',costUpdates,'equipment_id,fiscal_year,source');totalRelated+=costUpdates.length;}
    
    // Integration links + points
    const intRows=pendingImport.sheets['中央監控介接']||[];
    const linkUpdates=[],pointUpdates=[];
    const seenLinks=new Set();
    intRows.forEach(r=>{
      const id=eid(r),sys=String(r['外部系統']||'').trim(),key=String(r['外部設備鍵']||'').trim();
      if(!id||!sys||!key)return;
      const k=sys+'|'+key;
      if(!seenLinks.has(k)){seenLinks.add(k);
        const p={equipment_id:id,external_system:sys,external_equipment_key:key};
        ['協定','protocol'],['同步模式','sync_mode'],['主資料來源','source_of_truth'],
        ['端點代稱','endpoint_alias'],['對照狀態','status']
        ].forEach(([xh,db])=>{const v=r[xh];if(v&&v!==undefined&&v!==null&&String(v).trim()!=='')p[db]=String(v).trim();});
        if(!p.status)p.status='active';
        linkUpdates.push(p);
      }
      if(r['點位碼']&&String(r['點位碼']).trim()){
        const p={equipment_id:id,point_code:String(r['點位碼']).trim(),point_name:r['點位名稱']||r['點位碼']};
        ['點位名稱','point_name'],['點位位址','point_address'],['資料型態','data_type'],['單位','unit'],
        ['讀寫權限','access_mode'],['取樣秒數','sampling_seconds',v=>num(v)],
        ['正常下限','normal_min',v=>num(v)],['正常上限','normal_max',v=>num(v)],
        ['告警下限','alarm_low',v=>num(v)],['告警上限','alarm_high',v=>num(v)],['點位狀態','status']
        ].forEach(([xh,db,fn])=>{const v=r[xh];if(v!==undefined&&v!==null&&String(v).trim()!=='')p[db]=fn?fn(v):String(v).trim();});
        if(!p.status)p.status='active';
        pointUpdates.push(p);
      }
    });
    if(linkUpdates.length){await upsertChunks('equipment_external_links',linkUpdates,'external_system,external_equipment_key');totalRelated+=linkUpdates.length;}
    if(pointUpdates.length){await upsertChunks('equipment_monitor_points',pointUpdates,'equipment_id,point_code');totalRelated+=pointUpdates.length;}
    
    closeModal('importModal');
    toast(`匯入完成：新增 ${newCount}、更新 ${updCount}、略過 ${skipCount}${errCount?`、錯誤 ${errCount}`:''}，共 ${totalRelated} 筆關聯資料`);
    pendingImport=null;
    await loadAll();
  }catch(e){
    msg.textContent=schemaError(e)?'資料庫尚未套用 equipment_lifecycle.sql，無法匯入。':e.message;
    btn.disabled=false;
    console.error(e);
  }
}

loadAll();
</script>
</body>
</html>
