function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function safeUrl(v){const s=String(v||'').trim();return /^https?:\/\//i.test(s)?esc(s):'';}
function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDate(v){if(!v)return '—';const s=String(v);if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);const d=new Date(v);return isNaN(d)?s:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function money(v){return Number(v||0).toLocaleString('zh-TW',{maximumFractionDigits:0});}
function eq(id){return state.assets.find(x=>x.equipment_id===id)||{};}
function eqText(id){const e=eq(id);return e.asset_code?`${e.asset_code}｜${e.name}`:(e.name||'—');}
function toast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2600);}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function openModal(id){document.getElementById(id).classList.add('show');}
function schemaError(error){return error&&(error.code==='42P01'||error.code==='42703'||/does not exist|schema cache|column .* could not be found/i.test(error.message||''));}
function floorRank(v){const s=String(v||'').toUpperCase();const b=s.match(/^B(\d+)F?$/);if(b)return 100-Number(b[1]);const n=s.match(/^(\d+)F?$/);if(n)return 100+Number(n[1]);if(s==='RF')return 999;return 500;}
function canonicalFloor(v){const s=String(v||'').trim().toUpperCase();if(/^B\d+$/.test(s))return s;if(/^B\d+F$/.test(s))return s.slice(0,-1);if(/^\d+$/.test(s))return s+'F';return s;}
function dueClass(v){if(!v)return '';const days=(new Date(v+'T00:00:00')-new Date(todayISO()+'T00:00:00'))/86400000;return days<0?'bad':days<=30?'warn':'ok';}
function statusPill(s){const c=s==='active'?'ok':s==='retired'||s==='expired'?'bad':'warn';return `<span class="pill ${c}">${esc(STATUS[s]||s||'—')}</span>`;}

async function safeLoad(key){
  const {data,error}=await db.from(TABLES[key]).select('*').limit(5000);
  if(error){if(schemaError(error))missingTables.push(TABLES[key]);else console.warn(TABLES[key],error);return [];}return data||[];
}
async function safeCoreLoad(table){const {data,error}=await db.from(table).select('*').limit(5000);if(error){console.warn(table,error);return [];}return data||[];}
async function loadAll(){
  document.getElementById('syncText').textContent='讀取資料中…';missingTables=[];
  const assetReq=db.from('equipment').select('*').eq('status','active').order('name').limit(5000);
  const [a,plans,records,contracts,documents,costs,links,points,inspections,repairs,orders,costRecords,materials,markers]=await Promise.all([assetReq,safeLoad('plans'),safeLoad('records'),safeLoad('contracts'),safeLoad('documents'),safeLoad('costs'),safeLoad('links'),safeLoad('points'),safeCoreLoad('inspection_records'),safeCoreLoad('repair_requests'),safeCoreLoad('maintenance_orders'),safeCoreLoad('cost_records'),safeCoreLoad('materials'),safeCoreLoad('plan_markers')]);
  if(a.error){document.getElementById('view').innerHTML=`<div class="panel"><div class="empty">設備主檔讀取失敗：${esc(a.error.message)}</div></div>`;document.getElementById('syncText').textContent='讀取失敗';return;}
  state={assets:a.data||[],plans,records,contracts,documents,costs,links,points,inspections,repairs,orders,costRecords,materials,markers};
  updateFilters();updateKpis();updateCounts();renderSetup();renderCurrent();
  document.getElementById('syncText').textContent=`最後更新 ${new Date().toLocaleTimeString('zh-TW',{hour12:false})}`;
}
function renderSetup(){const b=document.getElementById('setupBanner');if(!missingTables.length){b.className='setup-banner';return;}b.className='setup-banner show';b.innerHTML=`設備主檔可讀取，但生命週期資料表尚未建立：${esc([...new Set(missingTables)].join('、'))}。請由管理員先在 Supabase SQL Editor 執行 <code>system/sql/equipment_lifecycle.sql</code>，再重新整理本頁。`;}
function updateFilters(){
  const floors=[...new Set(state.assets.map(x=>canonicalFloor(x.floor||x.location)).filter(Boolean))].sort((a,b)=>floorRank(a)-floorRank(b));
  const cats=[...new Set(state.assets.map(x=>x.category).filter(Boolean))].sort();
  document.getElementById('floorFilter').innerHTML='<option value="">全部樓層</option>'+floors.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
  document.getElementById('categoryFilter').innerHTML='<option value="">全部類別</option>'+cats.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
}
function updateKpis(){
  const now=new Date(todayISO()+'T00:00:00'),d90=new Date(now.getTime()+90*86400000);
  const dueIds=new Set(state.plans.filter(x=>x.status==='active'&&x.next_due_on&&new Date(x.next_due_on)<now).map(x=>x.equipment_id));
  state.assets.filter(x=>x.next_maintenance_on&&new Date(x.next_maintenance_on)<now).forEach(x=>dueIds.add(x.equipment_id));
  document.getElementById('kTotal').textContent=state.assets.length;
  document.getElementById('kActive').textContent=state.assets.filter(x=>x.status==='active').length;
  document.getElementById('kDue').textContent=dueIds.size;
  document.getElementById('kWarranty').textContent=state.assets.filter(x=>x.warranty_until&&new Date(x.warranty_until)>=now&&new Date(x.warranty_until)<=d90).length;
  document.getElementById('kMonitor').textContent=new Set(state.links.filter(x=>x.status==='active').map(x=>x.equipment_id)).size;
}
function updateCounts(){
  ['assets','plans','records','contracts','documents','costs'].forEach(k=>document.getElementById('cnt-'+k).textContent=state[k].length);
  document.getElementById('cnt-integration').textContent=state.links.length+state.points.length;
}
function setTab(next){tab=next;page=1;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));const labels={assets:'＋ 新增設備',plans:'＋ 新增排程',records:'＋ 新增履歷',contracts:'＋ 新增合約',documents:'＋ 新增文件',costs:'＋ 新增成本',integration:'＋ 外部系統對照'};document.getElementById('addBtn').textContent=labels[tab];renderCurrent();}
function searchText(){return document.getElementById('search').value.trim().toLowerCase();}
function filteredAssets(){const q=searchText(),f=document.getElementById('floorFilter').value,c=document.getElementById('categoryFilter').value;return state.assets.filter(x=>(!f||canonicalFloor(x.floor||x.location)===f)&&(!c||x.category===c)&&(!q||[x.asset_code,x.qr_code,x.name,x.floor,x.location,x.category,x.department,x.brand,x.model,x.serial_no].some(v=>String(v||'').toLowerCase().includes(q))));}
function filteredRelated(key){const q=searchText(),f=document.getElementById('floorFilter').value,c=document.getElementById('categoryFilter').value;return state[key].filter(x=>{const e=eq(x.equipment_id);return (!f||canonicalFloor(e.floor||e.location)===f)&&(!c||e.category===c)&&(!q||eqText(x.equipment_id).toLowerCase().includes(q)||JSON.stringify(x).toLowerCase().includes(q));});}
function paginate(arr){const pages=Math.max(1,Math.ceil(arr.length/PER));page=Math.min(page,pages);return {rows:arr.slice((page-1)*PER,page*PER),pages,total:arr.length};}
function pagerHtml(p){return `<div class="pager"><span class="info">共 ${p.total} 筆，每頁 ${PER} 筆</span><button onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹ 上一頁</button><span>${page} / ${p.pages}</span><button onclick="goPage(${page+1})" ${page>=p.pages?'disabled':''}>下一頁 ›</button></div>`;}
function goPage(n){page=n;renderCurrent();document.getElementById('view').scrollIntoView({behavior:'smooth'});}

function renderCurrent(){if(tab==='assets')renderAssets();else if(tab==='integration')renderIntegration();else renderRelated(tab);}
function equipmentDisplayData(e){
  const plans=state.plans.filter(x=>x.equipment_id===e.equipment_id&&x.status==='active');
  const due=plans.map(x=>x.next_due_on).filter(Boolean).sort()[0]||e.next_maintenance_on;
  return {
    code:e.asset_code||e.qr_code||'',floor:canonicalFloor(e.floor||e.location),due,
    linked:state.links.some(x=>x.equipment_id===e.equipment_id&&x.status==='active'),
    marker:markerForEquipment(e.equipment_id)
  };
}
function renderAssets(){
  const p=paginate(filteredAssets());
  const rows=p.rows.map(e=>{const d=equipmentDisplayData(e);return `<tr>
    <td class="code">${esc(d.floor||'—')}</td><td class="code">${esc(d.code||'—')}</td><td><strong style="color:var(--text-hi)">${esc(e.name)}</strong><div class="muted">${esc(e.location||'')}</div></td><td class="qr-cell"><button class="act qr-btn ${d.marker?'':'unmapped'}" onclick="openEquipmentQr('${e.equipment_id}')" title="${d.marker?'掃描後定位 3D 點位':'尚未設定 3D 點位'}">▦ QR</button></td><td>${esc(e.category||'—')}</td><td>${esc(e.department||'—')}</td><td>${esc([e.brand,e.model].filter(Boolean).join(' / ')||'—')}</td><td><span class="pill ${dueClass(d.due)}">${d.due?fmtDate(d.due):'未設定'}</span></td><td>${fmtDate(e.warranty_until)}</td><td>${d.linked?'<span class="pill ok">已對照</span>':'<span class="pill">未介接</span>'}</td><td>${statusPill(e.status)}</td><td><button class="act" onclick="openRelations('${e.equipment_id}')">關聯</button> <button class="act" onclick="openEquipment('${e.equipment_id}')">編輯</button></td></tr>`;}).join('');
  document.getElementById('view').innerHTML=`<section class="panel"><div class="panel-head"><strong>設備唯一主檔</strong><span class="hint">QR 掃描後依 equipment_id 讀取最新 3D 座標；調整點位後不必重印</span><span class="spacer"></span><button class="act" onclick="loadAll()"><span class="ic ic-refresh"></span> 更新</button></div><div class="table-wrap"><table id="assetTable"><thead><tr><th>樓層</th><th>設備編號</th><th>設備名稱 / 位置</th><th>QR</th><th>類別</th><th>使用部門</th><th>廠牌 / 型號</th><th>下次保養</th><th>保固到期</th><th>監控</th><th>狀態</th><th>操作</th></tr></thead><tbody>${rows||'<tr><td colspan="12" class="empty">尚無設備資料，請新增設備或匯入 XLSX。</td></tr>'}</tbody></table></div>${pagerHtml(p)}</section>`;
}

function markerForEquipment(equipmentId){return state.markers.filter(m=>m.equipment_id===equipmentId&&m.status!=='inactive').sort((a,b)=>new Date(b.updated_at||b.created_at||0)-new Date(a.updated_at||a.created_at||0))[0]||null;}
function equipment3DUrl(equipmentId){const u=new URL('floor3d.html',location.href);u.searchParams.set('equipment',equipmentId);return u.href;}
function markerCoordinate(marker){if(!marker)return '尚未設定 3D 點位';const x=Number(marker.x),y=Number(marker.y);return `${canonicalFloor(marker.floor_id)||marker.floor_id}｜X ${Number.isFinite(x)?x.toFixed(4):'—'}｜Y ${Number.isFinite(y)?y.toFixed(4):'—'}`;}
function renderQrInto(el,text,size=190){el.innerHTML='';if(typeof QRCode!=='function'){el.textContent='QR 元件載入失敗，請重新整理頁面。';return null;}new QRCode(el,{text,width:size,height:size,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});return el.querySelector('canvas,img');}
function openEquipmentQr(id){const e=eq(id);if(!e.equipment_id)return;const marker=markerForEquipment(id),url=equipment3DUrl(id);document.getElementById('qrModalTitle').textContent=`設備 3D 定位 QR｜${e.asset_code||e.qr_code||e.name}`;document.getElementById('qrModalBody').innerHTML=`<div class="qr-preview-box"><div id="equipmentQrCanvas"></div></div><div class="qr-meta"><div class="k">設備</div><div class="v"><strong>${esc(e.name)}</strong></div><div class="k">設備編號</div><div class="v code">${esc(e.asset_code||e.qr_code||'—')}</div><div class="k">3D 點位</div><div class="v qr-coordinate">${esc(markerCoordinate(marker))}</div><div class="k">掃描結果</div><div class="v">${marker?'開啟 3D 雲台並聚焦此設備':'開啟 3D 雲台；待設定點位後會自動定位'}</div></div>`;document.getElementById('qrModalMsg').textContent=marker?'':'此設備尚未在平面標記系統綁定 3D 點位。';document.getElementById('qr3dLink').href=url;document.getElementById('qrPrintOneBtn').onclick=()=>printEquipmentQR(id);openModal('qrModal');requestAnimationFrame(()=>renderQrInto(document.getElementById('equipmentQrCanvas'),url,190));}
async function qrDataUrl(text,size=300){const holder=document.createElement('div');holder.style.cssText='position:fixed;left:-9999px;top:-9999px;background:#fff;padding:4px';document.body.appendChild(holder);renderQrInto(holder,text,size);await new Promise(r=>setTimeout(r,40));const canvas=holder.querySelector('canvas'),img=holder.querySelector('img');const src=canvas?canvas.toDataURL('image/png'):(img?.src||'');holder.remove();return src;}
async function printEquipmentCards(assets,title){
  if(!assets.length){toast('沒有可列印的設備 QR。',true);return;}
  if(typeof QRCode!=='function'){toast('QR 元件載入失敗，請重新整理頁面後再試。',true);return;}
  const w=window.open('','equipment-qr-print');
  if(!w){toast('瀏覽器已封鎖列印視窗，請允許彈出式視窗。',true);return;}
  w.document.write('<!doctype html><meta charset="utf-8"><title>準備設備 QR</title><p style="font-family:sans-serif;padding:24px">正在產生設備 QR，請稍候…</p>');
  const cards=[];
  for(const e of assets){
    const marker=markerForEquipment(e.equipment_id),src=await qrDataUrl(equipment3DUrl(e.equipment_id),260);
    cards.push(`<article><img src="${src}" alt="QR"><h2>${esc(e.asset_code||e.qr_code||'—')}</h2><h3>${esc(e.name||'')}</h3><p>${esc(canonicalFloor(e.floor||e.location)||'—')}｜${esc(e.location||'')}</p><p class="coord ${marker?'':'warn'}">${esc(markerCoordinate(marker))}</p></article>`);
  }
  const mapped=assets.filter(e=>markerForEquipment(e.equipment_id)).length;
  const printScript='<scr'+'ipt>addEventListener("load",()=>setTimeout(()=>print(),300));</scr'+'ipt>';
  w.document.open();
  w.document.write(`<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><title>${esc(title)}</title><style>@page{size:A4;margin:9mm}*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans TC",Arial,sans-serif;color:#111}.head{display:flex;justify-content:space-between;align-items:end;border-bottom:2px solid #111;padding-bottom:5mm;margin-bottom:5mm}.head h1{font-size:18pt;margin:0}.head p{font-size:9pt;margin:0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4mm}article{border:1px solid #444;border-radius:3mm;padding:4mm;text-align:center;break-inside:avoid;min-height:86mm}article img{width:42mm;height:42mm;image-rendering:crisp-edges}h2{font:700 13pt Consolas,monospace;margin:2mm 0 1mm}h3{font-size:11pt;margin:0 0 1mm;min-height:8mm}p{font-size:8.5pt;margin:1mm 0;overflow-wrap:anywhere}.coord{font-family:Consolas,monospace;color:#005b80}.coord.warn{color:#a54d00;font-family:inherit}</style></head><body><header class="head"><div><h1>${esc(title)}</h1><p>掃描後開啟設備對應的 3D 雲台座標</p></div><p>設備 ${assets.length}｜已設定座標 ${mapped}｜未設定 ${assets.length-mapped}</p></header><main class="grid">${cards.join('')}</main>${printScript}</body></html>`);
  w.document.close();
  toast(`已產生 ${assets.length} 張設備 QR（${mapped} 張已綁定 3D 點位）`);
}
function printEquipmentQR(id){const e=eq(id);if(e.equipment_id)printEquipmentCards([e],`設備定位 QR｜${e.asset_code||e.name}`);}
function printAllEquipmentQR(){printEquipmentCards(state.assets.slice().sort((a,b)=>(a.asset_code||'').localeCompare(b.asset_code||'','zh-TW')),`臺北農產公司 第一市場設備 3D 定位 QR`);}

function relationCard(label,count,desc,color='var(--cyan)'){return `<div class="import-card" style="border-left:2px solid ${color}"><b style="color:${color}">${count}</b><span>${label}</span><div class="hint" style="margin-top:5px">${esc(desc||'')}</div></div>`;}
function openRelations(id){

  openModal('relationsModal');

function renderRelated(key){

  const q=searchText();const links=state.links.filter(x=>!q||eqText(x.equipment_id).toLowerCase().includes(q)||JSON.stringify(x).toLowerCase().includes(q));

function exportEqCode(id){const e=eq(id);return e.asset_code||e.qr_code||'';}
function exportEqName(id){return eq(id).name||'';}
function exportStatus(v){return STATUS[v]||v||'';}
function exportNumber(v){if(v==null||v==='')return null;const n=Number(v);return Number.isFinite(n)?n:null;}
function exportDate(v){if(!v)return null;const s=fmtDate(v);if(!/^\d{4}-\d{2}-\d{2}$/.test(s))return null;const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d,12,0,0);}
function exportDateTime(v){if(!v)return null;const d=new Date(v);return Number.isNaN(d.getTime())?null:d;}
function exportBool(v){return v===true?'是':v===false?'否':'未設定';}
function exportLastValue(v){if(v==null)return '';return typeof v==='object'?JSON.stringify(v):String(v);}

    '告警下限':exportNumber(p?.alarm_low),'告警上限':exportNumber(p?.alarm_high),'點位最新值':exportLastValue(p?.last_value),'點位最後收到':exportDateTime(p?.last_seen_at),

    '年度成本':state.costs.map(x=>({'年度':exportNumber(x.fiscal_year),'設備編號':exportEqCode(x.equipment_id),'設備名稱':exportEqName(x.equipment_id),'維修費':exportNumber(x.repair_cost),'保養費':exportNumber(x.maintenance_cost),'零件費':exportNumber(x.parts_cost),'停機損失':exportNumber(x.downtime_loss),'合計':num(x.repair_cost)+num(x.maintenance_cost)+num(x.parts_cost)+num(x.downtime_loss),'來源':x.source||'','備註':x.note||''})),
    '中央監控介接':buildMonitorExportRows()
  };
}

function styleStatusCell(cell){
  const v=String(cell.value||'');
  if(!v)return;
  const good=/啟用|正常|完成|已對照|已設定|目前|是/.test(v),bad=/停用|退役|異常|逾期|未介接|終止|過期|否/.test(v);
  cell.font={name:'Microsoft JhengHei',size:10,bold:true,color:{argb:good?'FF047857':bad?'FFB91C1C':'FF92400E'}};
  cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:good?'FFD1FAE5':bad?'FFFEE2E2':'FFFEF3C7'}};
  cell.alignment={horizontal:'center',vertical:'middle'};
}

function styleExportSheet(wb,name,rows){
  const headers=EXPORT_HEADERS[name],opt=EXPORT_OPTIONS[name]||{},ws=wb.addWorksheet(name,{views:[{state:'frozen',xSplit:name==='設備總表'?3:2,ySplit:1,showGridLines:false}]});
  const head=ws.addRow(headers);head.height=32;
  head.eachCell(c=>{c.font={name:'Microsoft JhengHei',size:10,bold:true,color:{argb:'FFFFFFFF'}};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF0F4C6E'}};c.alignment={horizontal:'center',vertical:'middle',wrapText:true};c.border={bottom:{style:'medium',color:{argb:'FF00A6C8'}}};});
  rows.forEach((row,i)=>{const values=headers.map(h=>row[h]??null),r=ws.addRow(values);r.height=23;r.eachCell({includeEmpty:true},c=>{c.font={name:'Microsoft JhengHei',size:10,color:{argb:'FF263746'}};c.alignment={vertical:'middle'};c.border={bottom:{style:'hair',color:{argb:'FFD7E3EA'}}};if(i%2===1)c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF3F8FB'}};});
    (opt.dates||[]).forEach(h=>{const n=headers.indexOf(h);if(n>=0){const c=r.getCell(n+1);if(c.value)c.numFmt='yyyy-mm-dd';c.alignment={horizontal:'center',vertical:'middle'};}});
    (opt.datetimes||[]).forEach(h=>{const n=headers.indexOf(h);if(n>=0){const c=r.getCell(n+1);if(c.value)c.numFmt='yyyy-mm-dd hh:mm';c.alignment={horizontal:'center',vertical:'middle'};}});
    (opt.numbers||[]).forEach(h=>{const n=headers.indexOf(h);if(n>=0){const c=r.getCell(n+1);if(c.value!=null)c.numFmt=/費|成本|損失|金額/.test(h)?'#,##0':'#,##0.###';c.alignment={horizontal:'right',vertical:'middle'};}});
    (opt.urls||[]).forEach(h=>{const n=headers.indexOf(h);if(n>=0){const c=r.getCell(n+1),url=typeof c.value==='string'?c.value:'';if(/^https?:\/\//i.test(url)){c.value={text:h==='QR定位網址'?'開啟 3D 定位':'開啟連結',hyperlink:url,tooltip:url};c.font={name:'Microsoft JhengHei',size:10,color:{argb:'FF0369A1'},underline:true};c.alignment={horizontal:'center',vertical:'middle'};}}});
    (opt.statuses||[]).forEach(h=>{const n=headers.indexOf(h);if(n>=0)styleStatusCell(r.getCell(n+1));});
  });
  headers.forEach((h,i)=>{let width=Math.max(10,Math.min(22,h.length*2+3));rows.slice(0,200).forEach(row=>{const v=row[h];if(v instanceof Date)return;const len=String(v??'').length;width=Math.max(width,Math.min(34,len+3));});if((opt.urls||[]).includes(h))width=16;if(/備註|內容|原因|處理方式|服務內容|位置說明/.test(h))width=28;if(/日期|保固|保養$|最後同步|最後收到/.test(h))width=Math.max(width,13);ws.getColumn(i+1).width=width;});
  const lastRow=Math.max(1,rows.length+1);ws.autoFilter={from:{row:1,column:1},to:{row:lastRow,column:headers.length}};ws.properties.defaultRowHeight=23;
  ws.pageSetup={paperSize:9,orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.25,right:0.25,top:0.5,bottom:0.5,header:0.2,footer:0.2},printTitlesRow:'1:1'};
  ws.headerFooter={oddHeader:`&C&"Microsoft JhengHei,Bold"臺北農產公司 第一果菜市場｜${name}`,oddFooter:'&L設備生命週期管理&R第 &P 頁／共 &N 頁'};
  ws.properties.tabColor={argb:name==='設備總表'?'FF00A6C8':'FF4F86A6'};
  return ws;
}

function buildExportSummary(wb,rowsBySheet){
  const ws=wb.addWorksheet('匯出說明',{views:[{showGridLines:false}]});
  ws.mergeCells('A1:F1');ws.getCell('A1').value='臺北農產公司 第一果菜市場';ws.getCell('A1').font={name:'Microsoft JhengHei',size:18,bold:true,color:{argb:'FFFFFFFF'}};ws.getCell('A1').fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF083B55'}};ws.getCell('A1').alignment={horizontal:'center',vertical:'middle'};ws.getRow(1).height=36;
  ws.mergeCells('A2:F2');ws.getCell('A2').value='設備生命週期管理｜完整資料匯出';ws.getCell('A2').font={name:'Microsoft JhengHei',size:13,bold:true,color:{argb:'FF075985'}};ws.getCell('A2').alignment={horizontal:'center',vertical:'middle'};ws.getRow(2).height=28;
  const now=new Date(),metadata=[['匯出日期',`${todayISO()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`],['匯出範圍','完整資料（不受頁面搜尋、樓層或類別篩選影響）'],['設備總數',state.assets.length],['運轉中',state.assets.filter(x=>x.status==='active').length]];
  metadata.forEach((v,i)=>{const r=ws.getRow(i+4);r.values=[v[0],v[1]];r.getCell(1).font={name:'Microsoft JhengHei',bold:true,color:{argb:'FF075985'}};r.getCell(2).font={name:'Microsoft JhengHei',color:{argb:'FF263746'}};});
  const start=10;ws.getRow(start).values=['工作表','資料筆數'];ws.getRow(start).eachCell(c=>{c.font={name:'Microsoft JhengHei',bold:true,color:{argb:'FFFFFFFF'}};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF0F4C6E'}};c.alignment={horizontal:'center'};});
  Object.entries(rowsBySheet).forEach(([name,rows],i)=>{const r=ws.getRow(start+i+1);r.values=[name,rows.length];r.getCell(2).numFmt='#,##0';if(i%2===1)r.eachCell(c=>c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF3F8FB'}});});
  const noteRow=start+Object.keys(rowsBySheet).length+3;ws.mergeCells(`A${noteRow}:F${noteRow+1}`);ws.getCell(`A${noteRow}`).value='說明：網站畫面可維持精簡；本活頁簿會匯出設備主檔所有可用欄位，以及保養、維修、合約、文件、成本與中央監控關聯資料。樓層與下次保養採用與網站相同的顯示邏輯。';ws.getCell(`A${noteRow}`).alignment={wrapText:true,vertical:'middle'};ws.getCell(`A${noteRow}`).font={name:'Microsoft JhengHei',size:10,color:{argb:'FF475569'}};ws.getCell(`A${noteRow}`).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFEFF6FA'}};
  [20,42,16,16,16,16].forEach((w,i)=>ws.getColumn(i+1).width=w);ws.properties.tabColor={argb:'FF083B55'};ws.pageSetup={paperSize:9,orientation:'portrait',fitToPage:true,fitToWidth:1,fitToHeight:1};return ws;
}

let exportingWorkbook=false;
async function exportWorkbook(){
  if(exportingWorkbook)return;if(typeof ExcelJS==='undefined'){toast('XLSX 排版元件載入失敗，請重新整理後再試。',true);return;}if(!state.assets.length){toast('目前沒有設備資料可匯出。',true);return;}
  exportingWorkbook=true;toast('正在整理完整設備資料…');
  try{const rowsBySheet=buildExportRows(),wb=new ExcelJS.Workbook();wb.creator='臺北農產公司設備建置系統';wb.company='臺北農產公司';wb.subject='第一果菜市場設備生命週期管理';wb.created=new Date();buildExportSummary(wb,rowsBySheet);Object.keys(rowsBySheet).forEach(name=>styleExportSheet(wb,name,rowsBySheet[name]));
    const buffer=await wb.xlsx.writeBuffer(),blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),url=URL.createObjectURL(blob),a=document.createElement('a'),now=new Date();a.href=url;a.download=`設備生命週期_${todayISO()}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.xlsx`;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),3000);toast(`已匯出 ${state.assets.length} 台設備完整資料`);
  }catch(e){console.error(e);toast('匯出失敗：'+e.message,true);}finally{exportingWorkbook=false;}
}
function downloadTemplate(){const wb=XLSX.utils.book_new();Object.entries(XLSX_HEADERS).forEach(([n,h])=>XLSX.utils.book_append_sheet(wb,buildSheet([],h),n));XLSX.writeFile(wb,'設備履歷管理範本.xlsx');}

loadAll();
