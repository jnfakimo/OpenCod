<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>設備巡檢系統已關閉</title>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('siteTheme')||'tech');</script>
<script src="theme.js?v=20260717-2"></script>
<style>
:root{--bg:#020b18;--panel:#061829;--border:#16466b;--cyan:#00d4ff;--text:#c9e7f5;--muted:#6f9db8}
:root[data-theme="light"]{--bg:#f4f7fb;--panel:#fff;--border:#b9d1e2;--cyan:#087fb8;--text:#183047;--muted:#5b7182}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--bg);color:var(--text);font-family:"Noto Sans TC",system-ui,sans-serif}
.archive{width:min(100%,620px);padding:clamp(28px,6vw,58px);border:1px solid var(--border);border-top:3px solid var(--cyan);background:var(--panel);box-shadow:0 20px 60px #0004}
.mark{width:58px;height:58px;display:grid;place-items:center;margin-bottom:24px;border:2px solid var(--cyan);color:var(--cyan);font-size:28px;clip-path:polygon(16% 0,84% 0,100% 16%,100% 84%,84% 100%,16% 100%,0 84%,0 16%)}
h1{margin:0 0 12px;font-size:clamp(1.7rem,5vw,2.5rem);letter-spacing:.04em}
.lead{margin:0 0 10px;font-size:1.12rem;line-height:1.8;color:var(--text)}
.note{margin:0 0 30px;color:var(--muted);line-height:1.8}
.actions{display:flex;flex-wrap:wrap;gap:12px}
.actions a{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border:1px solid var(--cyan);color:var(--cyan);text-decoration:none;font-weight:700}
.actions a:hover,.actions a:focus-visible{background:var(--cyan);color:var(--bg);outline:none}
@media(max-width:520px){body{padding:16px}.archive{padding:28px 22px}.actions a{width:100%}}
</style>
</head>
<body>
<main class="archive" role="status" aria-live="polite">
  <div class="mark" aria-hidden="true">暫</div>
  <h1>設備巡檢系統已關閉</h1>
  <p class="lead">目前「巡檢」功能暫停使用。</p>
  <p class="note">此頁僅代表設備巡檢系統已關閉；「駐衛警巡檢系統」仍正常提供使用，既有資料不受影響。</p>
  <nav class="actions" aria-label="返回選單">
    <a href="guardpatrol.html">駐衛警巡檢系統</a>
    <a href="index.html">回到系統入口</a>
    <a href="admin.html">前往後台管理</a>
  </nav>
</main>
</body>
</html>
