*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans TC',sans-serif;overflow:hidden}

.view-btn:last-child{border-right:0}.view-btn:hover{color:var(--patrol);background:rgba(199,125,255,.08)}

#c3d{position:fixed;inset:50px 0 0 0}

#flatView{position:fixed;inset:50px 0 0;background:var(--bg);z-index:140;display:none}

body.mode-flat #c3d,body.mode-flat #panel,body.mode-flat #panelToggle,body.mode-flat #floorsToggle,body.mode-flat #floors,body.mode-flat #planThumb,body.mode-flat #bottomRightRow{display:none!important}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const SUPA_URL='https://qztffronusdhgxhjjubt.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dGZmcm9udXNkaGd4aGpqdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI1MzgsImV4cCI6MjA5NzI2ODUzOH0.FnUxot5YXI3yKCUCmJA5P4ysEJhmtaQQA6rM7MRy3oA';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
let currentPatrolView='3d', canManageModels=false;
async function initModelAccess(){
  const {data:{session}}=await db.auth.getSession();
  if(!session){location.href='login.html?redirect='+encodeURIComponent('guardpatrol3d.html');return;}
  try{
    const {data:profile}=await db.from('users').select('role,rbac_role,permissions,status').eq('auth_id',session.user.id).maybeSingle();
    const permissions=Array.isArray(profile?.permissions)?profile.permissions:[];
    canManageModels=profile?.status!=='inactive'&&(profile?.role==='admin'||profile?.rbac_role==='sysadmin'||permissions.includes('admin'));
  }catch(e){canManageModels=false;}
  updateModelUpdateBtn();
}
initModelAccess();
function prog(p,m){document.getElementById('ldfill').style.width=p+'%';document.getElementById('ldmsg').textContent=m;}

// ── World dimensions (from shared DXF frame, mm → metres) ──
const FRAME_W = 326466/1000;   // 326.5 m
const FRAME_H = 320094/1000;   // 320.1 m
const FLOOR_GAP = 4.0;         // real floor height (m): fixed 4000 mm
let EXPLODE = 6;               // visual vertical exaggeration
const XPAN_MIN = -220, XPAN_MAX = 220, ZPAN_MIN = -220, ZPAN_MAX = 220;
const YPAN_MIN = -160, YPAN_MAX = 160;
let yOffset = 0;                // model target Y-axis offset (m)

// floor definitions (bottom → up)
const FLOORS = [
  { id:'B1', label:'B1 地下一層', tex:'plans/tex/b1_tex.png', level:0, mesh:null, frame:null, visible:true },
  { id:'1F', label:'1F 一樓',     tex:'plans/tex/f1_tex.png', level:1, mesh:null, frame:null, visible:true },
  { id:'2F', label:'2F 二樓',     tex:'plans/tex/f2_tex.png', level:2, mesh:null, frame:null, visible:true },
  { id:'3F', label:'3F 三樓',     tex:'plans/tex/f3_tex.png', level:3, mesh:null, frame:null, visible:true },
];

let scene,camera,renderer;
prog(10,'建立場景…');
function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(ModelTheme.isLight()?0xffffff:0x020b18);
  scene.fog=new THREE.FogExp2(ModelTheme.isLight()?0xffffff:0x020b18,0.0009);
  const W=innerWidth,H=innerHeight-50;
  camera=new THREE.PerspectiveCamera(42,W/H,0.5,6000);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(W,H);
  document.getElementById('c3d').appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0xffffff,1.0));
  addEventListener('resize',()=>{camera.aspect=innerWidth/(innerHeight-50);camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight-50);});
  renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
  ModelTheme.watch(()=>ModelTheme.apply3D(scene,FLOORS));
}

// ── neon edge frame for each floor (so empty plates still read) ──
function floorFrame(y){
  const g=new THREE.Group();
  const hw=FRAME_W/2,hh=FRAME_H/2;
  const pts=[[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh],[-hw,-hh]].map(p=>new THREE.Vector3(p[0],y,p[1]));
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  g.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x0a3a5a})));
  return g;
}

function buildFloors(){
  const loader=new THREE.TextureLoader();
  let done=0;
  FLOORS.forEach(fl=>{
    const fr=floorFrame(0); fr.userData.fl=fl; scene.add(fr); fl.frame=fr;
    loader.load(fl.tex, tex=>{
      tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
      tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
      const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide});
      const geo=new THREE.PlaneGeometry(FRAME_W,FRAME_H);
      const m=new THREE.Mesh(geo,mat);
      m.rotation.x=-Math.PI/2;          // lay flat
      m.userData.fl=fl; fl.mesh=m; scene.add(m);
      ModelTheme.registerFloor(THREE,fl,tex,renderer);
      ModelTheme.apply3D(scene,[fl]);
      done++; prog(40+done*28,'載入樓層貼圖…');
      if(done===FLOORS.length){ layoutFloors(); finishLoad(); }
    }, undefined, ()=>{ done++; if(done===FLOORS.length){layoutFloors();finishLoad();} });
  });
}

function layoutFloors(){
  FLOORS.forEach(fl=>{
    const y=fl.level*FLOOR_GAP*EXPLODE;
    if(fl.mesh){ fl.mesh.position.y=y; fl.mesh.visible=fl.visible; }
    if(fl.frame){ fl.frame.position.y=y; fl.frame.visible=fl.visible; }
  });
  layoutMarkers();
}

// ── 整合標記 → 3D 拋轉（巡邏點另套班別即時上色）──────────────
const MARK_H=6;                                  // 標記懸浮高度 (m)
const PATROL_BASE=0xc77dff;
const MARK_COL={equipment:0x00d4ff,space:0x00ff9d,patrol:PATROL_BASE,repair:0xff5470,note:0xffb300};
const kindVis={equipment:true,space:true,patrol:true,repair:true,note:true};
let markerObjs=[];                               // {group,fl,kind,label,markerId,name,head,stem}
let showLabels3D=false;                          // 顯示標記名稱
let showShiftTime3D=false;                       // 顯示巡邏點時間（班別時段＋打卡人員）
async function loadMarkers(){
  try{
    const {data,error}=await db.from('plan_markers').select('marker_id,floor_id,x,y,kind,label').eq('status','active');
    if(error) return;
    (data||[]).forEach(addMarker3D);
    document.getElementById('mkCount').textContent=markerObjs.length;
    layoutMarkers();
  }catch(e){}
}
let patrolStatusMap=new Map();
let currentShift=null;                           // {name, start:Date, end:Date}
let checkinInfoMap=new Map();                    // markerId -> {user_name, checkin_at:Date}
function fmtHM(d){ const p=n=>String(n).padStart(2,'0'); return p(d.getHours())+':'+p(d.getMinutes()); }
async function refreshPatrolStatus(){
  try{
    const r=await PatrolStatus.compute(db);
    patrolStatusMap=r.map;
    if(r.shift){
      currentShift={name:r.shift.name,start:r.range.start,end:r.range.end};
      const {data:checkins}=await db.from('checkin_logs').select('target_id,user_name,checkin_at')
        .eq('target_type','marker')
        .gte('checkin_at', r.range.start.toISOString())
        .lte('checkin_at', r.range.end.toISOString())
        .order('checkin_at',{ascending:true});               // 升冪，後面覆寫留下每點「最近一次」打卡
      checkinInfoMap=new Map();
      (checkins||[]).forEach(c=>checkinInfoMap.set(c.target_id,{user_name:c.user_name,checkin_at:new Date(c.checkin_at)}));
    }else{
      currentShift=null; checkinInfoMap=new Map();
    }
  }catch(e){ /* patrol_shifts 尚未建表時，靜默略過，標記維持原色 */ }
  markerObjs.forEach(mk=>{
    if(mk.kind!=='patrol') return;
    const state=patrolStatusMap.get(mk.markerId);
    const hex=state?parseInt(PatrolStatus.COLORS[state].slice(1),16):PATROL_BASE;
    mk.head.material.color.setHex(hex);
    mk.stem.material.color.setHex(hex);
    if(showLabels3D||showShiftTime3D) rebuildMarkerLabel(mk);
    syncMarkerVisibility(mk);
  });
}
// 依目前開關組出某巡邏點的標籤文字（可多行）
function labelLinesFor(mk){
  const lines=[];
  if(showLabels3D) lines.push(mk.name||'');
  if(showShiftTime3D){
    lines.push(currentShift?`${currentShift.name} ${fmtHM(currentShift.start)}–${fmtHM(currentShift.end)}`:'目前無生效班別');
    const ci=checkinInfoMap.get(mk.markerId);
    lines.push(ci?`${ci.user_name||'—'} ${fmtHM(ci.checkin_at)}`:'待打卡');
  }
  return lines;
}
// 文字標籤 sprite（canvas 材質，支援多行）
function makeLabelSprite(lines,colorHex){
  lines=(Array.isArray(lines)?lines:[lines]).filter(l=>l!=null&&l!=='');
  if(!lines.length) lines=[''];
  const fs=44,lh=fs+22;
  const c=document.createElement('canvas'),ctx=c.getContext('2d');
  ctx.font=`bold ${fs}px 'Noto Sans TC',sans-serif`;
  const tw=Math.max(...lines.map(l=>ctx.measureText(l).width));
  c.width=Math.ceil(tw+28); c.height=lh*lines.length;
  ctx.font=`bold ${fs}px 'Noto Sans TC',sans-serif`;
  ctx.fillStyle='rgba(2,11,24,0.85)'; ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle=colorHex; ctx.lineWidth=3; ctx.strokeRect(1.5,1.5,c.width-3,c.height-3);
  ctx.fillStyle='#d4eeff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  lines.forEach((l,i)=>ctx.fillText(l,c.width/2,lh*i+lh/2));
  const tex=new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
  const totalM=5.5*lines.length;                     // 每行約 5.5 m，維持原本單行時的字級比例
  spr.scale.set((c.width/c.height)*totalM, totalM, 1);
  return spr;
}
// 重建（或首次建立）某巡邏點的浮動標籤，套用目前開關與最新資料
function rebuildMarkerLabel(mk){
  const colorHex='#'+mk.head.material.color.getHex().toString(16).padStart(6,'0');
  if(mk.label){ mk.group.remove(mk.label); mk.label.material.map.dispose(); mk.label.material.dispose(); }
  const lab=makeLabelSprite(labelLinesFor(mk),colorHex);
  lab.position.y=MARK_H+5;
  lab.visible=showLabels3D||showShiftTime3D;
  mk.group.add(lab);
  mk.label=lab;
}
function addMarker3D(m){
  const fl=FLOORS.find(f=>f.id===m.floor_id); if(!fl)return;
  const col=MARK_COL[m.kind]||MARK_COL.note;
  // 2D viewport 座標 → 3D 平面座標（與樓層貼圖共用同一 DXF frame）
  const x=(m.x-0.5)*FRAME_W;
  const z=m.y*FRAME_W - FRAME_H/2;
  const g=new THREE.Group();
  const stem=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,MARK_H,0)]),
    new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.55}));
  const head=new THREE.Mesh(new THREE.SphereGeometry(1.05,12,8),new THREE.MeshBasicMaterial({color:col}));
  head.position.y=MARK_H;
  g.add(stem); g.add(head);
  g.position.set(x,0,z);
  scene.add(g);
  const mk={group:g,fl,kind:m.kind||'note',label:null,markerId:m.marker_id,name:m.label,head,stem};
  markerObjs.push(mk);
  rebuildMarkerLabel(mk);
}
function layoutMarkers(){
  markerObjs.forEach(mk=>{
    mk.group.position.y=mk.fl.level*FLOOR_GAP*EXPLODE;
    syncMarkerVisibility(mk);
  });
}
function syncMarkerVisibility(mk){mk.group.visible=mk.fl.visible&&kindVis[mk.kind]!==false;}
function toggleMarkKind(kind,on){
  kindVis[kind]=on;
  markerObjs.forEach(mk=>{if(mk.kind===kind)syncMarkerVisibility(mk);});
}
function toggleMarkLabels(on){
  showLabels3D=on;
  markerObjs.forEach(rebuildMarkerLabel);
}
// ── 巡邏點時間：當班時段＋最近打卡人員，直接顯示在 3D 巡邏點標籤上 ──
function toggleShiftInfo(on){
  showShiftTime3D=on;
  if(on) refreshPatrolStatus();      // 開啟時先抓最新班別/打卡資料，內部會一併重建標籤
  else markerObjs.forEach(rebuildMarkerLabel);
}
function toggleFloorsMenu(){
  const f=document.getElementById('floors'), b=document.getElementById('floorsToggle');
  const open=f.style.display!=='block';
  f.style.display=open?'block':'none';
  b.classList.toggle('open',open);
}
// 左鍵點 3D 空白處 → 收合選單（立體控制 / 樓層）
function closeMenus3D(){
  togglePanel(false);
  const f=document.getElementById('floors'), b=document.getElementById('floorsToggle');
  if(f)f.style.display='none'; if(b)b.classList.remove('open');
}

function updateHud(){}
function finishLoad(){
  prog(100,'完成');
  setTimeout(()=>{const l=document.getElementById('loading');l.style.transition='opacity .4s';l.style.opacity='0';setTimeout(()=>l.style.display='none',400);},150);
  resetView(); animate();
  loadMarkers();
  setInterval(checkModelUpdates,60000);
  const img=document.getElementById('planThumbImg');
  if(img) img.src=FLOORS[0].tex;
}

// ── Orbit controls ──
const orb={theta:-0.6,phi:1.05,r:620,tx:0,ty:20,tz:0,down:false,right:false,sx:0,sy:0,minPhi:.05,maxPhi:1.55,minR:40,maxR:2200};
function updateCam(){
  const x=orb.tx+orb.r*Math.sin(orb.phi)*Math.sin(orb.theta);
  const y=orb.ty+orb.r*Math.cos(orb.phi);
  const z=orb.tz+orb.r*Math.sin(orb.phi)*Math.cos(orb.theta);
  camera.position.set(x,y,z); camera.lookAt(orb.tx,orb.ty,orb.tz);
}
function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
function midY(){ return (FLOORS.length-1)*FLOOR_GAP*EXPLODE*0.5; }
function viewY(){ return midY()+yOffset; }
function syncYPanUI(){
  const r=document.getElementById('yPan'), v=document.getElementById('yPanVal');
  if(r) r.value=yOffset;
}
function syncXPanUI(){
  const r=document.getElementById('xPan');
  if(r) r.value=orb.tx;
}
function setXPan(v){
  orb.tx=clamp(parseFloat(v)||0,XPAN_MIN,XPAN_MAX);
  syncXPanUI();
}
function setYPan(v){
  yOffset=clamp(parseFloat(v)||0,YPAN_MIN,YPAN_MAX);
  orb.ty=viewY();
  syncYPanUI();
}
function panView(dx,dy){
  const ct=Math.cos(orb.theta), st=Math.sin(orb.theta), s=orb.r*0.0016;
  orb.tx=clamp(orb.tx-(ct*dx)*s,XPAN_MIN,XPAN_MAX);
  orb.tz=clamp(orb.tz-(st*dx)*s,ZPAN_MIN,ZPAN_MAX);
  yOffset=clamp(yOffset+dy*s,YPAN_MIN,YPAN_MAX);
  orb.ty=viewY();
  syncXPanUI();
  syncYPanUI();
}
function touchMid(t){return {x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}
function setupOrbit(){
  const el=renderer.domElement;
  let dnX=0,dnY=0;
  el.addEventListener('mousedown',e=>{ if(e.button===0){orb.down=true;dnX=e.clientX;dnY=e.clientY;}else if(e.button===2){orb.right=true;e.preventDefault();} orb.sx=e.clientX;orb.sy=e.clientY; });
  addEventListener('mouseup',()=>{orb.down=false;orb.right=false;});
  el.addEventListener('click',e=>{ if(Math.hypot(e.clientX-dnX,e.clientY-dnY)<5) closeMenus3D(); }); // 左鍵點空白處收合選單
  addEventListener('mousemove',e=>{
    const dx=e.clientX-orb.sx, dy=e.clientY-orb.sy;
    if(orb.down){ panView(dx,dy); }                        // 左鍵：水平 / 垂直平移
    else if(orb.right){ orb.theta-=dx*0.005; orb.phi=Math.max(orb.minPhi,Math.min(orb.maxPhi,orb.phi-dy*0.005)); } // 右鍵：旋轉環繞
    orb.sx=e.clientX;orb.sy=e.clientY;
  });
  el.addEventListener('wheel',e=>{ orb.r=Math.max(orb.minR,Math.min(orb.maxR,orb.r+e.deltaY*0.5)); e.preventDefault(); },{passive:false});
  // touch
  let pd=0, pm=null;
  el.addEventListener('touchstart',e=>{const t=e.touches; if(t.length===1){orb.down=true;orb.sx=t[0].clientX;orb.sy=t[0].clientY;} if(t.length===2){orb.down=false;pd=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);pm=touchMid(t);}},{passive:true});
  el.addEventListener('touchmove',e=>{const t=e.touches;
    if(t.length===1&&orb.down){orb.theta-=(t[0].clientX-orb.sx)*0.005;orb.phi=Math.max(orb.minPhi,Math.min(orb.maxPhi,orb.phi-(t[0].clientY-orb.sy)*0.005));orb.sx=t[0].clientX;orb.sy=t[0].clientY;}
    if(t.length===2){const d=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY),m=touchMid(t);orb.r=Math.max(orb.minR,Math.min(orb.maxR,orb.r-(d-pd)*1.2));if(pm)panView(m.x-pm.x,m.y-pm.y);pd=d;pm=m;}
    e.preventDefault();},{passive:false});
  el.addEventListener('touchend',()=>{orb.down=false;pm=null;});
}

function animate(){ requestAnimationFrame(animate); updateCam(); renderer.render(scene,camera); }

// ── UI ──
function toggleFloor(id){
  const fl=FLOORS.find(f=>f.id===id); fl.visible=!fl.visible;
  if(fl.mesh)fl.mesh.visible=fl.visible; if(fl.frame)fl.frame.visible=fl.visible;
  markerObjs.forEach(mk=>{ if(mk.fl===fl) syncMarkerVisibility(mk); });
  document.getElementById('t-'+id).classList.toggle('on',fl.visible);
  document.getElementById('t-'+id).classList.toggle('off',!fl.visible);
  if(fl.visible){ const img=document.getElementById('planThumbImg'); if(img) img.src=fl.tex; }
}
function togglePanel(open){
  const mobile=matchMedia('(max-width:1024px)').matches;
  let expanded;
  if(mobile){
    expanded=open===undefined?!document.body.classList.contains('controls-open'):!!open;
    document.body.classList.toggle('controls-open',expanded);
    document.body.classList.remove('controls-hidden');
  }else{
    const hidden=open===undefined?!document.body.classList.contains('controls-hidden'):!open;
    document.body.classList.toggle('controls-hidden',hidden);
    document.body.classList.remove('controls-open');
    expanded=!hidden;
  }
  const btn=document.getElementById('panelToggle');
  if(btn)btn.setAttribute('aria-expanded',String(expanded));
}
function setExplode(v){ EXPLODE=parseFloat(v); document.getElementById('explode').value=v; layoutFloors(); orb.ty=viewY(); syncYPanUI(); }
function resetView(){ yOffset=0;orb.theta=-0.6;orb.phi=1.02;orb.r=640;orb.tx=0;orb.ty=viewY();orb.tz=0;syncXPanUI();syncYPanUI(); }
function topView(){ orb.theta=0;orb.phi=0.06;orb.r=560;orb.tx=0;orb.ty=viewY();orb.tz=0;syncXPanUI();syncYPanUI(); }

// fetch any updated floor models from Storage (override static textures)
async function applyCustomModels(){
  try{
    const {data}=await db.from('floor_models').select('*');
    if(data&&data.length){
      data.forEach(m=>{
        const fl=FLOORS.find(f=>f.id===m.floor_id);
        if(fl&&m.image_path){
          const t=encodeURIComponent(m.updated_at||'');
          fl.tex=`${SUPA_URL}/storage/v1/object/public/floorplans/${m.image_path}?t=${t}`;
          fl.modelUpdatedAt=m.updated_at||null;    // baseline version we just loaded, for later update checks
        }
      });
    }
  }catch(e){ /* fall back to static textures */ }
}

// ── 3D 模型更新偵測：定期比對 floor_models，有新版本時亮起頂欄按鈕，點擊才套用 ──
let pendingModelUpdates=new Map();                 // floor_id -> floor_models row（尚未套用的新版本）
function flatModelUrl(){return `b1plan.html?embed=1&patrol=1&modelv=${Date.now()}`;}
function loadFlatModel(force=false){
  const frame=document.getElementById('flatFrame');
  if(force||!frame.getAttribute('src')) frame.src=flatModelUrl();
}
function switchPatrolView(view){
  currentPatrolView=view==='flat'?'flat':'3d';
  const flat=currentPatrolView==='flat';
  document.body.classList.toggle('mode-flat',flat);
  document.getElementById('view3dBtn').classList.toggle('active',!flat);
  document.getElementById('viewFlatBtn').classList.toggle('active',flat);
  document.getElementById('flatView').setAttribute('aria-hidden',String(!flat));
  if(flat) loadFlatModel(false);
  updateModelUpdateBtn();
}
async function manualRefreshCurrentModel(){
  if(!canManageModels) return;
  const btn=document.getElementById('modelUpdateBtn');
  btn.disabled=true;btn.textContent='更新中…';
  if(currentPatrolView==='flat'){
    loadFlatModel(true);
  }else{
    await checkModelUpdates();
    if(pendingModelUpdates.size) await applyModelUpdates();
    else{
      location.replace(`${location.pathname}?modelv=${Date.now()}`);
      return;
    }
  }
  btn.disabled=false;updateModelUpdateBtn();
}
async function checkModelUpdates(){
  try{
    const {data}=await db.from('floor_models').select('*');
    if(!data) return;
    data.forEach(m=>{
      const fl=FLOORS.find(f=>f.id===m.floor_id);
      if(!fl||!m.image_path) return;
      if(m.updated_at && m.updated_at!==fl.modelUpdatedAt) pendingModelUpdates.set(m.floor_id,m);
    });
    updateModelUpdateBtn();
  }catch(e){ /* floor_models 查詢失敗時靜默略過，維持目前顯示的模型 */ }
}
function updateModelUpdateBtn(){
  const btn=document.getElementById('modelUpdateBtn'); if(!btn) return;
  btn.style.display=canManageModels?'inline-flex':'none';
  if(!canManageModels) return;
  if(currentPatrolView==='flat'){
    btn.textContent='↻ 更新平面模型';
  }else if(pendingModelUpdates.size){
    btn.textContent=`🔄 模型有新版本（${pendingModelUpdates.size}）點此更新`;
  }else{
    btn.textContent='↻ 更新 3D 模型';
  }
}
// 使用者點擊頂欄按鈕後才真正換貼圖，避免巡檢中畫面無預警跳動
async function applyModelUpdates(){
  if(!pendingModelUpdates.size) return;
  const updates=[...pendingModelUpdates.values()];
  pendingModelUpdates=new Map();
  updateModelUpdateBtn();
  const loader=new THREE.TextureLoader();
  for(const m of updates){
    const fl=FLOORS.find(f=>f.id===m.floor_id); if(!fl) continue;
    const t=encodeURIComponent(m.updated_at||'');
    const url=`${SUPA_URL}/storage/v1/object/public/floorplans/${m.image_path}?t=${t}`;
    await new Promise(resolve=>{
      loader.load(url, tex=>{
        tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
        tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
        if(fl.mesh) ModelTheme.registerFloor(THREE,fl,tex,renderer);
        fl.tex=url; fl.modelUpdatedAt=m.updated_at||null;
        if(fl===FLOORS[0]){ const img=document.getElementById('planThumbImg'); if(img) img.src=url; }
        resolve();
      }, undefined, ()=>resolve());
    });
  }
}

(async()=>{ init(); setupOrbit(); await applyCustomModels(); buildFloors(); })();
