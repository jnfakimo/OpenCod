<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>臺北農產 第一果菜市場 — 3D 立體樓層模型</title>
<style>
:root{--bg:#020b18;--panel:#041428;--border:#0a3a5a;--cyan:#00d4ff;--cyan2:#00a8cc;--text:#b0d8f0;--text2:#5a8ab0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans TC',sans-serif;overflow:hidden}
#topbar{position:fixed;top:0;left:0;right:0;height:50px;background:rgba(2,11,24,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:200}
.tb-logo{font-size:13px;font-weight:700;color:var(--cyan);white-space:nowrap}
.tb-sep{width:1px;height:24px;background:var(--border)}
.tb-title{font-size:11px;color:var(--text2)}
.tb-space{flex:1}
.tb-back{color:var(--text2);text-decoration:none;display:inline-flex;align-items:center;padding:4px 10px;border:1px solid var(--border);border-radius:3px;font-size:11px;transition:all .2s}
.tb-back:hover{border-color:var(--cyan);color:var(--cyan)}
#c3d{position:fixed;inset:50px 0 0 0}
#c3d canvas{display:block;touch-action:none}

#floors{position:fixed;right:14px;top:62px;z-index:150;background:rgba(4,20,40,.95);border:1px solid var(--border);border-radius:6px;overflow:hidden}
#mkpanel{position:fixed;left:14px;bottom:14px;z-index:151;background:rgba(4,20,40,.95);border:1px solid var(--border);border-radius:6px;padding:10px 13px;font-size:11px;line-height:1.9;min-width:150px;box-shadow:0 0 22px rgba(0,212,255,.12);display:none}
#mkpanel .p-t{color:var(--cyan);font-weight:700;font-size:12px}
#mkpanel label{color:var(--text2);display:flex;align-items:center;gap:7px;cursor:pointer}
#mkpanel input{accent-color:var(--cyan)}
#mkToggle{position:fixed;left:14px;bottom:14px;z-index:150;display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(4,20,40,.95);border:1px solid var(--border);border-radius:5px;color:var(--cyan);font-size:12px;font-weight:700;box-shadow:0 0 18px rgba(0,212,255,.12);cursor:pointer}
#mkToggle:hover{border-color:var(--cyan)}
.fbtn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 16px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);cursor:pointer;font-size:12px;text-align:left;transition:all .15s;white-space:nowrap}
.fbtn:last-child{border-bottom:none}
.fbtn:hover{background:rgba(0,212,255,.08)}
.fbtn .dot{width:9px;height:9px;border-radius:2px;border:1px solid var(--cyan);flex-shrink:0}
.fbtn.on .dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.fbtn.off{color:var(--text2)}

#panel{position:fixed;left:14px;top:62px;z-index:150;background:rgba(4,20,40,.95);border:1px solid var(--border);border-radius:6px;padding:11px 13px;font-size:11px;line-height:1.9;min-width:165px;max-width:min(280px,calc(100vw - 28px));box-shadow:0 0 22px rgba(0,212,255,.12)}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:5px}
#panel .p-t{color:var(--cyan);font-weight:700;font-size:12px}
.panel-close{display:inline-flex;background:none;border:1px solid var(--border);color:var(--text2);border-radius:3px;padding:3px 8px;font-size:10px;cursor:pointer}
.panel-close:hover{border-color:var(--cyan);color:var(--cyan)}
#panel label{color:var(--text2);display:flex;align-items:center;gap:7px;cursor:pointer}
#panel input[type=range]{width:100%;accent-color:var(--cyan)}
.ctrl-val{color:var(--text);font-family:monospace}
#panelToggle{display:none;position:fixed;left:14px;top:62px;z-index:155;align-items:center;gap:6px;padding:8px 12px;background:rgba(4,20,40,.95);border:1px solid var(--border);border-radius:5px;color:var(--cyan);font-size:12px;font-weight:700;box-shadow:0 0 18px rgba(0,212,255,.12);cursor:pointer}
#panelToggle:hover{border-color:var(--cyan)}
body.controls-hidden #panel{display:none}
body.controls-hidden #panelToggle{display:inline-flex}
.btnrow{display:flex;gap:6px;margin-top:8px}
.mini{flex:1;padding:5px;background:rgba(0,212,255,.08);border:1px solid var(--border);color:var(--cyan2);border-radius:3px;cursor:pointer;font-size:10px;transition:all .15s}
.mini:hover{border-color:var(--cyan);color:var(--cyan)}

#hint{position:fixed;bottom:14px;right:14px;font-size:10px;color:var(--text2);z-index:150;text-align:right;line-height:1.8;pointer-events:none}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:12px}
.ld-t{font-size:13px;color:var(--cyan);letter-spacing:.1em}
.ld-bar{width:200px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--cyan);width:0%;transition:width .25s}
.ld-m{font-size:11px;color:var(--text2)}
@media(max-width:1024px){
  .tb-title{display:none}
  .tb-logo{max-width:46vw;overflow:hidden;text-overflow:ellipsis}
  .tb-back{padding:5px 9px}
  #panelToggle{display:inline-flex}
  #panel{display:none;top:104px;left:10px;right:auto}
  body.controls-open #panel{display:block}
  body.controls-open #panelToggle{display:none}
  body.controls-open #floors{display:none}
  #floors{top:104px;right:10px}
  #mkpanel{left:10px;bottom:10px;font-size:10px;padding:8px 10px}
  #mkToggle{left:10px;bottom:10px}
  .fbtn{padding:9px 13px}
  #hint{left:10px;right:10px;bottom:10px;text-align:center;background:rgba(2,11,24,.72);border:1px solid rgba(10,58,90,.45);border-radius:4px;padding:5px 8px}
}
@media(max-width:480px){
  #topbar{gap:8px;padding:0 10px}
  .tb-logo{max-width:38vw}

  #panel{top:96px}
  #panelToggle{left:10px;top:62px}
  #floors{top:96px}
  .fbtn{font-size:11px;padding:8px 11px}
}

  <div class="panel-head">

  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL='https://qztffronusdhgxhjjubt.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dGZmcm9udXNkaGd4aGpqdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI1MzgsImV4cCI6MjA5NzI2ODUzOH0.FnUxot5YXI3yKCUCmJA5P4ysEJhmtaQQA6rM7MRy3oA';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
function prog(p,m){document.getElementById('ldfill').style.width=p+'%';document.getElementById('ldmsg').textContent=m;}

// ── World dimensions (from shared DXF frame, mm → metres) ──
const FRAME_W = 326466/1000;   // 326.5 m
const FRAME_H = 320094/1000;   // 320.1 m
const FLOOR_GAP = 4.0;         // real floor height (m): fixed 4000 mm
let EXPLODE = 6;               // visual vertical exaggeration
const XPAN_MIN = -220, XPAN_MAX = 220, ZPAN_MIN = -220, ZPAN_MAX = 220;
const YPAN_MIN = -160, YPAN_MAX = 160;
let yOffset = 0;                // model target Y-axis offset (m)

// floor definitions (bottom → up)
const FLOORS = [
  { id:'B1', label:'B1 地下一層', tex:'plans/tex/b1_tex.png', level:0, mesh:null, frame:null, visible:true },
  { id:'1F', label:'1F 一樓',     tex:'plans/tex/f1_tex.png', level:1, mesh:null, frame:null, visible:true },
  { id:'2F', label:'2F 二樓',     tex:'plans/tex/f2_tex.png', level:2, mesh:null, frame:null, visible:true },
  { id:'3F', label:'3F 三樓',     tex:'plans/tex/f3_tex.png', level:3, mesh:null, frame:null, visible:true },
];

let scene,camera,renderer;
prog(10,'建立場景…');
function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x020b18);
  scene.fog=new THREE.FogExp2(0x020b18,0.0009);
  const W=innerWidth,H=innerHeight-50;
  camera=new THREE.PerspectiveCamera(42,W/H,0.5,6000);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(W,H);
  document.getElementById('c3d').appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0xffffff,1.0));
  addEventListener('resize',()=>{camera.aspect=innerWidth/(innerHeight-50);camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight-50);});
  renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
}

// ── neon edge frame for each floor (so empty plates still read) ──
function floorFrame(y){
  const g=new THREE.Group();
  const hw=FRAME_W/2,hh=FRAME_H/2;
  const pts=[[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh],[-hw,-hh]].map(p=>new THREE.Vector3(p[0],y,p[1]));
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  g.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x0a3a5a})));
  return g;
}

function buildFloors(){
  const loader=new THREE.TextureLoader();
  let done=0;
  FLOORS.forEach(fl=>{
    const fr=floorFrame(0); fr.userData.fl=fl; scene.add(fr); fl.frame=fr;
    loader.load(fl.tex, tex=>{
      tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
      tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
      const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide});
      const geo=new THREE.PlaneGeometry(FRAME_W,FRAME_H);
      const m=new THREE.Mesh(geo,mat);
      m.rotation.x=-Math.PI/2;          // lay flat
      m.userData.fl=fl; fl.mesh=m; scene.add(m);
      done++; prog(40+done*28,'載入樓層貼圖…');
      if(done===FLOORS.length){ layoutFloors(); finishLoad(); }
    }, undefined, ()=>{ done++; if(done===FLOORS.length){layoutFloors();finishLoad();} });
  });
}

function layoutFloors(){
  FLOORS.forEach(fl=>{
    const y=fl.level*FLOOR_GAP*EXPLODE;
    if(fl.mesh){ fl.mesh.position.y=y; fl.mesh.visible=fl.visible; }
    if(fl.frame){ fl.frame.position.y=y; fl.frame.visible=fl.visible; }
  });
  layoutMarkers();
}

// ── 整合標記系統 → 3D 拋轉 ──────────────────────────────────
const MARK_H=6;                                  // 標記懸浮高度 (m)
const MARK_COL={equipment:0x00d4ff,space:0x00ff9d,repair:0xff5470,note:0xffb300};
const kindVis={equipment:true,space:true,repair:true,note:true};
let markerObjs=[];                               // {group,fl,kind,label}
let showLabels3D=false;
async function loadMarkers(){
  try{
    const {data,error}=await db.from('plan_markers').select('marker_id,floor_id,x,y,kind,label').eq('status','active');
    if(error) return;
    (data||[]).forEach(addMarker3D);
    document.getElementById('mkCount').textContent=markerObjs.length;
    layoutMarkers();
  }catch(e){}
}
// 文字標籤 sprite（canvas 材質）
function makeLabelSprite(text,colorHex){
  const c=document.createElement('canvas'),ctx=c.getContext('2d'),fs=44;
  ctx.font=`bold ${fs}px 'Noto Sans TC',sans-serif`;
  const tw=ctx.measureText(text||'').width;
  c.width=Math.ceil(tw+28); c.height=fs+22;
  ctx.font=`bold ${fs}px 'Noto Sans TC',sans-serif`;
  ctx.fillStyle='rgba(2,11,24,0.85)'; ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle=colorHex; ctx.lineWidth=3; ctx.strokeRect(1.5,1.5,c.width-3,c.height-3);
  ctx.fillStyle='#d4eeff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text||'',c.width/2,c.height/2);
  const tex=new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
  spr.scale.set((c.width/c.height)*5.5, 5.5, 1);     // 高度約 5.5 m
  return spr;
}
function addMarker3D(m){
  const fl=FLOORS.find(f=>f.id===m.floor_id); if(!fl)return;
  const col=(m.kind in MARK_COL)?MARK_COL[m.kind]:0xffb300;
  // 2D viewport 座標 → 3D 平面座標（與樓層貼圖共用同一 DXF frame）
  const x=(m.x-0.5)*FRAME_W;
  const z=m.y*FRAME_W - FRAME_H/2;
  const g=new THREE.Group();
  const stem=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,MARK_H,0)]),
    new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.55}));
  const head=new THREE.Mesh(new THREE.SphereGeometry(1.05,12,8),new THREE.MeshBasicMaterial({color:col}));
  head.position.y=MARK_H;
  const lab=makeLabelSprite(m.label,'#'+col.toString(16).padStart(6,'0'));
  lab.position.y=MARK_H+5; lab.visible=showLabels3D;
  g.add(stem); g.add(head); g.add(lab);
  g.position.set(x,0,z);
  scene.add(g);
  markerObjs.push({group:g,fl,kind:m.kind,label:lab});
}
function layoutMarkers(){
  markerObjs.forEach(mk=>{
    mk.group.position.y=mk.fl.level*FLOOR_GAP*EXPLODE;
    mk.group.visible=mk.fl.visible && kindVis[mk.kind];
  });
}
function toggleMarkKind(k,on){
  kindVis[k]=on;
  markerObjs.forEach(mk=>{ if(mk.kind===k) mk.group.visible=mk.fl.visible && on; });
}
function toggleMarkLabels(on){
  showLabels3D=on;
  markerObjs.forEach(mk=>{ if(mk.label) mk.label.visible=on; });
}
function toggleMkPanel(open){
  document.getElementById('mkpanel').style.display=open?'block':'none';
  document.getElementById('mkToggle').style.display=open?'none':'inline-flex';
}

function finishLoad(){
  prog(100,'完成');
  setTimeout(()=>{const l=document.getElementById('loading');l.style.transition='opacity .4s';l.style.opacity='0';setTimeout(()=>l.style.display='none',400);},150);
  resetView(); animate();
  loadMarkers();
}

// ── Orbit controls ──
const orb={theta:-0.6,phi:1.05,r:620,tx:0,ty:20,tz:0,down:false,right:false,sx:0,sy:0,minPhi:.05,maxPhi:1.55,minR:40,maxR:2200};
function updateCam(){
  const x=orb.tx+orb.r*Math.sin(orb.phi)*Math.sin(orb.theta);
  const y=orb.ty+orb.r*Math.cos(orb.phi);
  const z=orb.tz+orb.r*Math.sin(orb.phi)*Math.cos(orb.theta);
  camera.position.set(x,y,z); camera.lookAt(orb.tx,orb.ty,orb.tz);
}
function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
function midY(){ return (FLOORS.length-1)*FLOOR_GAP*EXPLODE*0.5; }
function viewY(){ return midY()+yOffset; }
function syncYPanUI(){
  const r=document.getElementById('yPan'), v=document.getElementById('yPanVal');
  if(r) r.value=yOffset;
  if(v) v.textContent=`${Math.round(yOffset)} m`;
}
function syncXPanUI(){
  const r=document.getElementById('xPan'), v=document.getElementById('xPanVal');
  if(r) r.value=orb.tx;
  if(v) v.textContent=`${Math.round(orb.tx)} m`;
}
function setXPan(v){
  orb.tx=clamp(parseFloat(v)||0,XPAN_MIN,XPAN_MAX);
  syncXPanUI();
}
function setYPan(v){
  yOffset=clamp(parseFloat(v)||0,YPAN_MIN,YPAN_MAX);
  orb.ty=viewY();
  syncYPanUI();
}
function panView(dx,dy){
  const ct=Math.cos(orb.theta), st=Math.sin(orb.theta), s=orb.r*0.0016;
  orb.tx=clamp(orb.tx-(ct*dx)*s,XPAN_MIN,XPAN_MAX);
  orb.tz=clamp(orb.tz-(st*dx)*s,ZPAN_MIN,ZPAN_MAX);
  yOffset=clamp(yOffset+dy*s,YPAN_MIN,YPAN_MAX);
  orb.ty=viewY();
  syncXPanUI();
  syncYPanUI();
}
function touchMid(t){return {x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}
function setupOrbit(){
  const el=renderer.domElement;
  el.addEventListener('mousedown',e=>{ if(e.button===0){orb.down=true;}else if(e.button===2){orb.right=true;e.preventDefault();} orb.sx=e.clientX;orb.sy=e.clientY; });
  addEventListener('mouseup',()=>{orb.down=false;orb.right=false;});
  addEventListener('mousemove',e=>{
    const dx=e.clientX-orb.sx, dy=e.clientY-orb.sy;
    if(orb.down){ panView(dx,dy); }                        // 左鍵：水平 / 垂直平移
    else if(orb.right){ orb.theta-=dx*0.005; orb.phi=Math.max(orb.minPhi,Math.min(orb.maxPhi,orb.phi-dy*0.005)); } // 右鍵：旋轉環繞
    orb.sx=e.clientX;orb.sy=e.clientY;
  });
  el.addEventListener('wheel',e=>{ orb.r=Math.max(orb.minR,Math.min(orb.maxR,orb.r+e.deltaY*0.5)); e.preventDefault(); },{passive:false});
  // touch
  let pd=0, pm=null;
  el.addEventListener('touchstart',e=>{const t=e.touches; if(t.length===1){orb.down=true;orb.sx=t[0].clientX;orb.sy=t[0].clientY;} if(t.length===2){orb.down=false;pd=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);pm=touchMid(t);}},{passive:true});
  el.addEventListener('touchmove',e=>{const t=e.touches;
    if(t.length===1&&orb.down){orb.theta-=(t[0].clientX-orb.sx)*0.005;orb.phi=Math.max(orb.minPhi,Math.min(orb.maxPhi,orb.phi-(t[0].clientY-orb.sy)*0.005));orb.sx=t[0].clientX;orb.sy=t[0].clientY;}
    if(t.length===2){const d=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY),m=touchMid(t);orb.r=Math.max(orb.minR,Math.min(orb.maxR,orb.r-(d-pd)*1.2));if(pm)panView(m.x-pm.x,m.y-pm.y);pd=d;pm=m;}
    e.preventDefault();},{passive:false});
  el.addEventListener('touchend',()=>{orb.down=false;pm=null;});
}

function animate(){ requestAnimationFrame(animate); updateCam(); renderer.render(scene,camera); }

// ── UI ──
function toggleFloor(id){
  const fl=FLOORS.find(f=>f.id===id); fl.visible=!fl.visible;
  if(fl.mesh)fl.mesh.visible=fl.visible; if(fl.frame)fl.frame.visible=fl.visible;
  markerObjs.forEach(mk=>{ if(mk.fl===fl) mk.group.visible=fl.visible && kindVis[mk.kind]; });
  document.getElementById('t-'+id).classList.toggle('on',fl.visible);
  document.getElementById('t-'+id).classList.toggle('off',!fl.visible);
}
function togglePanel(open){
  const mobile=matchMedia('(max-width:1024px)').matches;
  let expanded;
  if(mobile){
    expanded=open===undefined?!document.body.classList.contains('controls-open'):!!open;
    document.body.classList.toggle('controls-open',expanded);
    document.body.classList.remove('controls-hidden');
  }else{
    const hidden=open===undefined?!document.body.classList.contains('controls-hidden'):!open;
    document.body.classList.toggle('controls-hidden',hidden);
    document.body.classList.remove('controls-open');
    expanded=!hidden;
  }
  const btn=document.getElementById('panelToggle');
  if(btn)btn.setAttribute('aria-expanded',String(expanded));
}
function setExplode(v){ EXPLODE=parseFloat(v); document.getElementById('explode').value=v; document.getElementById('exVal').textContent=(+v).toFixed(v%1?1:0)+'×'; layoutFloors(); orb.ty=viewY(); syncYPanUI(); }
function resetView(){ yOffset=0;orb.theta=-0.6;orb.phi=1.02;orb.r=640;orb.tx=0;orb.ty=viewY();orb.tz=0;syncXPanUI();syncYPanUI(); }
function topView(){ orb.theta=0;orb.phi=0.06;orb.r=560;orb.tx=0;orb.ty=viewY();orb.tz=0;syncXPanUI();syncYPanUI(); }

// fetch any updated floor models from Storage (override static textures)
async function applyCustomModels(){
  try{
    const {data}=await db.from('floor_models').select('*');
    if(data&&data.length){
      data.forEach(m=>{
        const fl=FLOORS.find(f=>f.id===m.floor_id);
        if(fl&&m.image_path){
          const t=encodeURIComponent(m.updated_at||'');
          fl.tex=`${SUPA_URL}/storage/v1/object/public/floorplans/${m.image_path}?t=${t}`;
        }
      });
    }
  }catch(e){ /* fall back to static textures */ }
}

(async()=>{ init(); setupOrbit(); await applyCustomModels(); buildFloors(); })();
