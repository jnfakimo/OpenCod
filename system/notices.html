<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('siteTheme')||'tech');</script>
<script src="theme.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<title>通知中心 — 報修派工管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#020b18;--surface:#04111f;--panel:#05101e;--border:#0c2840;--border-hi:#1a4a70;--cyan:#00d4ff;--blue:#1a7fff;--green:#00ff9d;--amber:#ffb300;--red:#ff3b3b;--text:#a8d8f0;--text-hi:#d4eeff;--text-dim:#3a6a8a;--font-head:'Rajdhani',sans-serif}
:root[data-theme="light"]{--bg:#f4f6fa;--surface:#ffffff;--panel:#ffffff;--border:#dbe4ee;--border-hi:#93b4d6;--cyan:#0284c7;--blue:#2563eb;--green:#059669;--amber:#b45309;--red:#dc2626;--text:#1e293b;--text-hi:#0f172a;--text-dim:#64748b}
/* light mode overrides */
:root[data-theme="light"] body{background-image:none}
:root[data-theme="light"] .navbar{background:rgba(255,255,255,.97)}
:root[data-theme="light"] .nav-title{text-shadow:none}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}
.navbar{background:rgba(3,10,22,.97);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.nav-title{font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:var(--cyan);letter-spacing:.06em;text-shadow:0 0 14px rgba(0,212,255,.5)}
.nav-sub{font-size:.7rem;color:var(--text-dim)}.nav-space{flex:1}
.nav-back{font-size:.7rem;color:var(--text-dim);border:1px solid var(--border);padding:5px 10px;border-radius:2px;cursor:pointer;background:none}
.nav-back:hover{border-color:var(--cyan);color:var(--cyan)}
.wrap{max-width:760px;margin:0 auto;padding:16px}
.bar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.bar .c{font-size:.74rem;color:var(--text-dim)}.bar .sp{flex:1}
.btn{font-size:.72rem;border:1px solid var(--border);background:none;color:var(--text-dim);padding:6px 12px;border-radius:2px;cursor:pointer}.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.n{display:flex;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:4px;margin-bottom:8px;background:var(--panel)}
.n.unread{border-color:var(--border-hi);background:rgba(0,212,255,.04)}
.n .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);margin-top:6px;flex-shrink:0;box-shadow:0 0 6px var(--cyan)}
.n.read .dot{background:var(--text-dim);box-shadow:none}
.n .body{flex:1}
.n .t{font-size:.82rem;color:var(--text-hi);font-weight:600}
.n .b{font-size:.76rem;color:var(--text);margin-top:2px}
.n .m{font-size:.66rem;color:var(--text-dim);margin-top:4px}
.n .ev{font-size:.62rem;padding:1px 7px;border-radius:8px;border:1px solid var(--border);color:var(--text-dim);margin-left:auto;white-space:nowrap;height:fit-content}
.empty{text-align:center;color:var(--text-dim);padding:40px;font-size:.84rem}

</style>
<link rel="stylesheet" href="light-mode-fix.css">
<link rel="stylesheet" href="mobile-unified.css?v=20260713-2">
</head>
<body>
<nav class="navbar">
  <div><div class="nav-title"><span class="ic ic-notification"></span> 通知中心</div><div class="nav-sub">站內即時通知</div></div>
  <div class="nav-space"></div>
<a href="dashboard.html"><button class="nav-back"><span class="ic ic-dashboard"></span> 戰情儀表板</button></a>
<a href="workorder.html"><button class="nav-back"><span class="ic ic-dispatch"></span> 報修系統</button></a>
<a href="dispatch.html"><button class="nav-back"><span class="ic ic-dispatch"></span> 派工系統</button></a>
<a href="inspection-archived.html"><button class="nav-back"><span class="ic ic-inspection"></span> 巡檢</button></a>
  <a href="admin.html"><button class="nav-back">← 後台</button></a>
</nav>
<div class="wrap">
  <div class="bar"><span class="c" id="cnt"></span><div class="sp"></div><button class="btn" onclick="markAll()">全部標為已讀</button></div>
  <div id="list"><div class="empty">載入中…</div></div>
</div>
<script>
const SUPA_URL='https://qztffronusdhgxhjjubt.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dGZmcm9udXNkaGd4aGpqdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI1MzgsImV4cCI6MjA5NzI2ODUzOH0.FnUxot5YXI3yKCUCmJA5P4ysEJhmtaQQA6rM7MRy3oA';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
(async()=>{const {data:{session}}=await db.auth.getSession();if(!session){location.href='login.html';}})();
function escHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
const EV={new_repair:'新報修',dispatch:'派工',return:'退件',overdue:'逾期',complete:'完成',close:'結案',sign:'簽核'};
let me_={user_id:null};
function fmt(t){if(!t)return'';const d=new Date(t);return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
async function init(){
  try{const {data:{session}}=await db.auth.getSession();if(session){const {data}=await db.from('users').select('user_id,name').eq('auth_id',session.user.id).single();if(data)me_=data;}}catch(e){}
  load();
}
async function load(){
  let q=db.from('notifications').select('*').order('created_at',{ascending:false}).limit(200);
  if(me_.user_id) q=q.eq('recipient_id',me_.user_id);
  const {data,error}=await q;
  const box=document.getElementById('list');
  if(error){box.innerHTML='<div class="empty" style="color:var(--amber)">尚未建立 notifications 表，請先執行 work_order_schema.sql</div>';return;}
  if(!data||!data.length){box.innerHTML='<div class="empty">目前沒有通知</div>';document.getElementById('cnt').textContent='';return;}
  const unread=data.filter(n=>!n.is_read).length;
  document.getElementById('cnt').textContent=`${data.length} 則通知 · ${unread} 則未讀`;
  box.innerHTML=data.map(n=>`<div class="n ${n.is_read?'read':'unread'}" onclick="markOne('${n.notif_id}',${n.is_read})">
    <div class="dot"></div><div class="body"><div class="t">${escHtml(n.title||EV[n.event]||'通知')}</div>
    ${n.body?`<div class="b">${escHtml(n.body)}</div>`:''}<div class="m">${fmt(n.created_at)}</div></div>
    <span class="ev">${escHtml(EV[n.event]||n.event||'')}</span></div>`).join('');
}
async function markOne(id,read){ if(read)return; await db.from('notifications').update({is_read:true}).eq('notif_id',id); load(); }
async function markAll(){ let q=db.from('notifications').update({is_read:true}).eq('is_read',false); if(me_.user_id)q=q.eq('recipient_id',me_.user_id); await q; load(); }
init();
</script>
</body>
</html>
