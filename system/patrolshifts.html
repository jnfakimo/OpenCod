<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('siteTheme')||'tech');</script>
<script src="theme.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>班別排程管理 — 臺北農產巡檢系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#020b18;--surface:#04111f;--panel:#05101e;--border:#0c2840;--border-hi:#1a4a70;
  --cyan:#00d4ff;--patrol:#c77dff;--green:#00ff9d;--red:#ff5470;
  --text:#a8d8f0;--text-hi:#d4eeff;--text-dim:#3a6a8a;
  --font-head:'Rajdhani',sans-serif}
:root[data-theme="light"]{--bg:#f4f6fa;--surface:#ffffff;--panel:#ffffff;--border:#dbe4ee;--border-hi:#93b4d6;
  --cyan:#0284c7;--patrol:#9333ea;--green:#059669;--red:#dc2626;
  --text:#1e293b;--text-hi:#0f172a;--text-dim:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
a{color:inherit;text-decoration:none}

.navbar{background:rgba(3,10,22,.97);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;overflow-x:auto;overflow-y:hidden}
:root[data-theme="light"] .navbar{background:rgba(255,255,255,.97)}
.nav-title{font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:var(--patrol);letter-spacing:.06em}
.nav-sub{font-size:.7rem;color:var(--text-dim)}
.nav-space{flex:1 0 auto}.navbar a{flex:0 0 auto}
.nav-back{font-size:.7rem;color:var(--text-dim);border:1px solid var(--border);padding:5px 10px;border-radius:2px;cursor:pointer;background:none;
  transition:all .2s;font-family:var(--font-head);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.nav-back:hover{border-color:var(--patrol);color:var(--patrol)}

.content{padding:14px 16px;max-width:900px;margin:0 auto}
.hint{font-size:.72rem;color:var(--text-dim);margin-bottom:14px;line-height:1.6;background:var(--surface);
  border:1px solid var(--border);border-left:2px solid var(--patrol);border-radius:2px;padding:9px 12px}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:16px}
.panel-h{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.panel-h h2{font-family:var(--font-head);font-size:1rem;color:var(--text-hi);letter-spacing:.04em}
.panel-h .sp{flex:1}

.datebar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.datebar input[type=date]{background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:7px 10px;border-radius:2px;font-size:.85rem;outline:none}
.datebar input[type=date]:focus{border-color:var(--patrol)}

.btn{padding:7px 14px;border-radius:2px;cursor:pointer;font-size:.75rem;font-family:var(--font-head);
  letter-spacing:.04em;text-transform:uppercase;transition:all .2s;border:1px solid var(--border);background:none;color:var(--text-dim)}
.btn:hover{border-color:var(--patrol);color:var(--patrol)}
.btn-add{background:rgba(199,125,255,.1);border:1px solid var(--patrol);color:var(--patrol)}
.btn-add:hover{background:rgba(199,125,255,.2)}

table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;color:var(--text-dim);font-size:.68rem;letter-spacing:.05em;padding:6px 8px;border-bottom:1px solid var(--border)}
td{padding:8px;border-bottom:1px solid rgba(12,40,64,.4)}
tr:last-child td{border-bottom:none}
.time{font-family:var(--font-head);color:var(--text-hi)}
.acts{display:flex;gap:6px}
.mini{font-size:.68rem;padding:3px 9px;border:1px solid var(--border);border-radius:2px;cursor:pointer;background:none;color:var(--text-dim);transition:all .2s}
.mini:hover{border-color:var(--patrol);color:var(--patrol)}
.mini.del:hover{border-color:var(--red);color:var(--red)}
.empty{text-align:center;padding:30px 10px;color:var(--text-dim);font-size:.82rem}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(1,6,14,.82);z-index:200;align-items:flex-start;justify-content:center;overflow:auto;padding:60px 16px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border-hi);border-radius:4px;width:100%;max-width:380px}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.modal-head .mt{font-family:var(--font-head);font-size:1rem;font-weight:700;color:var(--patrol);letter-spacing:.05em}
.modal-head .x{margin-left:auto;cursor:pointer;color:var(--text-dim);font-size:1.1rem}
.modal-head .x:hover{color:var(--red)}
.modal-body{padding:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.72rem;color:var(--text-dim);margin-bottom:5px}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:2px;font-size:.85rem;outline:none}
.field input:focus{border-color:var(--patrol)}
.btn-primary{width:100%;background:rgba(199,125,255,.12);border:1px solid var(--patrol);color:var(--patrol);
  padding:11px;border-radius:2px;cursor:pointer;font-size:.85rem;font-family:var(--font-head);letter-spacing:.06em;text-transform:uppercase}
.btn-primary:hover{background:rgba(199,125,255,.22)}
.msg{font-size:.75rem;margin-top:8px;min-height:16px;color:var(--red)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--panel);border:1px solid var(--patrol);color:var(--text-hi);padding:11px 20px;
  border-radius:3px;font-size:.8rem;z-index:300;transition:transform .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red)}
</style>
<link rel="stylesheet" href="light-mode-fix.css">
</head>
<body>
<nav class="navbar">
  <div>
    <div class="nav-title">◈ 班別排程管理</div>
    <div class="nav-sub">駐衛警巡檢系統 · 臺北農產 第一果菜市場</div>
  </div>
  <div class="nav-space"></div>
  <a href="guardpatrol.html"><button class="nav-back">巡檢稽核總覽</button></a>
  <a href="patrollist.html"><button class="nav-back">巡邏點清單</button></a>
  <a href="admin.html#modelhub"><button class="nav-back">後台</button></a>
</nav>

<div class="content">
  <div class="hint">
    設定每天的巡檢班別時段（早/午/晚/夜可自訂）。每一天都能個別調整，可先「套用範本」快速帶入預設班別，再依當天需求增刪改。
    所有班別巡守同一組巡檢點（即「巡邏點清單」內的巡邏點），不需另外指定。
  </div>

  <div class="panel">
    <div class="panel-h">
      <h2>當日班別</h2>
      <div class="sp"></div>
      <button class="btn" onclick="applyTemplate()">↧ 套用範本</button>
      <button class="btn btn-add" onclick="openShiftModal()">＋ 新增班別</button>
    </div>
    <div class="datebar">
      <button class="mini" onclick="shiftDate(-1)">◀</button>
      <input type="date" id="datePick" onchange="load()">
      <button class="mini" onclick="shiftDate(1)">▶</button>
      <button class="mini" onclick="goToday()">今天</button>
    </div>
    <div id="shiftList"></div>
  </div>

  <div class="panel">
    <div class="panel-h">
      <h2>預設範本</h2>
      <div class="sp"></div>
      <button class="btn btn-add" onclick="openTplModal()">＋ 新增範本班別</button>
    </div>
    <div id="tplList"></div>
  </div>
</div>

<!-- 當日班別 modal -->
<div class="modal-bg" id="m-shift">
  <div class="modal">
    <div class="modal-head"><span class="mt" id="shiftTitle">新增班別</span><span class="x" onclick="closeModal('m-shift')">✕</span></div>
    <div class="modal-body">
      <div class="field"><label>班別名稱</label><input id="f-name" placeholder="例：早班"></div>
      <div class="field"><label>開始時間</label><input id="f-start" type="time"></div>
      <div class="field"><label>結束時間（若跨夜，結束時間可小於開始時間）</label><input id="f-end" type="time"></div>
      <div class="msg" id="shiftMsg"></div>
      <button class="btn-primary" onclick="saveShift()">儲存</button>
    </div>
  </div>
</div>

<!-- 範本 modal -->
<div class="modal-bg" id="m-tpl">
  <div class="modal">
    <div class="modal-head"><span class="mt" id="tplTitle">新增範本班別</span><span class="x" onclick="closeModal('m-tpl')">✕</span></div>
    <div class="modal-body">
      <div class="field"><label>班別名稱</label><input id="tf-name" placeholder="例：早班"></div>
      <div class="field"><label>開始時間</label><input id="tf-start" type="time"></div>
      <div class="field"><label>結束時間（若跨夜，結束時間可小於開始時間）</label><input id="tf-end" type="time"></div>
      <div class="msg" id="tplMsg"></div>
      <button class="btn-primary" onclick="saveTpl()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://qztffronusdhgxhjjubt.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dGZmcm9udXNkaGd4aGpqdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI1MzgsImV4cCI6MjA5NzI2ODUzOH0.FnUxot5YXI3yKCUCmJA5P4ysEJhmtaQQA6rM7MRy3oA';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
(async()=>{const {data:{session}}=await db.auth.getSession();if(!session){location.href='login.html?redirect='+encodeURIComponent('patrolshifts.html');}})();
function translateError(msg){
  if(!msg) return '未知錯誤';
  if(msg.includes('duplicate key value')) return '同一天已有相同名稱的班別';
  if(msg.includes('null value in column')) return '必填欄位不可空白';
  if(msg.includes('permission denied')||msg.includes('violates row-level security')) return '無操作權限';
  if(msg.includes('relation') && msg.includes('does not exist')) return '資料表不存在，請確認資料庫設定（system/sql/patrol_shifts.sql）';
  if(msg.includes('Failed to fetch')||msg.includes('NetworkError')) return '網路連線失敗，請稍後再試';
  return '操作失敗，請稍後再試或聯絡系統管理員';
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m,err){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2200);}
function fmtHM(t){return String(t||'').slice(0,5);}

function todayStr(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function goToday(){document.getElementById('datePick').value=todayStr();load();}
function shiftDate(delta){
  const el=document.getElementById('datePick');
  const d=new Date(el.value+'T00:00:00');
  d.setDate(d.getDate()+delta);
  const p=n=>String(n).padStart(2,'0');
  el.value=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  load();
}

let shiftRows=[], tplRows=[], editShiftId=null, editTplId=null;

async function load(){
  const dateStr=document.getElementById('datePick').value;
  const {data,error}=await db.from('patrol_shifts').select('*').eq('shift_date',dateStr).order('sort_order');
  if(error){document.getElementById('shiftList').innerHTML='<div class="empty">讀取失敗：'+esc(translateError(error.message))+'</div>';return;}
  shiftRows=data||[];
  renderShifts();
}

function renderShifts(){
  const box=document.getElementById('shiftList');
  if(!shiftRows.length){box.innerHTML='<div class="empty">這天還沒有排班。可以點「套用範本」快速帶入，或「新增班別」自行設定。</div>';return;}
  box.innerHTML=`<table><tr><th>班別</th><th>時段</th><th></th></tr>`+
    shiftRows.map(s=>`<tr>
      <td>${esc(s.name)}</td>
      <td class="time">${fmtHM(s.start_time)} – ${fmtHM(s.end_time)}</td>
      <td><div class="acts">
        <button class="mini" onclick="openShiftModal('${s.shift_id}')">編輯</button>
        <button class="mini del" onclick="delShift('${s.shift_id}')">刪除</button>
      </div></td>
    </tr>`).join('')+`</table>`;
}

async function loadTpl(){
  const {data,error}=await db.from('patrol_shift_template').select('*').order('sort_order');
  if(error){document.getElementById('tplList').innerHTML='<div class="empty">讀取失敗：'+esc(translateError(error.message))+'</div>';return;}
  tplRows=data||[];
  renderTpl();
}
function renderTpl(){
  const box=document.getElementById('tplList');
  if(!tplRows.length){box.innerHTML='<div class="empty">尚無範本班別。</div>';return;}
  box.innerHTML=`<table><tr><th>班別</th><th>時段</th><th></th></tr>`+
    tplRows.map(s=>`<tr>
      <td>${esc(s.name)}</td>
      <td class="time">${fmtHM(s.start_time)} – ${fmtHM(s.end_time)}</td>
      <td><div class="acts">
        <button class="mini" onclick="openTplModal('${s.template_id}')">編輯</button>
        <button class="mini del" onclick="delTpl('${s.template_id}')">刪除</button>
      </div></td>
    </tr>`).join('')+`</table>`;
}

function closeModal(id){document.getElementById(id).classList.remove('show');}

function openShiftModal(id){
  editShiftId=id||null;
  document.getElementById('shiftTitle').textContent=id?'編輯班別':'新增班別';
  document.getElementById('shiftMsg').textContent='';
  if(id){
    const s=shiftRows.find(x=>x.shift_id===id);
    document.getElementById('f-name').value=s.name;
    document.getElementById('f-start').value=fmtHM(s.start_time);
    document.getElementById('f-end').value=fmtHM(s.end_time);
  }else{
    document.getElementById('f-name').value='';
    document.getElementById('f-start').value='';
    document.getElementById('f-end').value='';
  }
  document.getElementById('m-shift').classList.add('show');
}
async function saveShift(){
  const name=document.getElementById('f-name').value.trim();
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const msg=document.getElementById('shiftMsg');
  if(!name||!start||!end){msg.textContent='請完整填寫班別名稱與時間';return;}
  const dateStr=document.getElementById('datePick').value;
  const sortOrder=editShiftId?shiftRows.find(x=>x.shift_id===editShiftId).sort_order:(shiftRows.length?Math.max(...shiftRows.map(s=>s.sort_order))+1:1);
  const payload={shift_date:dateStr,name,start_time:start,end_time:end,sort_order:sortOrder};
  let error;
  if(editShiftId){({error}=await db.from('patrol_shifts').update(payload).eq('shift_id',editShiftId));}
  else{({error}=await db.from('patrol_shifts').insert(payload));}
  if(error){msg.textContent=translateError(error.message);return;}
  closeModal('m-shift');toast(editShiftId?'已更新':'已新增');await load();
}
async function delShift(id){
  const s=shiftRows.find(x=>x.shift_id===id);if(!s)return;
  if(!confirm(`確定刪除「${s.name}」（${fmtHM(s.start_time)}–${fmtHM(s.end_time)}）？`))return;
  const {error}=await db.from('patrol_shifts').delete().eq('shift_id',id);
  if(error){toast('刪除失敗：'+translateError(error.message),true);return;}
  toast('已刪除');await load();
}

function openTplModal(id){
  editTplId=id||null;
  document.getElementById('tplTitle').textContent=id?'編輯範本班別':'新增範本班別';
  document.getElementById('tplMsg').textContent='';
  if(id){
    const s=tplRows.find(x=>x.template_id===id);
    document.getElementById('tf-name').value=s.name;
    document.getElementById('tf-start').value=fmtHM(s.start_time);
    document.getElementById('tf-end').value=fmtHM(s.end_time);
  }else{
    document.getElementById('tf-name').value='';
    document.getElementById('tf-start').value='';
    document.getElementById('tf-end').value='';
  }
  document.getElementById('m-tpl').classList.add('show');
}
async function saveTpl(){
  const name=document.getElementById('tf-name').value.trim();
  const start=document.getElementById('tf-start').value;
  const end=document.getElementById('tf-end').value;
  const msg=document.getElementById('tplMsg');
  if(!name||!start||!end){msg.textContent='請完整填寫班別名稱與時間';return;}
  const sortOrder=editTplId?tplRows.find(x=>x.template_id===editTplId).sort_order:(tplRows.length?Math.max(...tplRows.map(s=>s.sort_order))+1:1);
  const payload={name,start_time:start,end_time:end,sort_order:sortOrder};
  let error;
  if(editTplId){({error}=await db.from('patrol_shift_template').update(payload).eq('template_id',editTplId));}
  else{({error}=await db.from('patrol_shift_template').insert(payload));}
  if(error){msg.textContent=translateError(error.message);return;}
  closeModal('m-tpl');toast(editTplId?'已更新':'已新增');await loadTpl();
}
async function delTpl(id){
  const s=tplRows.find(x=>x.template_id===id);if(!s)return;
  if(!confirm(`確定從範本刪除「${s.name}」？（不影響已排定的日期）`))return;
  const {error}=await db.from('patrol_shift_template').delete().eq('template_id',id);
  if(error){toast('刪除失敗：'+translateError(error.message),true);return;}
  toast('已刪除');await loadTpl();
}

async function applyTemplate(){
  if(!tplRows.length){toast('尚未設定範本班別，請先在下方新增範本',true);return;}
  const dateStr=document.getElementById('datePick').value;
  const existingNames=new Set(shiftRows.map(s=>s.name));
  const toInsert=tplRows.filter(t=>!existingNames.has(t.name))
    .map(t=>({shift_date:dateStr,name:t.name,start_time:t.start_time,end_time:t.end_time,sort_order:t.sort_order}));
  if(!toInsert.length){toast('範本班別當天都已存在，未新增');return;}
  const {error}=await db.from('patrol_shifts').insert(toInsert);
  if(error){toast('套用失敗：'+translateError(error.message),true);return;}
  toast(`已套用 ${toInsert.length} 個班別`);await load();
}

document.getElementById('m-shift').addEventListener('click',e=>{if(e.target.id==='m-shift')closeModal('m-shift');});
document.getElementById('m-tpl').addEventListener('click',e=>{if(e.target.id==='m-tpl')closeModal('m-tpl');});

document.getElementById('datePick').value=todayStr();
load();
loadTpl();
</script>
</body>
</html>
