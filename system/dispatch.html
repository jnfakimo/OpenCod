.a-primary{border-color:var(--cyan);color:var(--cyan)}.a-primary:hover{background:rgba(0,212,255,.15)}
.a-warn{border-color:var(--amber);color:var(--amber)}.a-warn:hover{background:rgba(255,179,0,.12)}

.a-ok{border-color:var(--green);color:var(--green)}.a-ok:hover{background:rgba(0,255,157,.12)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border-hi);color:var(--text);padding:10px 20px;border-radius:4px;font-size:.78rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

function escHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function translateError(msg) {
  if (!msg) return '未知錯誤';
  if (msg.includes('User already registered')) return '此 Email 已被註冊';
  if (msg.includes('Invalid login credentials')) return '帳號或密碼錯誤';
  if (msg.includes('Email not confirmed')) return 'Email 尚未驗證，請檢查信箱';

  if (msg.includes('For security purposes') && msg.includes('second')) return '操作過於頻繁，請稍後再試';
  if (msg.includes('duplicate key value')) return '資料重複，請確認是否已存在';
  if (msg.includes('null value in column')) return '必填欄位不可空白';
  if (msg.includes('violates foreign key constraint')) return '關聯資料錯誤，無法刪除';
  if (msg.includes('violates row-level security')) return '無操作權限';
  if (msg.includes('permission denied')) return '無操作權限';
  if (msg.includes('JWT expired')) return '登入已過期，請重新整理頁面';
  if (msg.includes('relation') && msg.includes('does not exist')) return '資料表不存在，請確認資料庫設定';
  if (msg.includes('value too long')) return '輸入值過長';
  if (msg.includes('invalid input syntax')) return '輸入格式不正確';
  if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('Load failed')) return '網路連線失敗，請稍後再試';
  return '操作失敗，請稍後再試或聯絡系統管理員';
}

const ST={pending:['待派工','#ffb300'],transferred:['已轉派','#1a7fff'],assigned:['待接單','#1a7fff'],
  accepted:['已接單','#00d4ff'],in_progress:['維修中','#00d4ff'],waiting_parts:['等待料件','#b48aff'],

function badge(s){const x=ST[s]||[s,'#888'];return `<span class="badge" style="background:${x[1]}22;color:${x[1]};border:1px solid ${x[1]}66">${x[0]}</span>`;}

const RBAC_ROLES={reporter:'一般報修人員',duty:'值班人員',dispatcher:'派工管理員',technician:'維修技術人員',unit_supervisor:'單位主管',mgmt_supervisor:'管理部主管',sysadmin:'系統管理員'};
const LEGACY_TO_RBAC={admin:'sysadmin',supervisor:'unit_supervisor',maintenance:'technician',inspector:'reporter'};
const ROLE_PERMISSION_PRESETS={
  reporter:{maintenance:true,repair:true,read:true,create:true},
  duty:{maintenance:true,handover:true,repair:true,read:true,create:true,dispatch:true},
  dispatcher:{maintenance:true,repair:true,read:true,create:true,update:true,dispatch:true,export:true},
  technician:{maintenance:true,read:true,update:true,dispatch:true},
  unit_supervisor:{maintenance:true,handover:true,repair:true,read:true,create:true,dispatch:true,close:true,sign:true,export:true},
  mgmt_supervisor:{maintenance:true,handover:true,read:true,close:true,sign:true,export:true},
  sysadmin:{inspector:true,maintenance:true,handover:true,repair:true,read:true,create:true,update:true,delete:true,dispatch:true,close:true,sign:true,export:true,admin:true}
};
function normalizeRoleId(user){const role=user?.rbac_role||user?.role;if(RBAC_ROLES[role])return role;return LEGACY_TO_RBAC[role]||'reporter';}
function hasPerm(key){const p=me_?.permissions||{};if(typeof p[key]==='boolean')return p[key];return ROLE_PERMISSION_PRESETS[normalizeRoleId(me_)]?.[key]===true;}
function canAssign(user){return user?.role==='maintenance'||user?.role==='admin'||['technician','sysadmin'].includes(user?.rbac_role);}

const DEFAULT_OPERATOR_NAME='吳玉美';
const DEFAULT_OPERATOR_USERNAME='569146';
const DEFAULT_OPERATOR_DEPARTMENT='改建室';

function normalizeDepartmentName(value){
  const dept=(value||'').trim();
  return dept==='改建辦公室' ? DEFAULT_OPERATOR_DEPARTMENT : dept;
}
function cleanOperatorName(value){
  const name=(value||'').trim();
  return (!name||name==='操作員') ? DEFAULT_OPERATOR_NAME : name;
}
function readLoginCache(){
  return {
    user_id:sessionStorage.getItem('user_id') || null,
    username:sessionStorage.getItem('user_username') || DEFAULT_OPERATOR_USERNAME,
    dept_id:sessionStorage.getItem('user_dept_id') || null,
    name:cleanOperatorName(sessionStorage.getItem('user_name')),
    departmentName:normalizeDepartmentName(sessionStorage.getItem('user_department')),
    phone:(sessionStorage.getItem('user_phone') || '').trim(),
    role:sessionStorage.getItem('user_role') || 'inspector',
    rbac_role:sessionStorage.getItem('user_rbac_role') || 'reporter',
    permissions:{}
  };
}
function operatorDepartment(){
  return normalizeDepartmentName(me_?.departmentName || me_?.department || me_?.dep || sessionStorage.getItem('user_department') || DEFAULT_OPERATOR_DEPARTMENT);
}
function operatorName(){
  return cleanOperatorName(me_?.name || sessionStorage.getItem('user_name'));
}
function operatorLabel(){
  return operatorDepartment() ? `${operatorDepartment()} / ${operatorName()}` : operatorName();
}
function setOperatorDisplay(){
  const el=document.getElementById('navUser');
  if(el) el.textContent=operatorLabel();
}
async function hydrateOperatorProfile(){
  if(me_?.user_id && me_?.phone && operatorDepartment())return;
  try{
    let data=null;
    if(me_?.user_id){
      const res=await db.from('users').select('user_id,username,name,phone,dept_id,department,role,rbac_role').eq('user_id',me_.user_id).limit(1).maybeSingle();
      data=res.data||null;
    }
    if(!data && me_?.username){
      const res=await db.from('users').select('user_id,username,name,phone,dept_id,department,role,rbac_role').eq('username',me_.username).eq('status','active').limit(1).maybeSingle();
      data=res.data||null;
    }
    if(!data){
      const res=await db.from('users').select('user_id,username,name,phone,dept_id,department,role,rbac_role').eq('name',operatorName()).eq('status','active').limit(1).maybeSingle();
      data=res.data||null;
    }
    if(!data)return;
    me_={...me_,...data,name:cleanOperatorName(data.name||me_.name)};
    sessionStorage.setItem('user_name',me_.name);
    if(me_.username) sessionStorage.setItem('user_username',me_.username);
    if(me_.user_id) sessionStorage.setItem('user_id',me_.user_id);
    if(me_.dept_id) sessionStorage.setItem('user_dept_id',me_.dept_id);
    if(me_.department||me_.dep) sessionStorage.setItem('user_department',normalizeDepartmentName(me_.department||me_.dep));
    if(me_.phone) sessionStorage.setItem('user_phone',me_.phone);
    else sessionStorage.removeItem('user_phone');
    if(me_.role) sessionStorage.setItem('user_role',me_.role);
    if(me_.rbac_role) sessionStorage.setItem('user_rbac_role',me_.rbac_role);
  }catch(e){}
}
async function hydrateOperatorDepartment(){
  const explicit=normalizeDepartmentName(me_?.departmentName || me_?.department || me_?.dep || sessionStorage.getItem('user_department') || '');
  if(explicit){me_.departmentName=explicit;sessionStorage.setItem('user_department',explicit);return;}
  if(!me_?.dept_id)return;
  try{
    const {data}=await db.from('departments').select('dept_id,name,parent_id').eq('status','active').limit(1000);
    const map=Object.fromEntries((data||[]).map(d=>[d.dept_id,d]));
    const path=[];let cur=map[me_.dept_id],guard=0;
    while(cur&&guard++<8){path.unshift(cur.name);cur=cur.parent_id?map[cur.parent_id]:null;}
    me_.departmentName=normalizeDepartmentName(path.filter(Boolean).join(' / '));
    if(me_.departmentName)sessionStorage.setItem('user_department',me_.departmentName);
  }catch(e){}
}

function buildReqNoMap(){
  const groups={};
  reqs.forEach(r=>{
    const k=reqDateKey(r);
    if(!groups[k])groups[k]=[];
    groups[k].push(r);
  });
  reqNoDisplayMap={};
  Object.entries(groups).forEach(([date,items])=>{
    items.sort((a,b)=>reqSortTime(a)-reqSortTime(b)||String(a.request_id||'').localeCompare(String(b.request_id||'')));
    items.forEach((r,i)=>{
      if(r.request_id)reqNoDisplayMap[r.request_id]=`${date}-${String(i+1).padStart(3,'0')}`;
    });
  });
}
function displayReqNo(r){
  if(r?.request_id && reqNoDisplayMap[r.request_id])return reqNoDisplayMap[r.request_id];
  const raw=String(r?.req_no||'').trim();
  let m=raw.match(/^RP(\d{4})(\d{2})(\d{2})-(\d+)$/i);
  if(m)return `${m[1]}-${m[2]}-${m[3]}-${m[4].slice(-3).padStart(3,'0')}`;
  m=raw.match(/^(\d{4})-?(\d{2})-?(\d{2})-(\d+)$/);
  if(m)return `${m[1]}-${m[2]}-${m[3]}-${m[4].slice(-3).padStart(3,'0')}`;
  if(raw)return raw;
  if(r?.created_at){
    const d=new Date(r.created_at);
    return `${d.getFullYear()}-${two(d.getMonth()+1)}-${two(d.getDate())}-${String(r.request_id||'000').replace(/-/g,'').slice(-3).padStart(3,'0')}`;
  }
  return '—';
}
function reqDateKey(r){
  const raw=String(r?.req_no||'').trim();
  let m=raw.match(/^RP(\d{4})(\d{2})(\d{2})-/i);
  if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  m=raw.match(/^(\d{4})-?(\d{2})-?(\d{2})-/);
  if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  const d=r?.created_at?new Date(r.created_at):new Date();
  if(!Number.isNaN(d.getTime()))return `${d.getFullYear()}-${two(d.getMonth()+1)}-${two(d.getDate())}`;
  return dateValue(new Date());
}
function reqSortTime(r){
  const t=new Date(r?.created_at||0).getTime();
  return Number.isFinite(t)?t:0;
}

function getTableData(){
  if(currentTab==='pending'){
    const pendingReqs=reqs.filter(r=>['pending','returned','rejected'].includes(r.status));
    return pendingReqs.map(r=>({type:'req',req:r,order:ordersByReq[r.request_id]}));
  }
  if(currentTab==='active'){
    const activeOrders=orders.filter(o=>['assigned','accepted','in_progress','waiting_parts','waiting_vendor'].includes(o.status));
    return activeOrders.map(o=>{
      const r=reqs.find(x=>x.request_id===o.request_id)||o.repair_requests;
      return {type:'order',req:r,order:o};
    });
  }
  if(currentTab==='history'){
    const doneOrders=orders.filter(o=>['pending_review','completed','closed','cancelled'].includes(o.status));
    return doneOrders.map(o=>{
      const r=reqs.find(x=>x.request_id===o.request_id)||o.repair_requests;
      return {type:'order',req:r,order:o};
    });
  }
  const all=orders.map(o=>{
    const r=reqs.find(x=>x.request_id===o.request_id)||o.repair_requests;
    return {type:'order',req:r,order:o};
  });
  return all;
}

function renderPager(total,totalPages){

function fmt(t){if(!t)return'—';const d=new Date(t);return `${(d.getMonth()+1)}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function fmtDate(t){if(!t)return'—';const m=String(t).match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return `${m[1]}-${m[2]}-${m[3]}`;const d=new Date(t);if(isNaN(d))return String(t).slice(0,10);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function two(n){return String(n).padStart(2,'0');}
function dateValue(d){return `${d.getFullYear()}-${two(d.getMonth()+1)}-${two(d.getDate())}`;}
function clientUuid(){
  return globalThis.crypto?.randomUUID?.() || 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}
function clientReqNo(){
  const today=dateValue(new Date());
  const next=reqs.filter(r=>reqDateKey(r)===today).length+1;
  return `${today}-${String(next).padStart(3,'0')}`;
}
function fileExt(file){
  const byName=(file?.name||'').match(/\.([A-Za-z0-9]{1,8})$/)?.[0]?.toLowerCase();
  if(byName)return byName;
  const map={'image/jpeg':'.jpg','image/png':'.png','image/gif':'.gif','image/webp':'.webp','video/mp4':'.mp4','application/pdf':'.pdf'};
  return map[file?.type]||'.bin';
}
function storagePath(requestId,file,prefix){
  return `${requestId}/${Date.now()}_${prefix}_${clientUuid().slice(0,8)}${fileExt(file)}`;
}
function storageObjectPath(path){
  return path.split('/').map(encodeURIComponent).join('/');
}
function uploadErrorMessage(error){
  const msg=error?.message||String(error||'');
  if(/Load failed|Failed to fetch|NetworkError/i.test(msg))return '手機瀏覽器暫時無法連線到檔案上傳服務，請確認網路後再重送。';
  return msg||'上傳失敗';
}
async function uploadRepairFile(path,file){
  const contentType=file?.type||'application/octet-stream';
  const first=await db.storage.from('repair-files').upload(path,file,{upsert:true,contentType});
  if(!first.error)return first;
  if(!/Load failed|Failed to fetch|NetworkError/i.test(first.error.message||''))return first;
  try{
    let token=SUPA_KEY;
    try{const {data:{session}}=await db.auth.getSession(); if(session?.access_token)token=session.access_token;}catch(e){}
    const res=await fetch(`${SUPA_URL}/storage/v1/object/repair-files/${storageObjectPath(path)}`,{
      method:'POST',
      headers:{apikey:SUPA_KEY,Authorization:`Bearer ${token}`,'Content-Type':contentType,'x-upsert':'true'},
      body:file
    });
    if(res.ok)return {data:{path},error:null};
    let text='';
    try{text=await res.text();}catch(e){}
    return {data:null,error:{message:text||`HTTP ${res.status}`}};
  }catch(e){
    return {data:null,error:{message:e?.message||first.error.message||'Load failed'}};
  }
}

function isStatementTimeout(error){

  if(error){toast('派工失敗：'+translateError(error.message),true);return;}
  await db.from('repair_requests').update({status:'assigned',assignee_id:tech||null,updated_at:new Date().toISOString()}).eq('request_id',reqId);
  await logStatus(reqId,data.order_id,r.status,'assigned','派工 '+(data.wo_no||'')+(tech?(' → '+(techs.find(t=>t.user_id===tech)?.name||'')):'')+(vendor?(' 委外:'+vendor):''));
  if(tech){ try{ await db.from('notifications').insert({recipient_id:tech,event:'dispatch',title:'新派工通知',
    body:`${r.req_no||''}｜${r.fault_type||'設備'}｜${r.fault_desc||''}`,request_id:reqId,order_id:data.order_id}); }catch(e){} }
  await loadData(); renderChips(); renderList(); openPendingDetail(reqId); toast('已派工');
}
async function cancelCase(r){
  if(!hasPerm('delete')){toast('沒有刪除/取消權限',true);return;}
  await db.from('repair_requests').update({status:'cancelled',updated_at:new Date().toISOString()}).eq('request_id',r.request_id);
  await logStatus(r.request_id,null,r.status,'cancelled','案件取消');
  await loadData(); renderChips(); renderList(); closeM('m-detail'); toast('已取消');
}

// ─── 工單詳情 ───
async function openOrderDetail(ordId){
  const o=orders.find(x=>x.order_id===ordId);
  if(!o)return;
  const r=reqs.find(x=>x.request_id===o.request_id)||o.repair_requests;
  document.getElementById('d-title').textContent=o.wo_no||'工單詳情';
  document.getElementById('d-badge').outerHTML=`<span class="badge" id="d-badge">${(ST[o.status]||['',''])[0]}</span>`;
  const body=document.getElementById('d-body');
  body.innerHTML='<div class="empty">載入中…</div>'; show('m-detail');
  const [{data:logs}]=await Promise.all([
    db.from('case_status_log').select('*').eq('order_id',ordId).order('created_at',{ascending:true})
  ]);
  const tech=o.users?.name||'';
  const vendor=o.vendor||'';
  body.innerHTML=`
    <div class="d-info">
      <div><span class="k">派工單號：</span><span class="v">${escHtml(o.wo_no||'—')}</span></div>
      <div><span class="k">報修單號：</span><span class="v">${escHtml(displayReqNo(r)||'—')}</span></div>
      <div><span class="k">故障類型：</span><span class="v">${escHtml(r?.fault_type||'—')}</span></div>
      <div><span class="k">單位：</span><span class="v">${escHtml(r?.department||'—')}</span></div>
      <div><span class="k">報修人：</span><span class="v">${escHtml(r?.reporter||'—')}</span></div>
      <div><span class="k">技師：</span><span class="v">${escHtml(tech||'—')}</span></div>
      <div><span class="k">委外廠商：</span><span class="v">${escHtml(vendor||'—')}</span></div>
      <div><span class="k">是否停機：</span><span class="v">${o.need_shutdown?'是':'否'}</span></div>
      <div><span class="k">預計到場：</span><span class="v">${o.expected_arrival?fmtDate(o.expected_arrival):'—'}</span></div>
      <div><span class="k">預計完成：</span><span class="v">${o.expected_finish?fmtDate(o.expected_finish):'—'}</span></div>
      <div><span class="k">到場時間：</span><span class="v">${o.arrival_time?fmt(o.arrival_time):'—'}</span></div>
      <div><span class="k">完成時間：</span><span class="v">${o.finish_time?fmt(o.finish_time):'—'}</span></div>
      ${o.work_content?`<div class="full"><span class="k">工作內容：</span><span class="v">${escHtml(o.work_content)}</span></div>`:''}
      ${o.fault_cause?`<div class="full"><span class="k">維修結果：</span><span class="v">原因：${escHtml(o.fault_cause||'')}｜處理：${escHtml(o.handle_method||'')}${o.parts_used?'｜更換:'+escHtml(o.parts_used):''}${o.materials?'｜材料:'+escHtml(o.materials):''}${o.labor_hours?'｜工時:'+escHtml(o.labor_hours)+'h':''}</span></div>`:''}
    </div>
    <div class="sect">處理歷程</div>
    <ul class="tl">${(logs||[]).map(l=>`<li><div class="st">${escHtml((ST[l.to_status]||[l.to_status])[0])}</div>${l.note?`<div class="nt">${escHtml(l.note)}</div>`:''}<div class="op">${escHtml(l.operator_name||'')} · <span class="ts">${fmt(l.created_at)}</span></div></li>`).join('')||'<li><div class="nt">尚無歷程</div></li>'}</ul>
    <div class="sect">操作</div>
    <div class="actions" id="d-actions2"></div>
    <div id="d-sub2"></div>`;
  renderOrderActions(r,o);
}

function renderOrderActions(r,o){
  const box=document.getElementById('d-actions2'); const sub=document.getElementById('d-sub2'); sub.innerHTML='';
  const s=o.status;
  const A=[];
  if(s==='assigned'){
    if(hasPerm('update')) A.push(['接單','a-ok',()=>act(()=>accept(r,o))]);
    if(hasPerm('update')) A.push(['退回派工','a-warn',()=>act(()=>returnOrder(r,o))]);
    if(hasPerm('update')) A.push(['拒絕','a-danger',()=>act(()=>rejectOrder(r,o))]);
    if(hasPerm('dispatch')) A.push(['重新派工','a-primary',()=>dispatchForm(r)]);
  }
  if(s==='accepted'){
    if(hasPerm('update')) A.push(['開始維修','a-primary',()=>act(()=>startWork(r,o))]);
    if(hasPerm('update')) A.push(['退回派工','a-warn',()=>act(()=>returnOrder(r,o))]);
  }
  if(s==='in_progress'){
    if(hasPerm('update')){A.push(['等待料件','a-warn',()=>act(()=>waitState(r,o,'waiting_parts'))]);A.push(['等待廠商','a-warn',()=>act(()=>waitState(r,o,'waiting_vendor'))]);A.push(['完成維修','a-ok',()=>completeForm(r,o)]);}
  }
  if(s==='waiting_parts'||s==='waiting_vendor'){
    if(hasPerm('update')){A.push(['繼續維修','a-primary',()=>act(()=>resume(r,o))]);A.push(['完成維修','a-ok',()=>act(()=>completeForm(r,o))]);}
  }
  if(s==='pending_review'||s==='completed'){
    if(hasPerm('sign')) A.push(['✓ 使用單位驗收','a-ok',()=>act(()=>confirmUnit(r,o))]);
    if(hasPerm('close')) A.push(['⊚ 主管結案','a-primary',()=>act(()=>closeCase(r,o))]);
    if(hasPerm('update')) A.push(['退回重修','a-warn',()=>act(()=>reopen(r,o))]);
  }
  if(!A.length){box.innerHTML='<span style="color:var(--text-dim);font-size:.76rem">權限不足或案件已結束，僅供檢視</span>';return;}
  box.innerHTML=''; A.forEach(([t,c,fn])=>{const b=document.createElement('button');b.className='abtn '+c;b.textContent=t;b.onclick=fn;box.appendChild(b);});
}

function completeForm(r,o){
  if(!hasPerm('update')){toast('沒有更新權限',true);return;}
  const sub=document.getElementById('d-sub2');
  sub.innerHTML=`<div class="subform show">
    <div class="field"><label>故障原因</label><input id="x-cause" placeholder="例：軸承磨損"></div>
    <div class="field"><label>處理方式</label><textarea id="x-method" placeholder="處理過程…"></textarea></div>
    <div class="row3">
      <div class="field"><label>更換零件</label><input id="x-parts"></div>
      <div class="field"><label>使用材料</label><input id="x-mat"></div>
      <div class="field"><label>工時(小時)</label><input id="x-hours" type="number" step="0.5" min="0"></div>
    </div>
    <button class="btn-primary" style="width:100%" onclick="doComplete('${r.request_id}','${o.order_id}')">確認完成</button>
  </div>`;
}
async function doComplete(reqId,ordId){
  if(!hasPerm('update')){toast('沒有更新權限',true);return;}
  const now=new Date().toISOString();
  const upd={status:'pending_review',finish_time:now,fault_cause:document.getElementById('x-cause').value.trim()||null,
    handle_method:document.getElementById('x-method').value.trim()||null,parts_used:document.getElementById('x-parts').value.trim()||null,
    materials:document.getElementById('x-mat').value.trim()||null,labor_hours:parseFloat(document.getElementById('x-hours').value)||null};
  await db.from('maintenance_orders').update(upd).eq('order_id',ordId);
  await db.from('repair_requests').update({status:'pending_review',updated_at:now}).eq('request_id',reqId);
  await logStatus(reqId,ordId,'in_progress','pending_review','維修完成，待驗收'+(upd.fault_cause?'（原因:'+upd.fault_cause+'）':''));
  await reloadAndReopen(ordId); toast('維修完成，待驗收');
}
async function accept(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}await db.from('maintenance_orders').update({status:'accepted',accept_status:'accepted'}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'assigned',updated_at:new Date().toISOString()}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o.order_id,'assigned','accepted','技師接單');await reloadAndReopen(o.order_id);toast('已接單');}
async function returnOrder(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}await db.from('maintenance_orders').update({status:'returned',accept_status:'returned'}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'pending',assignee_id:null,updated_at:new Date().toISOString()}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o.order_id,o.status,'returned','退回派工，待重新指派');await reloadAndReopen(o.order_id);toast('已退回');}
async function rejectOrder(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}await db.from('maintenance_orders').update({status:'rejected',accept_status:'rejected'}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'pending',assignee_id:null,updated_at:new Date().toISOString()}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o.order_id,o.status,'rejected','技師拒絕，待重新指派');await reloadAndReopen(o.order_id);toast('已拒絕');}
async function startWork(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}const now=new Date().toISOString();
  await db.from('maintenance_orders').update({status:'in_progress',start_time:now,arrival_time:o.arrival_time||now}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'in_progress',updated_at:now}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o.order_id,'accepted','in_progress','開始維修，到場時間 '+fmt(now));await reloadAndReopen(o.order_id);toast('開始維修');}
async function waitState(r,o,st){if(!hasPerm('update')){toast('沒有更新權限',true);return;}await db.from('maintenance_orders').update({status:st}).eq('order_id',o.order_id);
  await logStatus(r.request_id,o.order_id,'in_progress',st,st==='waiting_parts'?'等待料件':'等待廠商');await reloadAndReopen(o.order_id);toast('狀態已更新');}
async function resume(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}await db.from('maintenance_orders').update({status:'in_progress'}).eq('order_id',o.order_id);
  await logStatus(r.request_id,o.order_id,o.status,'in_progress','繼續維修');await reloadAndReopen(o.order_id);toast('繼續維修');}
async function confirmUnit(r,o){if(!hasPerm('sign')){toast('沒有簽核權限',true);return;}await logStatus(r.request_id,o?.order_id,'pending_review','pending_review','使用單位已驗收確認');await reloadAndReopen(o?.order_id);toast('已記錄使用單位驗收');}
async function closeCase(r,o){const now=new Date().toISOString();
  if(!hasPerm('close')){toast('沒有結案權限',true);return;}
  if(o) await db.from('maintenance_orders').update({status:'closed'}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'closed',updated_at:now}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o?.order_id,'pending_review','closed','主管結案，案件完成');await reloadAndReopen(o?.order_id);toast('已結案');}
async function reopen(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}if(o)await db.from('maintenance_orders').update({status:'in_progress'}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'in_progress',updated_at:new Date().toISOString()}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o?.order_id,'pending_review','in_progress','驗收退回，重新維修');await reloadAndReopen(o?.order_id);toast('已退回重修');}

async function reloadAndReopen(ordId){ await loadData(); renderChips(); renderList(); if(ordId)openOrderDetail(ordId); }

function show(id){document.getElementById(id).classList.add('show');}
function closeM(id){document.getElementById(id).classList.remove('show');}
let _tt;function toast(m,err){const el=document.getElementById('toast');el.textContent=m;el.style.borderColor=err?'var(--red)':'var(--border-hi)';el.style.color=err?'var(--red)':'var(--text)';el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);}

init().catch(e=>{document.getElementById('list').innerHTML=`<tr><td colspan="7" class="empty" style="color:var(--red)">載入失敗：${escHtml(translateError(e.message))}<br><small>請確認已執行 work_order_schema.sql</small></td></tr>`;});
</script>
</body>
