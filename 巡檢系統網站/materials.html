   ['replacement_cycle','е»әиӯ°?ҙж??ұж?','text'],['critical_level','?Қи?зЁӢеәҰ','level'],['risk_level','йўЁйҡӘзӯүз?','level']]},

async function load(){
  const [m,c,s]=await Promise.all([
    db.from('materials').select('*').limit(5000),
    db.from('material_categories').select('*').eq('status','active').order('sort_order'),
    db.from('floor_spaces').select('space_id,floor,space_name').eq('market_id','market1').limit(5000)
  ]);
  if(m.error){document.getElementById('tbody').innerHTML='<tr><td colspan="12" class="empty">?Ўж?и®Җ?–гҖӮи??Ҳж–ј Supabase ?·и? sql/material_master.sql е»әиЎЁ??/td></tr>';return;}
  mats=m.data||[]; cats=c.data||[]; spaces=s.data||[];
  buildFilters();
  // ж·ұйҖ?? ?m=code ???ҙжҺҘ?Ӣи©І?җж? QR
  const q=new URLSearchParams(location.search).get('m');
  render();
  if(q){const t=mats.find(x=>x.material_code===q||x.material_id===q);if(t)showQR(t.material_id);}
}

function buildFilters(){
  const floors=[...new Set([...mats.map(x=>x.floor),...spaces.map(x=>x.floor)].filter(Boolean))].sort((a,b)=>floorOrder(a)-floorOrder(b));
  document.getElementById('f-floor').innerHTML='<option value="">?ЁйғЁжЁ“еұӨ</option>'+floors.map(f=>`<option>${esc(f)}</option>`).join('');
  document.getElementById('f-cat').innerHTML='<option value="">?ЁйғЁ?Ҷй?</option>'+cats.map(c=>`<option value="${c.category_id}">${esc(c.name)}</option>`).join('');
}

function filtered(){
  const ff=document.getElementById('f-floor').value, fc=document.getElementById('f-cat').value,
        fs=document.getElementById('f-status').value, q=document.getElementById('f-q').value.trim().toLowerCase();
  let list=mats.slice();
  if(ff) list=list.filter(x=>x.floor===ff);
  if(fc) list=list.filter(x=>x.category_id===fc);
  if(fs) list=list.filter(x=>x.status===fs);
  if(q) list=list.filter(x=>[x.material_code,x.material_name,x.brand,x.model,x.specification,x.material_alias].some(v=>(v||'').toLowerCase().includes(q)));
  // з¬¬д?ж¬„ж?еұӨж?еә?
  list.sort((a,b)=>floorOrder(a.floor)-floorOrder(b.floor) || (a.material_code||'').localeCompare(b.material_code||''));
  return list;
}

function fileLink(url,label){return url?`<a class="lnk" href="${esc(url)}" target="_blank" rel="noopener">${label}</a>`:`<span class="lnk dim">${label}</span>`;}

function render(){
  document.getElementById('s-total').textContent=mats.length;
  document.getElementById('s-cat').textContent=new Set(mats.map(x=>x.category_id).filter(Boolean)).size;
  document.getElementById('s-insp').textContent=mats.filter(x=>x.inspection_required).length;
  document.getElementById('s-low').textContent=mats.filter(x=>x.safety_stock!=null&&x.current_stock!=null&&+x.current_stock<+x.safety_stock).length;

  const list=filtered();
  const pages=Math.max(1,Math.ceil(list.length/PER));
  if(page>pages)page=pages;
  const slice=list.slice((page-1)*PER,page*PER);
  const tb=document.getElementById('tbody');
  if(!slice.length){tb.innerHTML='<tr><td colspan="12" class="empty">е°ҡз„ЎиіҮж?пјҢи??Ңж–°еўһж??ҷгҖҚгҖ?/td></tr>';}
  else tb.innerHTML=slice.map(m=>{
    const low=m.safety_stock!=null&&m.current_stock!=null&&+m.current_stock<+m.safety_stock;
    const files=fileLink(m.cad_file_url,'CAD')+fileLink(m.datasheet_url,'иҰҸж ј')+fileLink(m.manual_url,'?Ӣе?');
    return `<tr>
      <td class="floor-cell">${esc(m.floor||'??)}</td>
      <td class="code-cell">${esc(m.material_code||'??)}</td>
      <td>${esc(m.material_name||'')}</td>
      <td>${esc(catName(m.category_id)||'??)}</td>
      <td>${esc(m.model||m.specification||'??)}</td>
      <td>${esc(m.brand||'??)}</td>
      <td><span class="pill ${m.status==='active'?'on':'off'}">${m.status==='active'?'?ҹз”Ё':'?ңз”Ё'}</span></td>
      <td>${m.current_stock==null?'??:`<span class="${low?'stk-low':''}">${m.current_stock}</span>`} / ${m.safety_stock==null?'??:m.safety_stock}</td>
      <td>${m.inspection_required?'<span class="pill on">?Җ</span>':'<span class="pill">??/span>'}</td>
      <td>${files}</td>
      <td><span class="act" onclick="showQR('${m.material_id}')">??QR</span></td>
      <td><span class="act" onclick="openEdit('${m.material_id}')">з·ЁијҜ</span><span class="act del" onclick="delMaterial('${m.material_id}')">?ӘйҷӨ</span></td>
    </tr>`;
  }).join('');
  document.getElementById('pInfo').textContent=`??${list.length} зӯ?В· жҜҸй? ${PER} зӯҶ`;
  document.getElementById('pNum').textContent=`${page} / ${pages}`;
  document.getElementById('pPrev').disabled=page<=1;
  document.getElementById('pNext').disabled=page>=pages;
}
function goPage(p){const pages=Math.max(1,Math.ceil(filtered().length/PER));page=Math.min(Math.max(1,p),pages);render();}

// ?Җ?Җ иЎЁе–®е»әз? ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ
function buildForm(m){
  const box=document.getElementById('mForm');
  const filed=editId?fmtDate(m.created_at):todayISO();   // еЎ«иЎЁ?Ҙж?пјҲзөұдёҖ YYYY-MM-DDпј?
  const header=`<div style="display:flex;justify-content:flex-end;gap:6px;font-size:.72rem;color:var(--text-dim);margin-bottom:8px">еЎ«иЎЁ?Ҙж?пј?b style="color:var(--cyan);font-family:'Share Tech Mono',monospace">${filed}</b></div>`;
  box.innerHTML=header+GROUPS.map((g,gi)=>{
    const fields=g.f.map(([k,lab,type])=>{
      const v=m[k];
      let ctrl;
      if(type==='cat') ctrl=`<select id="fx-${k}" onchange="autoCode()"><option value="">??/option>`+cats.map(c=>`<option value="${c.category_id}" ${v===c.category_id?'selected':''}>${esc(c.name)}</option>`).join('')+`</select>`;
      else if(type==='space') ctrl=`<select id="fx-${k}"><option value="">??/option>`+spaces.slice().sort((a,b)=>floorOrder(a.floor)-floorOrder(b.floor)).map(s=>`<option value="${s.space_id}" ${v===s.space_id?'selected':''}>${esc(s.floor)} В· ${esc(s.space_name)}</option>`).join('')+`</select>`;
      else if(type==='floor') ctrl=`<input id="fx-${k}" list="floorDL" value="${esc(v||'')}" onchange="autoCode()">`;
      else if(type==='status') ctrl=`<select id="fx-${k}"><option value="active" ${v!=='inactive'?'selected':''}>?ҹз”Ё</option><option value="inactive" ${v==='inactive'?'selected':''}>?ңз”Ё</option></select>`;
      else if(type==='bool') ctrl=`<select id="fx-${k}"><option value="false" ${!v?'selected':''}>??/option><option value="true" ${v?'selected':''}>??/option></select>`;
      else if(type==='level') ctrl=`<select id="fx-${k}"><option value="">??/option>`+['дҪ?,'дё?,'й«?,'жҘөй?'].map(o=>`<option ${v===o?'selected':''}>${o}</option>`).join('')+`</select>`;
      else if(type==='area') ctrl=`<textarea id="fx-${k}">${esc(v||'')}</textarea>`;
      else if(type==='ro') ctrl=`<input id="fx-${k}" value="${esc(v||'')}" readonly placeholder="?ёе?йЎһи?жЁ“еұӨеҫҢиҮӘ?•з”ў??>`;
      else ctrl=`<input id="fx-${k}" type="${type==='num'?'number':type==='date'?'date':'text'}" value="${esc(v==null?'':v)}">`;
      const wide=(type==='area')?' wide':'';
      return `<div class="fld${wide}"><label>${esc(lab)}</label>${ctrl}</div>`;
    }).join('');
    return `<div class="grp${gi>0?' collapsed':''}"><div class="grp-h" onclick="this.parentNode.classList.toggle('collapsed')"><span class="cv">??/span>${esc(g.t)}</div><div class="grp-b">${fields}</div></div>`;
  }).join('')+`<datalist id="floorDL">${[...new Set([...spaces.map(s=>s.floor),'B1','1F','2F','3F','4F','RF'])].map(f=>`<option>${esc(f)}</option>`).join('')}</datalist>`;
}
function fval(k){const el=document.getElementById('fx-'+k);return el?el.value:'';}
// ?җж?з·Ёи??ҸијҜпјҡе?йЎһд»Јзў?жЁ“еұӨ-жөҒж°ҙ?ҹп?ELE-B1-0001пј?
function autoCode(){
  if(editId) return;                    // з·ЁијҜ?Ӯд??№и?
  const cat=catCode(fval('category_id')), fl=(fval('floor')||'NA').toUpperCase().replace(/\s/g,'');
  if(!fval('category_id')||!fval('floor')){document.getElementById('fx-material_code').value='';return;}
  const pre=`${cat}-${fl}-`;
  let max=0; mats.forEach(m=>{if((m.material_code||'').startsWith(pre)){const n=parseInt((m.material_code.split('-')[2]||'0'),10);if(n>max)max=n;}});
  document.getElementById('fx-material_code').value=pre+String(max+1).padStart(4,'0');
}
function openAdd(){editId=null;document.getElementById('mTitle').textContent='?°е??җж?';document.getElementById('mMsg').textContent='';buildForm({status:'active'});show('m-edit');}
function openEdit(id){const m=mats.find(x=>x.material_id===id);if(!m)return;editId=id;document.getElementById('mTitle').textContent='з·ЁијҜ?җж? '+(m.material_code||'');document.getElementById('mMsg').textContent='';buildForm(m);show('m-edit');}

async function saveMaterial(){
  const msg=document.getElementById('mMsg');
  const name=fval('material_name').trim();
  if(!name){msg.textContent='и«Ӣијё?Ҙж??ҷе?зЁ?;return;}
  const rec={};
  GROUPS.forEach(g=>g.f.forEach(([k,,type])=>{
    let v=fval(k); if(type==='ro'&&k==='material_code') v=fval('material_code');
    if(v==='') { rec[k]=null; return; }
    if(type==='num') rec[k]=Number(v);
    else if(type==='bool') rec[k]=(v==='true');
    else rec[k]=v;
  }));
  if(!rec.material_code){ // дҝқе??Әе??ўз?
    const cat=catCode(rec.category_id), fl=(rec.floor||'NA');
    const pre=`${cat}-${fl}-`; let max=0; mats.forEach(m=>{if((m.material_code||'').startsWith(pre)){const n=parseInt((m.material_code.split('-')[2]||'0'),10);if(n>max)max=n;}});
    rec.material_code=pre+String(max+1).padStart(4,'0');
  }
  let error;
  if(editId){({error}=await db.from('materials').update(rec).eq('material_id',editId));}
  else{({error}=await db.from('materials').insert(rec));}
  if(error){msg.textContent=(error.code==='23505'?'?җж?з·Ёи??Қи?':'?Іе?еӨұж?пј?+translateError(error.message));return;}
  closeM('m-edit');toast(editId?'е·Іжӣҙ??:'е·Іж–°еў?);await load();
}
async function delMaterial(id){const m=mats.find(x=>x.material_id===id);if(!m)return;
  if(!confirm(`зўәе??ӘйҷӨ??{m.material_code||''} ${m.material_name}?Қп?`))return;
  const {error}=await db.from('materials').delete().eq('material_id',id);
  if(error){toast('?ӘйҷӨеӨұж?пј?+translateError(error.message),true);return;}
  toast('е·ІеҲӘ??);await load();
}

// ?Җ?Җ QRпјҡж??Ҹе??‘иЁӯ?ҷйҖ??жӘ”п?CAD/иҰҸж ј???Ӣе??Ұп?пјҢз„ЎжӘ”е?е°Һе??Һзҙ° ?Җ?Җ
function qrTargetOf(m){
  return m.cad_file_url||m.datasheet_url||m.manual_url||m.bim_file_url||m.product_image||
    (location.origin+location.pathname+'?m='+encodeURIComponent(m.material_code||m.material_id));
}
function showQR(id){
  const m=mats.find(x=>x.material_id===id);if(!m)return;
  qrTargetUrl=qrTargetOf(m);
  document.getElementById('qrCode').textContent=m.material_code||m.material_name;
  document.getElementById('qrLink').textContent=qrTargetUrl;
  const box=document.getElementById('qrimg');box.innerHTML='';
  new QRCode(box,{text:qrTargetUrl,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});
  show('m-qr');
}
function openQrTarget(){if(qrTargetUrl)window.open(qrTargetUrl,'_blank','noopener');}

// ?ҜеҮә/?Ҝе…Ҙ?ұз”Ёж¬„д?пјҲй?еәҸд??ҙп??№дҫҝ?ҜеҮәеҫҢдҝ®?№е??Ҝе…Ҙпј?
const IE_COLS=['floor','material_code','material_name','material_alias','category','sub_category','material_type','status',
  'brand','manufacturer','model','specification','unit','purchase_price','currency','safety_stock','current_stock',
  'storage_location','shelf','inspection_required','inspection_cycle','maintenance_cycle','critical_level','risk_level',
  'cad_file_url','datasheet_url','manual_url','qr_code','remark'];
const IE_HEAD=['жЁ“еұӨ','?җж?з·Ёи?','?ҚзЁұ','?Ҙе?','?Ҷй?','еӯҗе?йЎ?,'йЎһе?','?Җ??,'?Ғз?','иЈҪйҖ е?','?Ӣи?','иҰҸж ј','?®д?','?Ўиіј?®еғ№','е№?ҲҘ',
  'е®үе…Ёеә«е?','?®е?еә«е?','?Ід?','иІЁжһ¶','?Җе·ЎжӘў','е·ЎжӘў?ұж?','дҝқй??ұж?','?Қи?зЁӢеәҰ','йўЁйҡӘзӯүз?','CAD','иҰҸж ј??,'?Ӣе?','QR','?ҷиЁ»'];
const NUM_FIELDS=new Set(['purchase_price','safety_stock','current_stock','maximum_stock','minimum_stock','lead_time']);

function exportXLSX(fmt){
  fmt=fmt||'xlsx';
  const rows=filtered().map(m=>IE_COLS.map(c=>c==='category'?catName(m.category_id):(c==='inspection_required'?(m[c]?'??:'??):(c==='status'?(m[c]==='inactive'?'?ңз”Ё':'?ҹз”Ё'):(m[c]==null?'':m[c])))));
  const ws=XLSX.utils.aoa_to_sheet([IE_HEAD,...rows]);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'MaterialMaster');
  XLSX.writeFile(wb,`иЁӯе??җж?дё»ж?_${todayISO()}.${fmt}`,{bookType:fmt});
  toast('е·ІеҢҜ??'+fmt.toUpperCase());
}
function downloadTemplate(){
  const sample=['B1','ELE-B1-0001','зҜ„д?пјҡд?еЈ“й??»зӣӨ','','?»ж°Ј?җж?','','иЁӯе?','?ҹз”Ё','?Ғз?A','иЈҪйҖ е?A','?Ӣи?X','иҰҸж јиӘӘж?','??,'120000','TWD','1','2','B1?Қйӣ»е®?,'A-01','??,'жҜҸж?','жҜҸеӯЈ','й«?,'дё?,'','','','','зҜ„д??ҷиЁ»'];
  const ws=XLSX.utils.aoa_to_sheet([IE_HEAD,sample]);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'MaterialMaster');

// ?Җ?Җ ?ҙз??Ҝе…ҘпјҲXLSX / CSVпјүв??Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ?Җ
function catIdByName(n){const c=cats.find(x=>x.name===String(n).trim()||x.code===String(n).trim().toUpperCase());return c?c.category_id:null;}
function onImportFile(ev){
  const file=ev.target.files[0];ev.target.value='';if(!file)return;
  const r=new FileReader();
  r.onload=async e=>{try{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    await importAoa(XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false}));
  }catch(err){toast('?Ҝе…ҘеӨұж?пј?+translateError(err.message),true);}};
  r.readAsArrayBuffer(file);
}
async function importAoa(aoa){
  if(!aoa||aoa.length<2){toast('жӘ”ж??Ўи??ҷе?',true);return;}
  const head=aoa[0].map(c=>String(c||'').trim());
  // жЁҷй? ??ж¬„д?зҙўе?пјҲд?дёӯж?жЁҷй?е°Қж?пјӣжүҫдёҚеҲ°е°ұз”Ёж¬„д??Ҷе?пј?
  const idx={};
  IE_HEAD.forEach((h,i)=>{const p=head.indexOf(h);idx[IE_COLS[i]]=(p>=0?p:i);});
  const seqCounter={};                       // ?ўз??°з·Ё?ҹз”Ё
  const nextCode=(cat,fl)=>{const pre=`${cat||'OTH'}-${(fl||'NA').toUpperCase().replace(/\s/g,'')}-`;
    if(seqCounter[pre]==null){let mx=0;mats.forEach(m=>{if((m.material_code||'').startsWith(pre)){const n=parseInt(m.material_code.split('-')[2]||'0',10);if(n>mx)mx=n;}});seqCounter[pre]=mx;}
    return pre+String(++seqCounter[pre]).padStart(4,'0');};
  const withCode=[], noCode=[];
  for(let i=1;i<aoa.length;i++){
    const row=aoa[i]||[]; const g=k=>{const v=row[idx[k]];return v==null?'':String(v).trim();};
    const name=g('material_name'); if(!name)continue;
    const rec={material_name:name};
    IE_COLS.forEach(c=>{if(c==='material_name'||c==='category')return;let v=g(c);if(v==='')return;
      if(c==='status')rec[c]=(v==='?ңз”Ё'||v.toLowerCase()==='inactive')?'inactive':'active';
      else if(c==='inspection_required')rec[c]=/^(?Ҝ|Y|yes|true|?Җ|1)$/i.test(v);
      else if(NUM_FIELDS.has(c))rec[c]=Number(v);
      else rec[c]=v;});
    const catId=catIdByName(g('category')); if(catId)rec.category_id=catId;
    if(!rec.status)rec.status='active';
    if(!rec.material_code){rec.material_code=nextCode(catCode(rec.category_id),rec.floor);noCode.push(rec);}
    else withCode.push(rec);
  }
  if(!withCode.length&&!noCode.length){toast('?Әи??–еҲ°?үж?иіҮж?',true);return;}
  let ok=0,err=null;
  if(withCode.length){const {error}=await db.from('materials').upsert(withCode,{onConflict:'material_code'});if(error)err=error;else ok+=withCode.length;}
  if(noCode.length){const {error}=await db.from('materials').insert(noCode);if(error)err=error;else ok+=noCode.length;}
  if(err){toast('?Ҝе…Ҙ?Ёе?еӨұж?пј?+translateError(err.message),true);}
  else toast(`е·ІеҢҜ??${ok} зӯҶ`);
  await load();
}

function show(id){document.getElementById(id).classList.add('show');}
function closeM(id){document.getElementById(id).classList.remove('show');}
document.getElementById('m-edit').addEventListener('click',e=>{if(e.target.id==='m-edit')closeM('m-edit');});
document.getElementById('m-qr').addEventListener('click',e=>{if(e.target.id==='m-qr')closeM('m-qr');});
load();
