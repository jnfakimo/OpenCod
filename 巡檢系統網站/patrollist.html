<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('siteTheme')||'tech');</script>
<script src="theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>巡邏點清單 — 臺北農產巡檢系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#020b18;--surface:#04111f;--panel:#05101e;--border:#0c2840;--border-hi:#1a4a70;
  --cyan:#00d4ff;--cyan-glow:0 0 14px rgba(0,212,255,.5);--blue:#1a7fff;--patrol:#c77dff;
  --text:#a8d8f0;--text-hi:#d4eeff;--text-dim:#3a6a8a;
  --font-head:'Rajdhani',sans-serif}
:root[data-theme="light"]{--bg:#f4f6fa;--surface:#ffffff;--panel:#ffffff;--border:#dbe4ee;--border-hi:#93b4d6;--cyan:#0284c7;--cyan-glow:none;--blue:#2563eb;--patrol:#9333ea;--text:#1e293b;--text-hi:#0f172a;--text-dim:#64748b}
/* light mode overrides */
:root[data-theme="light"] body{background-image:none}
:root[data-theme="light"] .navbar{background:rgba(255,255,255,.97)}
:root[data-theme="light"] .nav-title{text-shadow:none}
:root[data-theme="light"] .modal-bg{background:rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);
  background-image:linear-gradient(rgba(0,212,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.015) 1px,transparent 1px);
  background-size:40px 40px;color:var(--text);min-height:100vh;padding-bottom:40px}
a{color:inherit;text-decoration:none}

.navbar{background:rgba(3,10,22,.97);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;overflow-x:auto;overflow-y:hidden}
.navbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--patrol),var(--blue) 40%,transparent);opacity:.5}
.nav-title{font-family:var(--font-head);font-size:1.1rem;font-weight:700;
  color:var(--patrol);letter-spacing:.06em;text-shadow:0 0 14px rgba(199,125,255,.5)}
.nav-sub{font-size:.7rem;color:var(--text-dim)}
.nav-space{flex:1 0 auto}.navbar a{flex:0 0 auto}
.nav-back{font-size:.7rem;color:var(--text-dim);border:1px solid var(--border);
  padding:5px 10px;border-radius:2px;cursor:pointer;background:none;
  transition:all .2s;font-family:var(--font-head);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.nav-back:hover{border-color:var(--patrol);color:var(--patrol)}

.content{padding:14px 16px;max-width:1100px;margin:0 auto}

.hint{font-size:.72rem;color:var(--text-dim);margin-bottom:12px;line-height:1.6;
  background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--patrol);
  border-radius:2px;padding:9px 12px}

.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:2px;
  padding:10px 16px;min-width:120px}
.stat-card .n{font-family:var(--font-head);font-size:1.5rem;font-weight:700;color:var(--patrol)}
.stat-card .l{font-size:.68rem;color:var(--text-dim);letter-spacing:.05em;margin-top:2px}

.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.toolbar select,.toolbar input{background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:7px 10px;border-radius:2px;font-size:.78rem;
  font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s}
.toolbar select:focus,.toolbar input:focus{border-color:var(--patrol)}

.floor-block{background:var(--panel);border:1px solid var(--border);border-radius:3px;
  margin-bottom:12px;overflow:hidden}
.floor-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
  background:linear-gradient(90deg,rgba(199,125,255,.08),transparent);border-bottom:1px solid var(--border)}
.floor-head .caret{color:var(--patrol);font-size:.8rem;width:14px;transition:transform .2s}
.floor-head.collapsed .caret{transform:rotate(-90deg)}
.floor-head .fname{font-family:var(--font-head);font-size:1rem;font-weight:700;color:var(--text-hi);letter-spacing:.05em}
.floor-head .fcount{font-size:.7rem;color:var(--text-dim);background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:1px 9px}
.floor-body{padding:8px 10px}
.floor-head.collapsed + .floor-body{display:none}

.mk-row{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:2px;
  border:1px solid transparent;transition:all .15s}
.mk-row:hover{background:var(--surface);border-color:var(--border)}
.mk-row .dot{width:8px;height:8px;border-radius:50%;background:var(--patrol);
  box-shadow:0 0 0 1px rgba(255,255,255,.6);flex:none}
.mk-row .mname{flex:1;font-size:.85rem;color:var(--text)}
.mk-row .mnote{font-size:.72rem;color:var(--text-dim)}
.mk-row .mlast{font-size:.7rem;color:var(--text-dim);white-space:nowrap}
.mk-row .mlast.has{color:var(--green,#00ff9d)}
.mk-row .acts{display:flex;gap:6px}
.mini{font-size:.68rem;padding:3px 9px;border:1px solid var(--border);border-radius:2px;
  cursor:pointer;background:none;color:var(--text-dim);transition:all .2s}
.mini:hover{border-color:var(--patrol);color:var(--patrol)}

.empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:.85rem}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(1,6,14,.82);z-index:200;
  align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.qr-modal{background:var(--panel);border:1px solid var(--border-hi);border-radius:6px;
  padding:22px;text-align:center;max-width:280px;width:100%}
.qr-modal .x{float:right;cursor:pointer;color:var(--text-dim);font-size:1.1rem}
.qr-modal .x:hover{color:var(--patrol)}
.qr-modal #qrCanvas{margin:10px auto;display:flex;justify-content:center;background:#fff;padding:8px;border-radius:4px;width:fit-content}
.qr-modal .qname{font-family:var(--font-head);font-size:1rem;color:var(--text-hi);margin-bottom:2px}
.qr-modal .qfloor{font-size:.72rem;color:var(--text-dim);margin-bottom:6px}
.qr-modal .btn-row{display:flex;gap:8px;margin-top:12px}
.qr-modal .mini{flex:1;padding:7px}
</style>
<link rel="stylesheet" href="light-mode-fix.css">
</head>
<body>
<nav class="navbar">
  <div>
    <div class="nav-title">◆ 巡邏點清單</div>
    <div class="nav-sub">全樓層巡邏點標示彙總 · 臺北農產 第一果菜市場</div>
  </div>
  <div class="nav-space"></div>
  <a href="modeler.html"><button class="nav-back">3D建模系統</button></a>
  <a href="arealist.html"><button class="nav-back">區域位置表</button></a>
  <a href="b1_integrated_marker_system.html"><button class="nav-back">整合標記系統</button></a>
  <a href="patrollist.html"><button class="nav-back">巡邏點清單</button></a>
  <a href="admin.html#modelhub"><button class="nav-back">後台</button></a>
</nav>

<div class="content">

  <div class="hint">
    彙總所有樓層目前已放置的「巡邏點」標示（唯讀）。新增 / 編輯 / 刪除巡邏點，請至「整合標記系統」對應樓層平面圖操作。
    點選「定位」可直接跳轉到該巡邏點所在樓層平面圖。
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="n" id="s-floors">0</div><div class="l">涵蓋樓層數</div></div>
    <div class="stat-card"><div class="n" id="s-total">0</div><div class="l">巡邏點總數</div></div>
  </div>

  <div class="toolbar">
    <select id="flt-floor" onchange="render()"><option value="">全部樓層</option></select>
    <input id="flt-search" placeholder="搜尋巡邏點名稱／備註…" oninput="render()" style="width:220px">
    <div style="flex:1"></div>
    <button class="mini" style="padding:7px 12px" onclick="printAllQr()">🖶 列印全部 QR</button>
  </div>

  <div id="list"></div>
</div>

<div class="modal-bg" id="qrModal" onclick="if(event.target.id==='qrModal')closeQr()">
  <div class="qr-modal">
    <span class="x" onclick="closeQr()">✕</span>
    <div class="qname" id="qrName"></div>
    <div class="qfloor" id="qrFloor"></div>
    <div id="qrCanvas"></div>
    <div class="btn-row">
      <button class="mini" onclick="window.print()">🖶 列印</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL='https://qztffronusdhgxhjjubt.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dGZmcm9udXNkaGd4aGpqdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI1MzgsImV4cCI6MjA5NzI2ODUzOH0.FnUxot5YXI3yKCUCmJA5P4ysEJhmtaQQA6rM7MRy3oA';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
(async()=>{const {data:{session}}=await db.auth.getSession();if(!session){location.href='login.html';}})();
function translateError(msg) {
  if (!msg) return '未知錯誤';
  if (msg.includes('relation') && msg.includes('does not exist')) return '資料表不存在，請確認資料庫設定';
  if (msg.includes('permission denied')) return '無操作權限';
  if (msg.includes('violates row-level security')) return '無操作權限';
  if (msg.includes('JWT expired')) return '登入已過期，請重新整理頁面';
  if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('Load failed')) return '網路連線失敗，請稍後再試';
  return '操作失敗，請稍後再試或聯絡系統管理員';
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function floorOrder(f){
  const s=String(f||'').trim().toUpperCase();
  const b=s.match(/^B(\d+)$/);   if(b) return 100-parseInt(b[1],10);
  if(s==='RF'||s==='R')          return 900;
  const n=s.match(/^(\d+)F?$/);  if(n) return 100+parseInt(n[1],10);
  return 500;
}

let rows=[];
let lastCheckin=new Map(); // marker_id -> checkin_at (最近一次)
const collapsed=new Set();
let collapsedReady=false;
const CHECKIN_BASE=location.origin+location.pathname.replace(/patrollist\.html$/,'patrolcheckin.html');

function fmtTime(t){
  const d=new Date(t);
  const p=n=>String(n).padStart(2,'0');
  return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

async function load(){
  const {data,error}=await db.from('plan_markers').select('marker_id,floor_id,label,note,x,y')
    .eq('kind','patrol').eq('status','active').order('floor_id').order('label');
  if(error){
    document.getElementById('list').innerHTML='<div class="empty">讀取失敗：'+esc(translateError(error.message))+'</div>';
    return;
  }
  rows=data||[];
  buildFloorFilter();
  const floors=floorsSorted();
  [...collapsed].forEach(f=>{if(!floors.includes(f))collapsed.delete(f);});
  if(!collapsedReady){ collapsedReady=true; } // 預設全部展開

  lastCheckin=new Map();
  const {data:ck}=await db.from('checkin_logs').select('target_id,checkin_at')
    .eq('target_type','marker').order('checkin_at',{ascending:false}).limit(1000);
  (ck||[]).forEach(r=>{ if(!lastCheckin.has(r.target_id)) lastCheckin.set(r.target_id,r.checkin_at); });

  render();
}

function floorsSorted(){
  const set=[...new Set(rows.map(r=>r.floor_id))];
  return set.sort((a,b)=>floorOrder(a)-floorOrder(b));
}

function buildFloorFilter(){
  const sel=document.getElementById('flt-floor');const cur=sel.value;
  sel.innerHTML='<option value="">全部樓層</option>'+
    floorsSorted().map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join('');
  sel.value=cur;
}

function render(){
  const fFloor=document.getElementById('flt-floor').value;
  const q=document.getElementById('flt-search').value.trim().toLowerCase();
  let list=rows.slice();
  if(fFloor) list=list.filter(r=>r.floor_id===fFloor);
  if(q) list=list.filter(r=>(r.label||'').toLowerCase().includes(q)||(r.note||'').toLowerCase().includes(q));

  document.getElementById('s-floors').textContent=new Set(rows.map(r=>r.floor_id)).size;
  document.getElementById('s-total').textContent=rows.length;

  const box=document.getElementById('list');
  if(!list.length){box.innerHTML='<div class="empty">尚無巡邏點資料。<br>請至「整合標記系統」平面圖新增巡邏點標示。</div>';return;}

  const byFloor={};
  list.forEach(r=>{(byFloor[r.floor_id]=byFloor[r.floor_id]||[]).push(r);});
  const floors=Object.keys(byFloor).sort((a,b)=>floorOrder(a)-floorOrder(b));

  box.innerHTML=floors.map(f=>{
    const items=byFloor[f].sort((a,b)=>(a.label||'').localeCompare(b.label||'','zh-Hant'));
    const isC=collapsed.has(f);
    return `<div class="floor-block">
      <div class="floor-head${isC?' collapsed':''}" onclick="toggleFloor('${esc(f)}')">
        <span class="caret">▼</span>
        <span class="fname">${esc(f)}</span>
        <span class="fcount">${items.length} 個巡邏點</span>
      </div>
      <div class="floor-body">
        ${items.map(r=>{
          const lc=lastCheckin.get(r.marker_id);
          return `<div class="mk-row">
          <span class="dot"></span>
          <span class="mname">${esc(r.label)}</span>
          <span class="mnote">${esc(r.note||'')}</span>
          <span class="mlast${lc?' has':''}">${lc?'上次簽到 '+esc(fmtTime(lc)):'尚無簽到記錄'}</span>
          <span class="acts">
            <button class="mini" onclick="openQr('${esc(r.marker_id)}')">QR</button>
            <button class="mini" onclick="location.href='b1_integrated_marker_system.html?marker=${esc(r.marker_id)}'">定位</button>
          </span>
        </div>`;}).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleFloor(f){collapsed.has(f)?collapsed.delete(f):collapsed.add(f);render();}

// ── QR code ────────────────────────────────────────────────
function makeQrDataUrl(text,size){
  const tmp=document.createElement('div');
  new QRCode(tmp,{text:text,width:size,height:size,correctLevel:QRCode.CorrectLevel.M});
  const canvas=tmp.querySelector('canvas');
  return canvas?canvas.toDataURL('image/png'):'';
}

function openQr(markerId){
  const r=rows.find(x=>x.marker_id===markerId); if(!r)return;
  document.getElementById('qrName').textContent=r.label;
  document.getElementById('qrFloor').textContent=r.floor_id;
  const url=CHECKIN_BASE+'?marker='+encodeURIComponent(markerId);
  const box=document.getElementById('qrCanvas');
  box.innerHTML='';
  new QRCode(box,{text:url,width:180,height:180,correctLevel:QRCode.CorrectLevel.M});
  document.getElementById('qrModal').classList.add('show');
}
function closeQr(){document.getElementById('qrModal').classList.remove('show');}

function printAllQr(){
  if(!rows.length){alert('目前沒有巡邏點可列印');return;}
  const win=window.open('','_blank');
  if(!win){alert('請允許彈出視窗以列印');return;}
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>巡邏點 QR 標籤</title><style>'+
    'body{font-family:"Noto Sans TC",sans-serif;margin:0;padding:16px}'+
    '.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}'+
    '.tag{border:1px dashed #999;border-radius:6px;padding:12px;text-align:center;page-break-inside:avoid}'+
    '.tag img{width:140px;height:140px}'+
    '.tag .n{font-size:14px;font-weight:700;margin-top:6px}'+
    '.tag .f{font-size:11px;color:#666}'+
    '@media print{.tag{border:1px solid #ccc}}'+
    '
</style></head><body><div class="grid" id="g"></div></body></html>');
  win.document.close();
  const g=win.document.getElementById('g');
  const sorted=rows.slice().sort((a,b)=>(floorOrder(a.floor_id)-floorOrder(b.floor_id))||(a.label||'').localeCompare(b.label||'','zh-Hant'));
  sorted.forEach(r=>{
    const url=CHECKIN_BASE+'?marker='+encodeURIComponent(r.marker_id);
    const dataUrl=makeQrDataUrl(url,280);
    const tag=win.document.createElement('div');
    tag.className='tag';
    tag.innerHTML='<img><div class="n"></div><div class="f"></div>';
    tag.querySelector('img').src=dataUrl;
    tag.querySelector('.n').textContent=r.label;
    tag.querySelector('.f').textContent=r.floor_id;
    g.appendChild(tag);
  });
  win.focus();
}

load();
</script>
</body>
</html>
