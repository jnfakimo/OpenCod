<style>

:root[data-theme="light"]{--bg:#f4f6fa;--surface:#ffffff;--panel:#ffffff;--border:#dbe4ee;--border-hi:#93b4d6;--cyan:#0284c7;--blue:#2563eb;--green:#059669;--amber:#b45309;--red:#dc2626;--purple:#7c3aed;--text:#1e293b;--text-hi:#0f172a;--text-dim:#64748b}
/* light mode overrides */
:root[data-theme="light"] body{background-image:none}
:root[data-theme="light"] .navbar{background:rgba(255,255,255,.97)}
:root[data-theme="light"] .nav-title{text-shadow:none}
:root[data-theme="light"] .modal{background:#ffffff;border-color:#e2e8f0}
:root[data-theme="light"] .date-picker{background:#ffffff;border-color:#e2e8f0;box-shadow:0 16px 36px rgba(0,0,0,.12)}

:root[data-theme="light"] .th-filter select{background:#f8fafc;border-color:#cbd5e1;color:#1e293b}
:root[data-theme="light"] .page-btn{background:#f8fafc;border-color:#cbd5e1;color:#1e293b}

:root[data-theme="light"] .date-actions .confirm{color:#001521}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
a{color:inherit;text-decoration:none}
.navbar{background:rgba(3,10,22,.97);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.nav-title{font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:var(--cyan);letter-spacing:.06em;text-shadow:0 0 14px rgba(0,212,255,.5)}
.nav-sub{font-size:.7rem;color:var(--text-dim)}.nav-space{flex:1}
.nav-back{font-size:.7rem;color:var(--text-dim);border:1px solid var(--border);padding:5px 10px;border-radius:2px;cursor:pointer;background:none;transition:all .2s}
.nav-back:hover{border-color:var(--cyan);color:var(--cyan)}
.wrap{max-width:1180px;margin:0 auto;padding:14px 16px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.toolbar select,.toolbar input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:2px;font-size:.76rem;outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:var(--cyan)}
.tspace{flex:1}
.btn-add{background:rgba(0,212,255,.1);border:1px solid var(--cyan);color:var(--cyan);padding:7px 16px;border-radius:2px;cursor:pointer;font-size:.76rem;font-family:var(--font-head);letter-spacing:.04em;transition:all .2s}
.btn-add:hover{background:rgba(0,212,255,.2)}
.stat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{font-size:.7rem;padding:5px 11px;border:1px solid var(--border);border-radius:14px;cursor:pointer;color:var(--text-dim);background:var(--panel);transition:all .15s}
.chip:hover{border-color:var(--border-hi)}
.chip.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
.chip b{color:var(--text-hi);margin-left:4px}
.table-scroll{width:100%;overflow-x:auto}
table{width:100%;min-width:780px;border-collapse:collapse;font-size:.76rem}
thead th{text-align:left;color:var(--text-dim);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border);font-size:.7rem;letter-spacing:.04em;white-space:nowrap}
tbody td{padding:9px 10px;border-bottom:1px solid rgba(12,40,64,.5)}
tbody tr{cursor:pointer;transition:background .15s}
tbody tr:hover{background:rgba(0,212,255,.04)}
.th-filter{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.th-filter select{width:120px;max-width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:2px;font-size:.68rem;outline:none}
.th-filter select:focus{border-color:var(--cyan)}
.req-no{font-family:var(--font-mono);color:var(--cyan);font-size:.72rem;white-space:nowrap;word-break:keep-all;min-width:118px}
.pager{display:flex;align-items:center;justify-content:flex-end;gap:7px;margin-top:12px;flex-wrap:wrap;color:var(--text-dim);font-size:.72rem}
.page-btn{min-width:32px;height:30px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:2px;cursor:pointer;font-family:var(--font-head);font-weight:700}
.page-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.page-btn.on{background:rgba(0,212,255,.16);border-color:var(--cyan);color:var(--cyan)}
.page-btn:disabled{opacity:.35;cursor:not-allowed;border-color:var(--border);color:var(--text-dim)}
.page-info{margin-right:auto}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.66rem;font-weight:700;white-space:nowrap}
.urg{font-size:.64rem;padding:1px 7px;border-radius:8px;font-weight:700}
.urg-urgent{background:rgba(255,59,59,.15);color:var(--red);border:1px solid rgba(255,59,59,.4)}
.urg-high{background:rgba(255,179,0,.12);color:var(--amber);border:1px solid rgba(255,179,0,.35)}
.urg-normal{background:rgba(58,106,138,.12);color:var(--text-dim)}
.empty{text-align:center;color:var(--text-dim);padding:36px;font-size:.82rem}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(1,5,15,.86);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow:auto}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border-hi);border-radius:5px;padding:0;width:100%;max-width:640px;position:relative;margin:auto}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:5px 5px 0 0}
.modal-h{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-h .t{font-family:var(--font-head);font-size:1.05rem;color:var(--cyan);font-weight:700;letter-spacing:.04em}
.modal-h .x{margin-left:auto;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem}
.modal-h .x:hover{color:var(--text)}
.modal-b{padding:18px 20px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.68rem;color:var(--text-dim);margin-bottom:5px;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:2px;font-size:.8rem;outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan)}
.field textarea{min-height:64px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.date-field{position:relative}
.date-field input[readonly]{cursor:pointer;color:var(--text-hi)}
.date-picker{display:none;width:268px;max-width:calc(100vw - 24px);padding:12px;background:#02101d;border:1px solid var(--border-hi);box-shadow:0 16px 36px rgba(0,0,0,.38);position:fixed;left:12px;top:12px;z-index:260}
.date-picker.show{display:block}
.date-head{display:grid;grid-template-columns:34px 1fr 34px;align-items:center;margin-bottom:8px}
.date-title{text-align:center;color:var(--text-hi);font-size:.8rem;font-weight:700;letter-spacing:.04em}
.date-nav{height:30px;border:0;background:transparent;color:var(--cyan);font-size:1.05rem;cursor:pointer}
.date-nav:hover{background:rgba(0,212,255,.08)}
.date-week,.date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.date-week span{height:25px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:.68rem}
.date-cell{height:29px;border:0;background:transparent;color:var(--text);font-family:var(--font-mono);font-size:.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.date-cell:hover{background:rgba(0,212,255,.12);color:var(--cyan)}
.date-cell.today{box-shadow:inset 0 0 0 1px rgba(0,212,255,.4)}
.date-cell.selected{background:var(--cyan);color:#001521;font-weight:700;box-shadow:0 0 14px rgba(0,212,255,.42)}
.date-cell.empty{cursor:default;pointer-events:none}
.date-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.date-actions button{height:34px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-family:var(--font-head);font-weight:700;letter-spacing:.04em;cursor:pointer}
.date-actions button:hover{border-color:var(--cyan);color:var(--cyan)}
.date-actions .confirm{background:var(--cyan);border-color:var(--cyan);color:#001521}
.date-actions .confirm:hover{color:#001521;filter:brightness(1.06)}
.btn-primary{padding:10px 16px;background:rgba(0,212,255,.12);border:1px solid var(--cyan);color:var(--cyan);border-radius:2px;cursor:pointer;font-size:.8rem;font-family:var(--font-head);letter-spacing:.05em;transition:all .2s}
.btn-primary:hover{background:rgba(0,212,255,.22)}
.msg{font-size:.72rem;text-align:center;padding:5px;min-height:1.3em;white-space:pre-wrap;line-height:1.5}
.msg.ok{color:var(--green)}.msg.err{color:var(--red)}
/* detail */
.d-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:.76rem;margin-bottom:14px}
.d-info .k{color:var(--text-dim)}.d-info .v{color:var(--text-hi)}
.d-info .full{grid-column:1/3}
.sect{font-family:var(--font-head);font-size:.82rem;color:var(--cyan);letter-spacing:.05em;margin:14px 0 8px;border-bottom:1px solid var(--border);padding-bottom:5px}
.atts{display:flex;flex-wrap:wrap;gap:8px}
.att{font-size:.7rem;color:var(--blue);border:1px solid var(--border);padding:4px 8px;border-radius:2px}
.att img{max-width:90px;max-height:70px;display:block;border-radius:2px}
/* timeline */
.tl{list-style:none;padding:0;margin:0}
.tl li{position:relative;padding:0 0 12px 20px;border-left:1px solid var(--border)}
.tl li::before{content:'';position:absolute;left:-5px;top:2px;width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.tl .ts{font-size:.66rem;color:var(--text-dim);font-family:var(--font-mono)}
.tl .st{font-size:.78rem;color:var(--text-hi);font-weight:600}
.tl .nt{font-size:.72rem;color:var(--text)}
.tl .op{font-size:.66rem;color:var(--text-dim)}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.abtn{padding:8px 14px;border-radius:2px;cursor:pointer;font-size:.76rem;font-family:var(--font-head);letter-spacing:.04em;border:1px solid;transition:all .2s;background:none}
.a-primary{border-color:var(--cyan);color:var(--cyan)}.a-primary:hover{background:rgba(0,212,255,.15)}
.a-warn{border-color:var(--amber);color:var(--amber)}.a-warn:hover{background:rgba(255,179,0,.12)}
.a-danger{border-color:var(--red);color:var(--red)}.a-danger:hover{background:rgba(255,59,59,.12)}
.a-ok{border-color:var(--green);color:var(--green)}.a-ok:hover{background:rgba(0,255,157,.12)}
.subform{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:12px;margin-top:10px;display:none}
.subform.show{display:block}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border-hi);color:var(--text);padding:10px 20px;border-radius:4px;font-size:.78rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

</style>

  if (msg.includes('JWT expired')) return '登入已過期，請重新整理頁面';
  if (msg.includes('relation') && msg.includes('does not exist')) return '資料表不存在，請確認資料庫設定';
  if (msg.includes('value too long')) return '輸入值過長';
  if (msg.includes('invalid input syntax')) return '輸入格式不正確';
  if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('Load failed')) return '網路連線失敗，請稍後再試';
  return '操作失敗，請稍後再試或聯絡系統管理員';
}
async function notifyLineRepair(record) {
  try {
    const res = await fetch(`${SUPA_URL}/functions/v1/line-notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPA_KEY}` },
      body: JSON.stringify({ table: 'repair_requests', record }),
    });
    const body = await res.json().catch(() => ({}));
    if (!res.ok || body.ok === false) {
      console.warn('LINE repair notification failed:', body.msg || res.status);
    }
    return body;
  } catch (e) {
    console.warn('LINE repair notification failed:', e?.message || e);
    return { ok: false, msg: e?.message || String(e) };
  }
}

function normalizeRoleId(user){const role=user?.rbac_role||user?.role;if(RBAC_ROLES[role])return role;return LEGACY_TO_RBAC[role]||'reporter';}

async function hydrateOperatorDepartment(){
  const explicit=normalizeDepartmentName(me_?.departmentName || me_?.department || me_?.dep || sessionStorage.getItem('user_department') || '');
  if(explicit){me_.departmentName=explicit;sessionStorage.setItem('user_department',explicit);return;}
  if(!me_?.dept_id)return;
  try{
    const {data}=await db.from('departments').select('dept_id,name,parent_id').eq('status','active').limit(1000);
    const map=Object.fromEntries((data||[]).map(d=>[d.dept_id,d]));
    const path=[];let cur=map[me_.dept_id],guard=0;
    while(cur&&guard++<8){path.unshift(cur.name);cur=cur.parent_id?map[cur.parent_id]:null;}
    me_.departmentName=normalizeDepartmentName(path.filter(Boolean).join(' / '));
    if(me_.departmentName)sessionStorage.setItem('user_department',me_.departmentName);
  }catch(e){}
}
async function hydrateOperatorProfile(){
  if(me_?.user_id && me_?.phone && operatorDepartment())return;
  try{

      const res=await db.from('users').select('user_id,username,name,phone,dept_id,department,role,rbac_role').eq('user_id',me_.user_id).limit(1).maybeSingle();
      data=res.data||null;
    }
    if(!data && me_?.username){
      const res=await db.from('users').select('user_id,username,name,phone,dept_id,department,role,rbac_role').eq('username',me_.username).eq('status','active').limit(1).maybeSingle();
      data=res.data||null;

      const res=await db.from('users').select('user_id,username,name,phone,dept_id,department,role,rbac_role').eq('name',operatorName()).eq('status','active').limit(1).maybeSingle();
      data=res.data||null;

    if(!data)return;
    me_={...me_,...data,name:cleanOperatorName(data.name||me_.name)};
    sessionStorage.setItem('user_name',me_.name);
    if(me_.username) sessionStorage.setItem('user_username',me_.username);

// 依登入帳號限縮案件範圍：一般報修人員→只看自己報修；維修技術人員→只看指派給自己

function driver(r){const o=ordersByReq[r.request_id];return o?o.status:r.status;}
function reqDateKey(r){
  const raw=String(r?.req_no||'').trim();
  let m=raw.match(/^RP(\d{4})(\d{2})(\d{2})-/i);
  if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  m=raw.match(/^(\d{4})-?(\d{2})-?(\d{2})-/);
  if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  const d=r?.created_at?new Date(r.created_at):new Date();
  if(!Number.isNaN(d.getTime()))return `${d.getFullYear()}-${two(d.getMonth()+1)}-${two(d.getDate())}`;
  return dateValue(new Date());
}
function reqSortTime(r){
  const t=new Date(r?.created_at||0).getTime();
  return Number.isFinite(t)?t:0;
}
function buildReqNoMap(){
  const groups={};
  reqs.forEach(r=>{
    const k=reqDateKey(r);
    if(!groups[k])groups[k]=[];
    groups[k].push(r);
  });
  reqNoDisplayMap={};
  Object.entries(groups).forEach(([date,items])=>{
    items.sort((a,b)=>reqSortTime(a)-reqSortTime(b)||String(a.request_id||'').localeCompare(String(b.request_id||'')));
    items.forEach((r,i)=>{
      if(r.request_id)reqNoDisplayMap[r.request_id]=`${date}-${String(i+1).padStart(3,'0')}`;
    });
  });
}
function displayReqNo(r){
  if(r?.request_id && reqNoDisplayMap[r.request_id])return reqNoDisplayMap[r.request_id];
  const raw=String(r?.req_no||'').trim();
  let m=raw.match(/^RP(\d{4})(\d{2})(\d{2})-(\d+)$/i);
  if(m)return `${m[1]}-${m[2]}-${m[3]}-${m[4].slice(-3).padStart(3,'0')}`;
  m=raw.match(/^(\d{4})-?(\d{2})-?(\d{2})-(\d+)$/);
  if(m)return `${m[1]}-${m[2]}-${m[3]}-${m[4].slice(-3).padStart(3,'0')}`;
  if(raw)return raw;
  if(r?.created_at){
    const d=new Date(r.created_at);
    return `${d.getFullYear()}-${two(d.getMonth()+1)}-${two(d.getDate())}-${String(r.request_id||'000').replace(/-/g,'').slice(-3).padStart(3,'0')}`;
  }
  return '—';
}

function renderPager(total,totalPages){
  const pager=document.getElementById('pager');
  if(!pager)return;
  if(!total){pager.innerHTML='';return;}
  const pages=[];
  for(let i=1;i<=totalPages;i++){
    if(totalPages<=7 || i===1 || i===totalPages || Math.abs(i-currentPage)<=1)pages.push(i);
    else if(pages[pages.length-1]!=='…')pages.push('…');
  }
  pager.innerHTML=`<span class="page-info">每頁 10 筆，第 ${currentPage} / ${totalPages} 頁，共 ${total} 筆</span>
    <button class="page-btn" onclick="gotoPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>
    ${pages.map(p=>p==='…'?'<span>…</span>':`<button class="page-btn ${p===currentPage?'on':''}" onclick="gotoPage(${p})">${p}</button>`).join('')}
    <button class="page-btn" onclick="gotoPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>`;
}
function gotoPage(page){
  currentPage=Math.max(1,Number(page)||1);
  renderList();
}
function renderList(){
  const q=(document.getElementById('fQ').value||'').toLowerCase();
  const type=document.getElementById('fType')?.value||'', dept=document.getElementById('fDept')?.value||'', status=document.getElementById('fStatus')?.value||'';
  const key=workorderFilterKey();
  if(lastFilterKey && key!==lastFilterKey)currentPage=1;
  lastFilterKey=key;
  saveWorkorderState();
  let rows=reqs.filter(r=>{
    const s=driver(r);
    if(filterStatus && s!==filterStatus) return false;
    if(status && s!==status) return false;
    if(type && (r.fault_type||'未填寫')!==type) return false;
    if(dept && (r.department||'未填寫')!==dept) return false;
    if(q){const hay=[displayReqNo(r),(r.req_no||''),(r.fault_type||''),(r.department||''),(r.fault_desc||'')].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  const tb=document.getElementById('list');
  if(!rows.length){tb.innerHTML='<tr><td colspan="6" class="empty">無符合案件</td></tr>';renderPager(0,1);return;}
  const totalPages=Math.max(1,Math.ceil(rows.length/PAGE_SIZE));
  if(currentPage>totalPages)currentPage=totalPages;
  if(currentPage<1)currentPage=1;
  const pageRows=rows.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
  tb.innerHTML=pageRows.map(r=>{
    const s=driver(r);
    return `<tr onclick="openDetail('${r.request_id}')">
      <td class="req-no">${escHtml(displayReqNo(r))}</td>
      <td>${escHtml(r.fault_type||'—')}</td>
      <td>${escHtml(r.department||'—')}</td>
      <td>${badge(s)}</td>
      <td style="color:var(--text-dim);font-size:.72rem">${fmt(r.created_at)}</td>
      <td style="color:var(--cyan)">檢視 ›</td></tr>`;
  }).join('');
  renderPager(rows.length,totalPages);
}

function fmt(t){if(!t)return'—';const d=new Date(t);return `${(d.getMonth()+1)}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
// 全系統統一日期格式：西元 YYYY-MM-DD
function fmtDate(t){if(!t)return'—';const m=String(t).match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return `${m[1]}-${m[2]}-${m[3]}`;const d=new Date(t);if(isNaN(d))return String(t).slice(0,10);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
let desiredViewDate=new Date(), desiredDraft='';
function two(n){return String(n).padStart(2,'0');}
function dateValue(d){return `${d.getFullYear()}-${two(d.getMonth()+1)}-${two(d.getDate())}`;}
function parseDateValue(v){
  const m=String(v||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m?new Date(Number(m[1]),Number(m[2])-1,Number(m[3])):null;
}

function closeDesiredCalendar(){document.getElementById('desiredPicker')?.classList.remove('show');}
function placeDesiredCalendar(){
  const picker=document.getElementById('desiredPicker'), input=document.getElementById('c-desired-view');
  if(!picker||!input||!picker.classList.contains('show'))return;
  const margin=12, rect=input.getBoundingClientRect();
  const width=Math.min(268,window.innerWidth-(margin*2));
  picker.style.width=`${width}px`;
  const height=picker.offsetHeight;
  let left=Math.min(Math.max(rect.left,margin),window.innerWidth-width-margin);
  let top=rect.top-height-7;
  if(top<margin)top=rect.bottom+7;
  if(top+height>window.innerHeight-margin)top=Math.max(margin,window.innerHeight-height-margin);
  picker.style.left=`${left}px`;
  picker.style.top=`${top}px`;
}
function shiftDesiredMonth(delta){
  desiredViewDate=new Date(desiredViewDate.getFullYear(),desiredViewDate.getMonth()+delta,1);
  renderDesiredCalendar();
  placeDesiredCalendar();
}
function selectDesiredDate(v){desiredDraft=v;renderDesiredCalendar();placeDesiredCalendar();}
function clearDesiredDate(){
  const hidden=document.getElementById('c-desired');
  if(hidden)hidden.value='';
  desiredDraft='';
  syncDesiredDateView();
  closeDesiredCalendar();
}
function confirmDesiredDate(){
  const hidden=document.getElementById('c-desired');
  if(hidden)hidden.value=desiredDraft||'';
  syncDesiredDateView();
  closeDesiredCalendar();
}
function renderDesiredCalendar(){
  const title=document.getElementById('desiredMonthTitle'), grid=document.getElementById('desiredDateGrid');
  if(!title||!grid)return;
  const y=desiredViewDate.getFullYear(), m=desiredViewDate.getMonth();
  title.textContent=`${y} 年 ${m+1} 月`;
  const first=new Date(y,m,1), last=new Date(y,m+1,0).getDate(), today=dateValue(new Date());
  let html='';
  for(let i=0;i<first.getDay();i++) html+='<span class="date-cell empty"></span>';
  for(let d=1;d<=last;d++){
    const v=dateValue(new Date(y,m,d));
    const cls=['date-cell',v===today?'today':'',v===desiredDraft?'selected':''].filter(Boolean).join(' ');
    html+=`<button type="button" class="${cls}" onclick="selectDesiredDate('${v}')">${d}</button>`;
  }
  grid.innerHTML=html;
}

const OPTIONAL_REPAIR_COLUMNS=['fault_location','mobile','equipment_category','location_id','desired_finish'];
function isSchemaColumnError(error){
  return error?.code==='PGRST204'||/schema cache|Could not find the .+ column/i.test(error?.message||'');
}
function isStatementTimeout(error){
  return error?.code==='57014'||/statement timeout|canceling statement/i.test(error?.message||'');
}
function isEquipmentRequired(error){
  return /equipment_id.*not-null|null value in column "equipment_id"/i.test(error?.message||'');
}
function clientUuid(){
  return globalThis.crypto?.randomUUID?.() || 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}
function clientReqNo(){
  const today=dateValue(new Date());
  const next=reqs.filter(r=>reqDateKey(r)===today).length+1;
  return `${today}-${String(next).padStart(3,'0')}`;
}
function fileExt(file){
  const byName=(file?.name||'').match(/\.([A-Za-z0-9]{1,8})$/)?.[0]?.toLowerCase();
  if(byName)return byName;
  const map={'image/jpeg':'.jpg','image/png':'.png','image/gif':'.gif','image/webp':'.webp','video/mp4':'.mp4','application/pdf':'.pdf'};
  return map[file?.type]||'.bin';
}
function storagePath(requestId,file,prefix){
  return `${requestId}/${Date.now()}_${prefix}_${clientUuid().slice(0,8)}${fileExt(file)}`;
}
function storageObjectPath(path){
  return path.split('/').map(encodeURIComponent).join('/');
}
function uploadErrorMessage(error){
  const msg=error?.message||String(error||'');
  if(/Load failed|Failed to fetch|NetworkError/i.test(msg))return '手機瀏覽器暫時無法連線到檔案上傳服務，請確認網路後再重送。';
  return msg?translateError(msg):'上傳失敗';
}
async function uploadRepairFile(path,file){
  const contentType=file?.type||'application/octet-stream';
  const first=await db.storage.from('repair-files').upload(path,file,{upsert:true,contentType});
  if(!first.error)return first;
  if(!/Load failed|Failed to fetch|NetworkError/i.test(first.error.message||''))return first;
  try{
    let token=SUPA_KEY;
    try{const {data:{session}}=await db.auth.getSession(); if(session?.access_token)token=session.access_token;}catch(e){}
    const res=await fetch(`${SUPA_URL}/storage/v1/object/repair-files/${storageObjectPath(path)}`,{
      method:'POST',
      headers:{apikey:SUPA_KEY,Authorization:`Bearer ${token}`,'Content-Type':contentType,'x-upsert':'true'},
      body:file
    });
    if(res.ok)return {data:{path},error:null};
    let text='';
    try{text=await res.text();}catch(e){}
    return {data:null,error:{message:text||`HTTP ${res.status}`}};
  }catch(e){
    return {data:null,error:{message:e?.message||first.error.message||'Load failed'}};
  }
}
async function insertRepairRequest(rec){
  let payload={...rec};
  let triedWithoutEquipment=false;
  for(let i=0;i<8;i++){
    const res=await db.from('repair_requests').insert(payload).select('request_id,req_no').single();
    if(!res.error)return res;
    if(isStatementTimeout(res.error) && payload.equipment_id && !triedWithoutEquipment){
      triedWithoutEquipment=true;
      delete payload.equipment_id;
      delete payload.equipment_category;
      delete payload.location_id;
      continue;
    }
    const msg=res.error.message||'', quoted=msg.match(/'([^']+)' column/)?.[1];
    const col=OPTIONAL_REPAIR_COLUMNS.find(c=>payload[c]!==undefined && (quoted===c||msg.includes(`'${c}'`)||msg.includes(`"${c}"`)));
    if(!col)return res;
    delete payload[col];
  }
  return await db.from('repair_requests').insert(payload).select('request_id,req_no').single();
}
function repairRequestErrorMessage(error){
  if(!error)return '送出失敗，請稍後再試';
  if(isEquipmentRequired(error)){
    return '資料庫尚未完成報修表單更新：目前報修單仍強制要求設備欄位。請先在 Supabase SQL Editor 執行 system/sql/repair_request_timeout_fix.sql，完成後再送出。';
  }
  if(isStatementTimeout(error)){
    return '資料庫新增報修逾時：repair_requests 的新增流程目前被資料庫觸發器或設定卡住。表單資料已保留，請先在 Supabase SQL Editor 執行 system/sql/repair_request_timeout_fix.sql 後再重送。';
  }
  if(isSchemaColumnError(error)){
    return '資料庫欄位尚未更新：請先執行 system/sql/repair_request_timeout_fix.sql 後再重送。';
  }
  return '錯誤：'+(error.message?translateError(error.message):'送出失敗');
}

function kindOf(f){const t=f.type;if(t.startsWith('image'))return'photo';if(t.startsWith('video'))return'video';if(t.includes('pdf'))return'pdf';if(t.includes('word')||/\.docx?$/i.test(f.name))return'doc';if(t.includes('sheet')||/\.xlsx?$/i.test(f.name))return'xls';return'other';}
function displayFaultLocation(r){
  if(r?.fault_location)return r.fault_location;
  const m=(r?.fault_desc||'').match(/故障位置：(.+?)(\n|$)/);

}
function displayFaultDesc(r){
  return (r?.fault_desc||'').replace(/^故障位置：.*\n?/,'').replace(/^故障描述：/,'') || '—';

function renderActions(r,o){
  const s=driver(r); const box=document.getElementById('d-actions'); const sub=document.getElementById('d-sub'); sub.innerHTML='';
  const A=[];
  if(s==='pending'||s==='transferred'){if(hasPerm('dispatch'))A.push(['派工','a-primary',()=>dispatchForm(r)]);if(hasPerm('delete'))A.push(['取消案件','a-danger',()=>act(()=>cancelCase(r))]);}
  else if(s==='assigned'){if(hasPerm('update')){A.push(['接單','a-ok',()=>act(()=>accept(r,o))]);A.push(['退回派工','a-warn',()=>act(()=>returnOrder(r,o))]);A.push(['拒絕','a-danger',()=>act(()=>rejectOrder(r,o))]);}}
  else if(s==='accepted'){if(hasPerm('update')){A.push(['開始維修','a-primary',()=>act(()=>startWork(r,o))]);A.push(['退回派工','a-warn',()=>act(()=>returnOrder(r,o))]);}}
  else if(s==='in_progress'){if(hasPerm('update')){A.push(['等待料件','a-warn',()=>act(()=>waitState(r,o,'waiting_parts'))]);A.push(['等待廠商','a-warn',()=>act(()=>waitState(r,o,'waiting_vendor'))]);A.push(['完成維修','a-ok',()=>completeForm(r,o)]);}}
  else if(s==='waiting_parts'||s==='waiting_vendor'){if(hasPerm('update')){A.push(['繼續維修','a-primary',()=>act(()=>resume(r,o))]);A.push(['完成維修','a-ok',()=>completeForm(r,o)]);}}
  else if(s==='pending_review'||s==='completed'){if(hasPerm('sign'))A.push(['✓ 使用單位驗收','a-ok',()=>act(()=>confirmUnit(r,o))]);if(hasPerm('close'))A.push(['⊚ 主管結案','a-primary',()=>act(()=>closeCase(r,o))]);if(hasPerm('update'))A.push(['退回重修','a-warn',()=>act(()=>reopen(r,o))]);}
  else if(s==='returned'||s==='rejected'){if(hasPerm('dispatch'))A.push(['重新派工','a-primary',()=>dispatchForm(r)]);if(hasPerm('delete'))A.push(['取消案件','a-danger',()=>act(()=>cancelCase(r))]);}
  if(!A.length){box.innerHTML='<span style="color:var(--text-dim);font-size:.76rem">權限不足或案件已結束，僅供檢視</span>';return;}

    expected_arrival:document.getElementById('x-arr').value||null,expected_finish:document.getElementById('x-fin').value||null,
    work_content:document.getElementById('x-content').value.trim()||null,need_shutdown:document.getElementById('x-shut').value==='true',
    need_approval:document.getElementById('x-appr').value==='true',status:'assigned',accept_status:'pending'};

  await db.from('repair_requests').update({status:'assigned',assignee_id:tech||null,updated_at:new Date().toISOString()}).eq('request_id',reqId);
  await logStatus(reqId,data.order_id,driver(r),'assigned','派工 '+(data.wo_no||'')+(tech?(' → '+(techs.find(t=>t.user_id===tech)?.name||'')):'')+(vendor?(' 委外:'+vendor):''));

  if(tech){ try{ await db.from('notifications').insert({recipient_id:tech,event:'dispatch',title:'新派工通知',
    body:`${r.req_no||''}｜${r.equipment?.name||'設備'}｜${r.fault_desc||''}`,request_id:reqId,order_id:data.order_id}); }catch(e){} }

}

async function rejectOrder(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}await db.from('maintenance_orders').update({status:'rejected',accept_status:'rejected'}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'pending',assignee_id:null,updated_at:new Date().toISOString()}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o.order_id,driver(r),'rejected','技師拒絕，待重新指派');await refreshAndReopen(r.request_id);toast('已拒絕');}
async function startWork(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}const now=new Date().toISOString();
  await db.from('maintenance_orders').update({status:'in_progress',start_time:now,arrival_time:o.arrival_time||now}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'in_progress',updated_at:now}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o.order_id,'accepted','in_progress','開始維修，到場時間 '+fmt(now));await refreshAndReopen(r.request_id);toast('開始維修');}
async function waitState(r,o,st){if(!hasPerm('update')){toast('沒有更新權限',true);return;}await db.from('maintenance_orders').update({status:st}).eq('order_id',o.order_id);
  await logStatus(r.request_id,o.order_id,'in_progress',st,st==='waiting_parts'?'等待料件':'等待廠商');await refreshAndReopen(r.request_id);toast('狀態已更新');}
async function resume(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}await db.from('maintenance_orders').update({status:'in_progress'}).eq('order_id',o.order_id);
  await logStatus(r.request_id,o.order_id,driver(r),'in_progress','繼續維修');await refreshAndReopen(r.request_id);toast('繼續維修');}
function completeForm(r,o){
  if(!hasPerm('update')){toast('沒有更新權限',true);return;}
  const sub=document.getElementById('d-sub');
  sub.innerHTML=`<div class="subform show">
    <div class="field"><label>故障原因</label><input id="x-cause" placeholder="例：軸承磨損"></div>
    <div class="field"><label>處理方式</label><textarea id="x-method" placeholder="處理過程…"></textarea></div>
    <div class="row3">
      <div class="field"><label>更換零件</label><input id="x-parts"></div>
      <div class="field"><label>使用材料</label><input id="x-mat"></div>
      <div class="field"><label>工時(小時)</label><input id="x-hours" type="number" step="0.5" min="0"></div>
    </div>
    <button class="btn-primary" style="width:100%" onclick="doComplete('${r.request_id}','${o.order_id}')">確認完成</button>
  </div>`;
}
async function doComplete(reqId,ordId){
  if(!hasPerm('update')){toast('沒有更新權限',true);return;}
  const now=new Date().toISOString();
  const upd={status:'pending_review',finish_time:now,fault_cause:document.getElementById('x-cause').value.trim()||null,
    handle_method:document.getElementById('x-method').value.trim()||null,parts_used:document.getElementById('x-parts').value.trim()||null,
    materials:document.getElementById('x-mat').value.trim()||null,labor_hours:parseFloat(document.getElementById('x-hours').value)||null};
  await db.from('maintenance_orders').update(upd).eq('order_id',ordId);
  await db.from('repair_requests').update({status:'pending_review',updated_at:now}).eq('request_id',reqId);
  await logStatus(reqId,ordId,'in_progress','pending_review','維修完成，待驗收'+(upd.fault_cause?'（原因:'+upd.fault_cause+'）':''));
  await refreshAndReopen(reqId);toast('維修完成，待驗收');
}
async function confirmUnit(r,o){if(!hasPerm('sign')){toast('沒有簽核權限',true);return;}await logStatus(r.request_id,o?.order_id,'pending_review','pending_review','使用單位已驗收確認');await refreshAndReopen(r.request_id);toast('已記錄使用單位驗收');}
async function closeCase(r,o){const now=new Date().toISOString();
  if(!hasPerm('close')){toast('沒有結案權限',true);return;}
  if(o) await db.from('maintenance_orders').update({status:'closed'}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'closed',updated_at:now}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o?.order_id,'pending_review','closed','主管結案，案件完成');await refreshAndReopen(r.request_id);toast('已結案');}
async function reopen(r,o){if(!hasPerm('update')){toast('沒有更新權限',true);return;}if(o)await db.from('maintenance_orders').update({status:'in_progress'}).eq('order_id',o.order_id);
  await db.from('repair_requests').update({status:'in_progress',updated_at:new Date().toISOString()}).eq('request_id',r.request_id);
  await logStatus(r.request_id,o?.order_id,'pending_review','in_progress','驗收退回，重新維修');await refreshAndReopen(r.request_id);toast('已退回重修');}
async function cancelCase(r){if(!hasPerm('delete')){toast('沒有刪除/取消權限',true);return;}await db.from('repair_requests').update({status:'cancelled',updated_at:new Date().toISOString()}).eq('request_id',r.request_id);
  await logStatus(r.request_id,null,driver(r),'cancelled','案件取消');await refreshAndReopen(r.request_id);toast('已取消');}

async function refreshAndReopen(reqId){ await loadCases(); renderTableFilters(); renderChips(); renderList(); openDetail(reqId); }

// ─── UI helpers ───
function show(id){document.getElementById(id).classList.add('show');}
function closeM(id){document.getElementById(id).classList.remove('show');if(id==='m-create')closeDesiredCalendar();}
let _tt;function toast(m,err){const el=document.getElementById('toast');el.textContent=m;el.style.borderColor=err?'var(--red)':'var(--border-hi)';el.style.color=err?'var(--red)':'var(--text)';el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);}

init().catch(e=>{document.getElementById('list').innerHTML=`<tr><td colspan="6" class="empty" style="color:var(--red)">載入失敗：${escHtml(translateError(e.message))}<br><small>請確認已執行 work_order_schema.sql</small></td></tr>`;});
